<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Times New Roman', 'Noto Sans SC', serif;
            background-size: cover; background-position: center; 
            background-attachment: fixed;
            overflow-x: hidden;
            transition: background-image 0.8s ease-in-out;
        }
        
        * { font-weight: 300 !important; }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { 
            body { 
                background-image: url('mobile_bg.jpg'); 
                background-attachment: scroll;
            } 
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .en-main { display: block; letter-spacing: 0.05em; text-transform: uppercase; }
        .zh-sub { display: block; opacity: 0.4; font-size: 0.75rem; line-height: 1.2; }
        
        .nav-active { border-left: 2px solid rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        /* 项目卡片样式 */
        .project-card { cursor: pointer; transition: 0.4s; overflow: hidden; border-radius: 1rem; background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.05); }
        .project-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }

        .apple-search {
            background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
        }

        #viewer, #project-detail { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.98); }

        .thought-card { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 1.5rem; transition: 0.3s; }
        .thought-card:hover { background: rgba(255,255,255,0.06); }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui">
        <div id="back-btn" class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition hidden" onclick="switchPage('home')">
            <span class="en-main text-[10px]">Return</span><span class="zh-sub">返回</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-40 hover:opacity-100 transition p-3 glass" onclick="toggleMusic()">
            <div id="music-on" class="w-4 h-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            <div id="music-off" class="w-4 h-4 hidden"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></div>
        </div>
    </div>

    <div id="app-content" class="pt-16 p-6 md:p-16 opacity-0 transition-opacity duration-500"></div>

    <div id="viewer" onclick="closeViewer()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light">×</button>
        <div class="flex items-center gap-8 w-full justify-center px-4" onclick="event.stopPropagation()">
            <button class="text-5xl opacity-20 hover:opacity-100 hidden md:block" onclick="prevImg()">‹</button>
            <img id="viewer-img" src="" class="max-h-[85vh] max-w-[85vw] object-contain rounded shadow-2xl transition-all">
            <button class="text-5xl opacity-20 hover:opacity-100 hidden md:block" onclick="nextImg()">›</button>
        </div>
    </div>

    <div id="project-detail" onclick="this.style.display='none'">
        <div class="glass w-[95vw] h-[90vh] md:w-[85vw] md:h-[80vh] flex flex-col md:flex-row overflow-hidden" onclick="event.stopPropagation()">
            <div class="w-full md:w-2/3 bg-black/40 relative group flex items-center justify-center border-b md:border-b-0 md:border-r border-white/10">
                <button class="absolute left-4 z-10 text-5xl opacity-30 group-hover:opacity-100 transition" onclick="detailNav(-1)">‹</button>
                <img id="detail-main-img" src="" class="max-w-full max-h-full object-contain p-4">
                <button class="absolute right-4 z-10 text-5xl opacity-30 group-hover:opacity-100 transition" onclick="detailNav(1)">›</button>
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 px-3 py-1 bg-black/50 rounded-full text-[10px] en-main" id="detail-counter">1 / 1</div>
            </div>
            <div class="w-full md:w-1/3 p-8 flex flex-col justify-between overflow-y-auto bg-black/20">
                <div>
                    <h2 id="detail-title" class="en-main text-3xl mb-1">PROJECT</h2>
                    <p id="detail-zh" class="zh-sub text-lg opacity-80 mb-6">项目名称</p>
                    <div class="space-y-6">
                        <div>
                            <span class="en-main text-[10px] opacity-30">Category</span>
                            <p id="detail-cat" class="en-main text-xs mt-1">Classification</p>
                        </div>
                        <div>
                            <span class="en-main text-[10px] opacity-30">Brief / Reflection</span>
                            <p id="detail-desc" class="zh-sub opacity-60 leading-relaxed mt-2 text-xs">正在加载感悟反省...</p>
                        </div>
                    </div>
                </div>
                <button class="mt-8 py-3 border border-white/10 rounded-full en-main text-[10px] hover:bg-white/10 transition" onclick="document.getElementById('project-detail').style.display='none'">Close Archive</button>
            </div>
        </div>
    </div>

    <script src="movies.js"></script>
    <script src="thoughts.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');
        let currentImgList = [];
        let currentIndex = 0;

        // 【核心逻辑】严格分类检索
        async function getProjectData(type) {
            // 这里定义了每个物理分类下对应的文件前缀（需与你Github仓库一致）
            const registry = {
                '工作实践': ['离不了', '血液涅槃'],
                '批判设计': ['新保龄运动', '离不了', '血液涅槃', '健身工厂'], // 确保这四个只出现在这里
                '个人创意': ['健身工厂']
            };
            
            const prefixes = registry[type] || [];
            const groups = {};

            // 自动检索逻辑：遍历前缀，尝试生成1-10张图的路径
            prefixes.forEach(name => {
                if(!groups[name]) {
                    groups[name] = { 
                        en: name.toUpperCase(), 
                        zh: name, 
                        images: [], 
                        path: `平面设计/${type}/`
