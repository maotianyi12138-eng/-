<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Times New Roman', 'Noto Sans SC', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
            transition: background-image 0.8s ease-in-out;
        }
        
        /* 移除全局所有加粗 */
        * { font-weight: 300 !important; }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .en-main { display: block; letter-spacing: 0.05em; text-transform: uppercase; }
        .zh-sub { display: block; opacity: 0.4; font-size: 0.75rem; line-height: 1.2; }
        
        .nav-active { border-left: 2px solid rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        .video-card-mini { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 1rem; transition: transform 0.3s ease; }
        .video-card-mini:hover { transform: scale(1.02); }

        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }
        .stack-layer:hover { transform: translateX(15px) scale(1.02); z-index: 60 !important; }

        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; height: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: 0.6s ease; cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        .artist-scroll { display: flex; gap: 4px; height: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; transition: 0.5s ease; border-radius: 4px; overflow: hidden; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }

        .apple-search {
            background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
        }

        #viewer, #ad-pop { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #viewer { background: rgba(0,0,0,0.98); }

        .thought-card { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 1.5rem; transition: 0.3s; }
        .thought-card:hover { background: rgba(255,255,255,0.06); }

        .calligraphy-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; opacity: 0.6; transition: 0.5s; }
        .group:hover .calligraphy-preview { opacity: 1; }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui">
        <div id="back-btn" class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition hidden" onclick="switchPage('home')">
            <span class="en-main text-[10px]">Return</span><span class="zh-sub">返回</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-40 hover:opacity-100 transition p-3 glass" onclick="toggleMusic()">
            <div id="music-on" class="w-4 h-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            <div id="music-off" class="w-4 h-4 hidden"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></div>
        </div>
    </div>

    <div id="app-content" class="pt-16 p-6 md:p-16 opacity-0 transition-opacity duration-500"></div>

    <div id="viewer" onclick="closeViewer()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light">×</button>
        <div class="flex items-center gap-8 w-full justify-center px-4" onclick="event.stopPropagation()">
            <button class="text-5xl opacity-20 hover:opacity-100" onclick="prevImg()">‹</button>
            <img id="viewer-img" src="" class="max-h-[85vh] max-w-[85vw] object-contain rounded shadow-2xl transition-all">
            <button class="text-5xl opacity-20 hover:opacity-100" onclick="nextImg()">›</button>
        </div>
    </div>

    <div id="ad-pop" class="bg-black/80 backdrop-blur-xl">
        <div class="glass p-12 text-center">
            <span class="en-main text-2xl mb-2">Recommend a movie to him</span>
            <span class="zh-sub">他还没看过，快推荐给他吧</span>
            <div class="flex flex-col gap-4 mt-8">
                <button class="bg-white text-black py-4 rounded-xl text-xs tracking-widest uppercase">Recommend</button>
                <button class="py-3 rounded-xl bg-white/10 text-[10px] uppercase opacity-40" onclick="closeAd()">Already Shared</button>
            </div>
        </div>
    </div>

    <script src="movies.js"></script>
    <script src="thoughts.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');
        let currentImgList = [];
        let currentIndex = 0;

        if (typeof myThoughts === 'undefined') {
            window.myThoughts = [{date:'INFO', en:'Create thoughts.js to write diary.', zh:'请创建 thoughts.js 文件开始书写日记。'}];
        }

        const getImdbUrl = (q) => `https://www.imdb.com/find?q=${encodeURIComponent(q)}`;

        let hasInteracted = false;
        const startAudio = () => {
            if(!hasInteracted) {
                audio.play(); hasInteracted = true;
                updateMusicIcon();
            }
        };
        ['click', 'touchstart', 'scroll', 'wheel'].forEach(e => window.addEventListener(e, startAudio, {once:true}));

        function toggleMusic() {
            audio.paused ? audio.play() : audio.pause();
            updateMusicIcon();
        }
        function updateMusicIcon() {
            document.getElementById('music-on').classList.toggle('hidden', audio.paused);
            document.getElementById('music-off').classList.toggle('hidden', !audio.paused);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[25vh] flex flex-col justify-end pb-8 px-4">
                    <div class="flex flex-col md:flex-row items-baseline gap-2">
                        <span class="zh-sub opacity-100 order-2 md:order-1" style="font-size: 10vw;">毛天艺</span>
                        <span class="en-main text-[4vw] md:text-[2.5vw] order-1 md:order-2">Tianyi Mao</span>
                    </div>
                    <div class="mt-2">
                        <span class="en-main text-xs md:text-sm tracking-wider">Those who seek brilliance in the process cannot be deprived.</span>
                        <span class="zh-sub mt-1">一个只想使过程精彩的人是无法被剥夺的</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[220px]">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="en-main text-3xl mb-2">What can i do</span><span class="zh-sub">核心业务</span>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-xl">Design</span><span class="zh-sub">平面设计</span></div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-xl">Photo</span><span class="zh-sub">摄影作品</span></div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-xl">Coach</span><span class="zh-sub">运动教学</span></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass p-6 group cursor-pointer relative overflow-hidden" onclick="switchPage('cinema')">
                             <span class="en-main text-lg">Cinema</span><span class="zh-sub">电影人生</span>
                        </div>
                        <div class="glass p-6 group cursor-pointer relative overflow-hidden" onclick="switchPage('reading')">
                             <span class="en-main text-lg">Media</span><span class="zh-sub">音乐阅读</span>
                        </div>
                        <div class="glass p-6 group cursor-pointer relative overflow-hidden" onclick="switchPage('thoughts')">
                             <span class="en-main text-lg">Reflect</span><span class="zh-sub">感悟反省</span>
                        </div>
                        <div class="glass p-6 group cursor-pointer relative overflow-hidden" onclick="switchPage('calligraphy')">
                             <div class="relative z-10">
                                <span class="en-main text-lg">Ink</span><span class="zh-sub">书法练习</span>
                             </div>
                             <img id="home-calligraphy-preview" src="书法/latest.jpg" class="absolute inset-0 w-full h-full object-cover opacity-10 group-hover:opacity-30 transition-opacity" onerror="this.style.display='none'">
                        </div>
                    </div>
                </div>`;
        }

        function renderWorks() {
            const projects = [
                {en: 'Inseparable', zh: '离不了', prefix: '平面设计/离不了', count: 4},
                {en: 'New Bowling', zh: '新保龄运动', prefix: '平面设计/新保龄运动', count: 6},
                {en: 'Blood Nirvana', zh: '血液涅槃', prefix: '平面设计/血液涅槃', count: 4},
                {en: 'Fitness Factory', zh: '健身工厂', prefix: '平面设计/健身工厂', count: 5}
            ];
            app.innerHTML = `<div class="mb-12 px-4"><span class="en-main text-6xl">Portfolio</span><span class="zh-sub text-sm mt-2">视觉作品集</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${projects.map(p => `
                        <div class="glass p-6 group">
                            <div class="design-stack">${Array.from({length: p.count}).map((_, i) => `
                                <div class="stack-layer shadow-xl" style="left:${i*12}%; z-index:${p.count-i}; background:#111;" onclick="openViewerList('${p.prefix}', ${i+1}, ${p.count})">
                                    <img src="${p.prefix}${i+1}.png" class="w-full h-full object-cover rounded-lg">
                                </div>`).join('')}</div>
                            <div class="mt-4"><span class="en-main text-xl">${p.en}</span><span class="zh-sub">${p.zh}</span></div>
                        </div>`).join('')}
                </div>`;
        }

        function renderCinema() {
            const top10 = [
                {zh:'星际穿越', en:'Interstellar', img:'电影个人十佳海报/星际穿越.png'}, {zh:'杀死比尔2', en:'Kill Bill: Vol. 2', img:'电影个人十佳海报/杀死比尔2.png'},
                {zh:'七宗罪', en:'Se7en', img:'电影个人十佳海报/七宗罪.png'}, {zh:'美国丽人', en:'American Beauty', img:'电影个人十佳海报/美国丽人.png'},
                {zh:'安吉丽娜朱莉', en:'Angelina Jolie', img:'电影个人十佳海报/安吉丽娜朱莉.jpg'}, {zh:'爱在黎明破晓前', en:'Before Sunrise', img:'电影个人十佳海报/爱在黎明破晓前.png'},
                {zh:'新世界', en:'New World', img:'电影个人十佳海报/新世界.png'}, {zh:'胭脂扣', en:'Rouge', img:'电影个人十佳海报/胭脂扣.png'},
                {zh:'被解救的姜戈', en:'Django Unchained', img:'电影个人十佳海报/被解救的姜戈.png'}, {zh:'无间道', en:'Internal Affairs', img:'电影个人十佳海报/无间道.png'}
            ];
            const artists = [
                {zh:'凯拉奈特利', en:'Keira Knightley', img:'电影 演员导演/凯拉奈特利.jpg'}, {zh:'诺兰', en:'Christopher Nolan', img:'电影 演员导演/诺兰.jpg'},
                {zh:'张国荣', en:'Leslie Cheung', img:'电影 演员导演/张国荣.jpg'}, {zh:'黑泽明', en:'Akira Kurosawa', img:'电影 演员导演/黑泽明.jpg'},
                {zh:'朱莉娅罗伯茨', en:'Julia Roberts', img:'电影 演员导演/朱莉娅罗伯茨.jpg'}, {zh:'昆汀', en:'Quentin Tarantino', img:'电影 演员导演/昆汀.jpg'},
                {zh:'布拉德皮特', en:'Brad Pitt', img:'电影 演员导演/布拉德皮特.jpg'}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="en-main text-6xl">Cinema Archive</span><span class="zh-sub text-sm mt-2">电影人生</span></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass overflow-hidden h-[420px] relative">
                        <div class="dragon-row">${top10.map((m, i) => `
                            <a href="${getImdbUrl(m.en)}" target="_blank" class="dragon-item" style="z-index:${20-i}"><img src="${m.img}" title="${m.en} / ${m.zh}"></a>`).join('')}
                        </div>
                    </div>
                    <div class="glass p-2 h-[420px] relative">
                        <div class="artist-scroll">${artists.map(a => `
                            <a href="${getImdbUrl(a.en)}" target="_blank" class="artist-strip">
                                <img src="${a.img}">
                                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 writing-vertical-rl en-main text-[10px] opacity-50">${a.en}</div>
                            </a>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="px-4"><div class="glass p-8 md:p-12">
                    <div class="mb-6 max-w-2xl mx-auto"><input type="text" id="movieSearch" class="apple-search" placeholder="Search a movie he hasn't seen..." oninput="liveSearch()" onkeydown="handleSearchEnter(event)"></div>
                    <div id="movie-names" class="movie-list-4col"></div>
                </div></div>`;
            updateMovieGrid(movieData);
        }

        function renderReading() {
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="en-main text-6xl">Soul & Rhythm</span><span class="zh-sub text-sm mt-2">音乐与阅读</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    <div class="glass p-8">
                        <span class="en-main text-2xl mb-6">Currently Reading</span>
                        <div class="flex gap-4">
                            <div class="w-32 h-44 bg-white/10 rounded-lg overflow-hidden shadow-2xl"><img src="book_cover.jpg" class="w-full h-full object-cover" onerror="this.style.display='none'"></div>
                            <div class="flex-1">
                                <span class="en-main text-lg">Walden</span>
                                <span class="zh-sub text-xs">《瓦尔登湖》 - Henry David Thoreau</span>
                                <p class="en-main text-[10px] opacity-60 mt-4 leading-relaxed italic">"I went to the woods because I wished to live deliberately..."</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass p-8">
                        <span class="en-main text-2xl mb-6">Playlist of the Year</span>
                        <div class="space-y-4">
                            ${['In the End - Linkin Park', 'Bohemian Rhapsody - Queen', 'Nocturne - Jay Chou'].map(song => `
                                <div class="flex items-center justify-between border-b border-white/5 pb-2">
                                    <span class="en-main text-sm opacity-80">${song}</span>
                                    <span class="en-main text-[9px] opacity-30">PLAYING</span>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        async function renderThoughts() {
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="en-main text-6xl">Reflection</span><span class="zh-sub text-sm mt-2">感悟反省</span></div>
                <div id="thoughts-container" class="max-w-4xl mx-auto space-y-6 px-4">
                    ${myThoughts.map((t, i) => `
                        <div class="thought-card" id="thought-${i}">
                            <span class="en-main text-[10px] opacity-20 mb-4">${t.date}</span>
                            <p class="en-main text-lg font-light leading-relaxed mb-4 trans-target">${t.en || 'Translating...'}</p>
                            <p class="zh-sub text-lg opacity-100 font-light leading-relaxed">${t.zh}</p>
                        </div>`).join('')}
                </div>`;

            myThoughts.forEach(async (t, i) => {
                if (!t.en && t.zh) {
                    try {
                        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t.zh)}&langpair=zh-CN|en`);
                        const data = await res.json();
                        const translatedText = data.responseData.translatedText;
                        const cardText = document.querySelector(`#thought-${i} .trans-target`);
                        if (cardText) cardText.innerText = translatedText;
                        t.en = translatedText;
                    } catch (err) {
                        document.querySelector(`#thought-${i} .trans-target`).innerText = "Translation Timeout";
                    }
                }
            });
        }

        // 新增书法板块渲染逻辑
        function renderCalligraphy() {
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="en-main text-6xl">Daily Ink</span><span class="zh-sub text-sm mt-2">书法日常</span></div>
                <div class="px-4 max-w-5xl mx-auto">
                    <div class="glass p-4 md:p-12 text-center">
                        <div id="cal-container" class="flex flex-col items-center">
                            <span id="cal-date" class="en-main text-xs opacity-40 mb-8 tracking-[0.2em]">LOADING ARCHIVE...</span>
                            <div class="relative group cursor-zoom-in" onclick="openViewerSingle(document.getElementById('main-cal-img').src)">
                                <img id="main-cal-img" src="书法/latest.jpg" class="max-h-[70vh] rounded shadow-2xl transition-all duration-700" onerror="handleCalligraphyError(this)">
                            </div>
                            <div class="mt-12 opacity-20 hover:opacity-100 transition">
                                <span class="en-main text-[10px]">Keep practicing. Every stroke matters.</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            // 自动尝试获取昨天的日期如果latest.jpg不存在，或者你可以手动将每天的画命名为latest.jpg覆盖
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('cal-date').innerText = today;
        }

        function handleCalligraphyError(img) {
            img.src = "https://via.placeholder.com/800x1200/000000/FFFFFF?text=UPLOAD+TODAY+INK";
            document.getElementById('cal-date').innerText = "AWAITING NEW ENTRY";
        }

        function renderPhoto() {
            const cats = [{id:'商业摄影', en:'Commercial', zh:'商业摄影'}, {id:'模特', en:'Model', zh:'模特'}, {id:'情绪摄影', en:'Mood', zh:'情绪摄影'}, {id:'自媒体摄影', en:'Social', zh:'自媒体摄影'}, {id:'video', en:'Visuals', zh:'视听影像'}];
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="en-main text-5xl">Photography</span><span class="zh-sub text-xs mt-1">摄影</span></div>
                        ${cats.map(c => `<div onclick="handlePhotoNav('${c.id}', this)" class="photo-nav-item glass p-5 cursor-pointer hover:bg-white/10 transition-all border-transparent">
                            <span class="en-main text-lg">${c.en}</span><span class="zh-sub text-[9px]">${c.zh}</span>
                        </div>`).join('')}
                    </div>
                    <div class="flex-1 glass p-4 overflow-y-auto max-h-[85vh] no-scrollbar"><div id="photo-content-area"></div></div>
                </div>`;
            handlePhotoNav('商业摄影', document.querySelector('.photo-nav-item'));
        }

        function handlePhotoNav(id, el) {
            document.querySelectorAll('.photo-nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            const area = document.getElementById('photo-content-area');
            const photoCfg = { '商业摄影': '摄影/商业摄影', '模特': '摄影/模特', '情绪摄影': '摄影/情绪摄影', '自媒体摄影': '摄影/自媒体摄影' };
            
            if(id === 'video') {
                const links = ["https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4", "https://sns-video-zl.xhscdn.com/stream/110/4/01e6cd6d950f58330103700391927eff1a_4.mp4", "https://www.chali.com/material/brand/ys/video1.mp4", "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4"];
                area.className = "grid md:grid-cols-2 gap-4 animate-in fade-in duration-700";
                area.innerHTML = links.map(l => `<div class="video-card-mini glass p-1"><video loop muted playsinline autoplay class="w-full h-full object-cover rounded-xl"><source src="${l}"></video></div>`).join('');
            } else {
                area.className = "tight-photo-grid animate-in fade-in duration-700";
                area.innerHTML = '';
                for(let i=1; i<=30; i++) {
                    const div = document.createElement('div'); div.className = 'photo-item';
                    div.innerHTML = `<img src="${photoCfg[id]}${i}.jpg" class="w-full h-auto" onerror="this.parentElement.remove()">`;
                    area.appendChild(div);
                }
            }
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                backBtn.classList.toggle('hidden', page === 'home');
                
                if (page === 'thoughts' || page === 'calligraphy') {
                    document.body.style.backgroundImage = "url('反思横屏.jpg')";
                } else {
                    document.body.style.backgroundImage = window.innerWidth >= 768 ? "url('horse.jpg')" : "url('mobile_bg.jpg')";
                }

                if(page === 'home') renderHome();
                else if(page === 'photo') renderPhoto();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'reading') renderReading();
                else if(page === 'thoughts') renderThoughts();
                else if(page === 'calligraphy') renderCalligraphy();
                
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function updateMovieGrid(list) {
            const container = document.getElementById('movie-names');
            if(container) {
                container.innerHTML = list.slice(0, 160).map(m => {
                    const titles = m.title.split(' / ');
                    const mainTitle = titles[0];
                    const altTitle = titles[1] || '';
                    return `<a href="${getImdbUrl(mainTitle)}" target="_blank" class="block border-l border-white/5 pl-2 transition-all hover:opacity-100 opacity-30">
                        <div class="en-main text-[9px] truncate">${altTitle || mainTitle}</div>
                        <div class="zh-sub text-[8px] truncate">${mainTitle}</div>
                    </a>`;
                }).join('');
            }
        }

        function liveSearch() {
            const val = document.getElementById('movieSearch').value.toLowerCase();
            updateMovieGrid(movieData.filter(m => m.title.toLowerCase().includes(val)));
        }
        
        function handleSearchEnter(e) {
            if (e.key === 'Enter') {
                const term = e.target.value.trim().toLowerCase();
                if (term !== '' && !movieData.some(m => m.title.toLowerCase().includes(term))) {
                    document.getElementById('ad-pop').style.display = 'flex';
                }
            }
        }

        function openViewerList(prefix, index, count) {
            currentImgList = Array.from({length: count}, (_, i) => `${prefix}${i+1}.png`);
            currentIndex = index - 1;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function openViewerSingle(src) {
            currentImgList = [src];
            currentIndex = 0;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function nextImg() { currentIndex = (currentIndex + 1) % currentImgList.length; updateViewer(); }
        function prevImg() { currentIndex = (currentIndex - 1 + currentImgList.length) % currentImgList.length; updateViewer(); }
        function updateViewer() { document.getElementById('viewer-img').src = currentImgList[currentIndex]; }
        function closeAd() { document.getElementById('ad-pop').style.display = 'none'; }

        window.onload = () => { renderHome(); app.style.opacity = '1'; };
    </script>
</body>
</html>
