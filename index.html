<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | 毛天艺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Libre+Baskerville:italic@400&display=swap');
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('horse.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; -webkit-font-smoothing: antialiased;
        }
        .vogue-title { font-family: 'Noto Serif SC', serif; letter-spacing: -0.02em; }
        .vogue-sub { font-family: 'Libre Baskerville', serif; }
        .vogue-card { transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); border-top: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer; }
        .vogue-card:hover { background: rgba(255,255,255,0.03); padding-left: 20px; }
        .tracking-vogue { letter-spacing: 0.5em; }
        .music-bars { display: flex; gap: 3px; align-items: flex-end; height: 13px; width: 20px; }
        .bar { width: 2px; background: white; animation: play 0.8s infinite alternate; height: 3px; }
        .bar-paused { animation-play-state: paused !important; height: 2px !important; opacity: 0.3; }
        @keyframes play { 0% { height: 4px; } 100% { height: 13px; } }
    </style>
</head>
<body>
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="p-10 max-w-7xl mx-auto flex justify-between items-center relative z-20">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="toggleMusic(event)">
            <div class="music-bars" id="music-icon">
                <div class="bar bar-paused" style="animation-delay: 0.0s"></div>
                <div class="bar bar-paused" style="animation-delay: 0.2s"></div>
                <div class="bar bar-paused" style="animation-delay: 0.4s"></div>
            </div>
            <span class="text-[9px] tracking-[0.3em] uppercase opacity-40 group-hover:opacity-100 transition" id="music-status">Sound Off</span>
        </div>
        <div class="space-x-10 text-[10px] tracking-vogue uppercase font-light opacity-60">
            <a href="works.html" onclick="saveAndGo(event, 'works.html')" class="hover:opacity-100 transition">Works</a>
            <a href="#" class="opacity-20 cursor-not-allowed">Cinema</a>
            <a href="#" class="opacity-20 cursor-not-allowed">Music</a>
            <a href="#" class="opacity-20 cursor-not-allowed">Reading</a>
        </div>
    </nav>

    <section class="py-32 px-10 max-w-7xl mx-auto relative z-10">
        <div class="mb-10 h-[1px] w-12 bg-white"></div>
        <h1 class="vogue-title text-7xl md:text-[9rem] font-black leading-[0.9] mb-8">毛天艺
            <span class="vogue-sub block text-2xl md:text-4xl opacity-30 font-light italic tracking-normal mt-4">The Visual Archive</span>
        </h1>
        <p class="text-sm md:text-base text-gray-300 max-w-xl leading-loose font-light tracking-wide">
            记录关于视觉、影像与声音的思考。探索数字时代下的审美边界。<br>
            <span class="vogue-sub text-xs opacity-40 italic mt-2 block uppercase tracking-[0.2em]">Curated by Mao Tianyi / Edition 2026</span>
        </p>
    </section>

    <section class="px-10 max-w-7xl mx-auto pb-32 relative z-10">
        <a href="works.html" onclick="saveAndGo(event, 'works.html')" class="vogue-card py-12 flex flex-col md:flex-row md:items-end justify-between group">
            <div>
                <h2 class="vogue-title text-4xl font-bold group-hover:text-blue-500 transition">视觉作品集</h2>
                <p class="vogue-sub text-xs opacity-30 italic mt-2">Visual Portfolio — Graphic & Photography</p>
            </div>
            <div class="text-[10px] tracking-vogue opacity-20 group-hover:opacity-100 transition mt-4 md:mt-0">EXPLORE →</div>
        </a>
        </section>

    <script>
        const audio = document.getElementById('bgm');
        const iconBars = document.querySelectorAll('.bar');
        const statusText = document.getElementById('music-status');

        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('musicTime');
            const isPlaying = localStorage.getItem('musicPlaying') === 'true';
            if (savedTime) audio.currentTime = parseFloat(savedTime);
            if (isPlaying) { audio.play().then(() => updateUI(true)).catch(() => {}); }
        });

        function saveAndGo(event, url) {
            event.preventDefault();
            localStorage.setItem('musicTime', audio.currentTime);
            localStorage.setItem('musicPlaying', audio.paused ? 'false' : 'true');
            // 如果点的是作品集卡片，强制开启音乐
            if (url === 'works.html') {
                audio.play();
                localStorage.setItem('musicPlaying', 'true');
            }
            setTimeout(() => { window.location.href = url; }, 100);
        }

        function toggleMusic(event) {
            event.stopPropagation();
            if (audio.paused) { audio.play(); updateUI(true); localStorage.setItem('musicPlaying', 'true'); }
            else { audio.pause(); updateUI(false); localStorage.setItem('musicPlaying', 'false'); }
        }

        function updateUI(isPlaying) {
            statusText.innerText = isPlaying ? "Sound On" : "Sound Off";
            iconBars.forEach(bar => isPlaying ? bar.classList.remove('bar-paused') : bar.classList.add('bar-paused'));
        }

        setInterval(() => { if(!audio.paused) localStorage.setItem('musicTime', audio.currentTime); }, 1000);
    </script>
</body>
</html>
