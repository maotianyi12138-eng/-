<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        .back-arrow {
            position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500;
            font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 龙鳞装 + 竖向文字 */
        .dragon-row { display: flex; overflow-x: auto; padding: 60px 0 60px 0; scrollbar-width: none; align-items: flex-end; }
        .dragon-item {
            flex: 0 0 160px; margin-right: -70px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        .dragon-item:hover { margin-right: 70px; transform: translateY(-15px); z-index: 100 !important; }
        
        .vertical-title {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 11px; margin-bottom: 20px; letter-spacing: 0.3em;
            height: 140px; text-align: right; pointer-events: none;
        }
        .v-zh { color: rgba(255,255,255,0.9); margin-left: 5px; font-weight: 300; }
        .v-en { color: rgba(255,255,255,0.2); font-size: 8px; font-weight: 100; text-transform: uppercase; }

        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* 作品集 */
        .works-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2.5rem; }
        @media (max-width: 768px) { .works-grid { grid-template-columns: 1fr; } }
        .works-card { width: 100%; aspect-ratio: 2/1; overflow: hidden; border-radius: 1.2rem; background: #0a0a0a; }
        .works-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }
        .works-card:hover img { transform: scale(1.05); }

        /* 亲吻墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: opacity 1s, transform 0.6s; cursor: crosshair; }
        .kiss-item.loaded { opacity: 0.6; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.15); z-index: 50; }

        .search-input { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 0.9rem 1.4rem; width: 100%; border-radius: 1.2rem; outline: none; }
        
        /* 弹窗 */
        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; }
        .ad-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 60px; border-radius: 3rem; text-align: center; }

        .audio-btn { position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 500; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
        .pause-icon { width: 10px; height: 12px; border-left: 3px solid #fff; border-right: 3px solid #fff; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="icon"></div></div>

    <div id="ad-overlay" class="ad-overlay">
        <div class="ad-box">
            <span class="zh text-4xl mb-4 font-bold">他没看过！推荐给他吧</span>
            <span class="en text-[10px] opacity-30 mb-12 tracking-[0.3em] uppercase">He hasn't seen this! Recommend it to him</span>
            <div class="mt-10 px-10 py-4 bg-white text-black rounded-full cursor-pointer transition active:scale-95 inline-block" onclick="closeAd()">
                <span class="zh text-sm font-bold">已经告诉他了</span>
                <span class="en text-[8px] opacity-60 font-bold uppercase">I've told him already</span>
            </div>
        </div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');
        const adOverlay = document.getElementById('ad-overlay');
        let searchTimer;

        function playMusic() { if (audio.paused) { audio.play().then(() => updateAudioUI(true)).catch(()=>{}); } }
        function toggleAudio(e) { e.stopPropagation(); if (audio.paused) { audio.play(); updateAudioUI(true); } else { audio.pause(); updateAudioUI(false); } }
        function updateAudioUI(isPlaying) { icon.className = isPlaying ? 'pause-icon' : 'play-icon'; }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else renderSoon(page);
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [{id:'works', zh:'视觉作品集', en:'Visual Works'}, {id:'cinema', zh:'电影人生', en:'Cinema Life'}, {id:'music', zh:'音乐人生', en:'Music Life'}, {id:'read', zh:'阅读人生', en:'Reading Life'}];
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-4">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[9vw] font-light leading-none">毛天艺</span>
                        <span class="en text-[5vw] md:text-[2vw] opacity-20 tracking-[0.2em] mt-2">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>
            `;
        }

        function renderWorks() {
            const projects = [
                {zh:'离不了', en:'UNSEPARABLE', img:'批判1.png'},
                {zh:'新保龄运动', en:'NEW BOWLING MOVEMENT', img:'保龄1.png'},
                {zh:'血液涅槃', en:'BLOOD NIRVANA', img:'血液1.png'},
                {zh:'健身工厂', en:'FITNESS FACTORY', img:'健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light tracking-tighter">视觉作品集</span><span class="en text-lg">Visual Archive</span></div>
                <div class="works-grid px-4">
                    ${projects.map(p => `<div class="glass p-5"><div class="works-card"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/800x400/111?text=${p.zh}'"></div><div class="mt-6 border-t border-white/5 pt-4"><span class="zh text-xl">${p.zh}</span><span class="en text-[10px] mt-1 opacity-30">${p.en}</span></div></div>`).join('')}
                </div>
            `;
        }

        function renderCinema() {
            // 采用 TMDB 链接，规避防盗链。poster_path 来自官方 API，确保全球可用。
            const top10 = [
                {zh:'新世界', en:'New World', url:'https://movie.douban.com/subject/10756762/', poster:'https://image.tmdb.org/t/p/w500/9vHofM6cZonF1Xb1Gcl5CjE3ZkI.jpg'},
                {zh:'杀死比尔 2', en:'Kill Bill: Vol. 2', url:'https://movie.douban.com/subject/1291585/', poster:'https://image.tmdb.org/t/p/w500/27TeSl3S8pZ1v7BNvL97m9v987E.jpg'},
                {zh:'无间道', en:'Infernal Affairs', url:'https://movie.douban.com/subject/1307914/', poster:'https://image.tmdb.org/t/p/w500/6yDInN27RtoWqO3uQ57Z6C6N7f.jpg'},
                {zh:'被解救的姜戈', en:'Django Unchained', url:'https://movie.douban.com/subject/6307447/', poster:'https://image.tmdb.org/t/p/w500/7oWY86pS9YfcP368oXvR707qqPk.jpg'},
                {zh:'星际穿越', en:'Interstellar', url:'https://movie.douban.com/subject/1889243/', poster:'https://image.tmdb.org/t/p/w500/gEU2QniE6E07Qv8vNGp9oYmtp6B.jpg'},
                {zh:'胭脂扣', en:'Rouge', url:'https://movie.douban.com/subject/1300325/', poster:'https://image.tmdb.org/t/p/w500/i9uQUv9EPia99SStpS68Z99986G.jpg'},
                {zh:'爱在黎明破晓前', en:'Before Sunrise', url:'https://movie.douban.com/subject/1296339/', poster:'https://image.tmdb.org/t/p/w500/69Sns8WoYnEJtG69yz6qvev5oM6.jpg'},
                {zh:'勇士', en:'Warrior', url:'https://movie.douban.com/subject/3141107/', poster:'https://image.tmdb.org/t/p/w500/pA0VscSByjM3H9R9Zf61X8k8V1B.jpg'},
                {zh:'七宗罪', en:'Se7en', url:'https://movie.douban.com/subject/1292223/', poster:'https://image.tmdb.org/t/p/w500/69Sns8WoYnEJtG69yz6qvev5oM6.jpg'},
                {zh:'美国丽人', en:'American Beauty', url:'https://movie.douban.com/subject/1292062/', poster:'https://image.tmdb.org/t/p/w500/w7r3bsiD7YEq6t9Lp9nu6kz9P6O.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span><span class="en text-lg">Cinema Archive</span></div>
                <div class="mb-12 px-4">
                    <div class="dragon-row">
                        ${top10.map((m, i) => `
                            <div class="dragon-item" style="z-index:${20-i}" onclick="window.open('${m.url}', '_blank')">
                                <div class="vertical-title">
                                    <span class="v-zh">${m.zh}</span>
                                    <span class="v-en">${m.en}</span>
                                </div>
                                <img src="${m.poster}" alt="${m.zh}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex flex-col lg:flex-row gap-8 px-4">
                    <div class="glass p-8 md:p-10 flex-[1.4]">
                        <input type="text" id="movieSearch" class="search-input mb-10" placeholder="搜索一部你觉得毛天艺没有看过的电影" oninput="debounceSearch()">
                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-4"></div>
                    </div>
                    <div class="flex-1 h-fit"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            listGrid.innerHTML = movies.map(m => `<div class="cursor-pointer group" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title.split('/')[0]}'), '_blank')"><div class="zh text-[13px] opacity-40 group-hover:opacity-100 transition-all truncate">${m.title.split('/')[0]}</div><div class="en text-[8px] opacity-10 group-hover:opacity-30 truncate uppercase">${m.title.split('/')[1] || ''}</div></div>`).join('');
            if(initWall) {
                // 亲吻墙海报继续尝试使用 movies.js 链接，失败则自动移除
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                initLazyLoading();
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(term === '' ? movieData : filtered);
            searchTimer = setTimeout(() => { if (term !== '' && filtered.length === 0) { adOverlay.style.pointerEvents = 'auto'; adOverlay.style.opacity = '1'; } }, 1200);
        }

        function initLazyLoading() {
            const observer = new IntersectionObserver((entries, obs) => { entries.forEach(entry => { if (entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; img.onload = () => img.classList.add('loaded'); obs.unobserve(img); } }); }, { rootMargin: "0px 0px 500px 0px" });
            document.querySelectorAll('.lazy-item').forEach(img => observer.observe(img));
        }

        function closeAd() { adOverlay.style.opacity = '0'; adOverlay.style.pointerEvents = 'none'; document.getElementById('movieSearch').value = ''; displayMovies(movieData); }
        function renderSoon(p) { app.innerHTML = `<div class="py-60 text-center glass mx-4"><span class="zh opacity-20 text-4xl uppercase">${p} Coming Soon</span></div>`; }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
