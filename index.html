<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | 毛天艺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Libre+Baskerville:italic@400&family=Inter:wght@300;400&display=swap');
        
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('horse.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; -webkit-font-smoothing: antialiased;
        }

        .vogue-title { font-family: 'Noto Serif SC', serif; letter-spacing: -0.02em; }
        .vogue-sub { font-family: 'Libre Baskerville', serif; }
        
        /* 板块卡片样式微调 */
        .vogue-card { 
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            cursor: pointer;
        }
        
        @media (min-width: 1024px) {
            .vogue-card { background: transparent; }
            .vogue-card:hover { background: rgba(255,255,255,0.05); padding-top: 2rem; }
        }

        .music-bars { display: flex; gap: 3px; align-items: flex-end; height: 13px; width: 20px; }
        .bar { width: 2px; background: white; animation: play 0.8s infinite alternate; height: 3px; }
        .bar-paused { animation-play-state: paused !important; height: 2px !important; opacity: 0.3; }
        @keyframes play { 0% { height: 4px; } 100% { height: 13px; } }
    </style>
</head>
<body>
    <audio id="bgm" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="p-6 md:p-10 max-w-7xl mx-auto flex justify-between items-center relative z-20">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="toggleMusic(event)">
            <div class="music-bars">
                <div class="bar bar-paused"></div>
                <div class="bar bar-paused" style="animation-delay: 0.2s"></div>
                <div class="bar bar-paused" style="animation-delay: 0.4s"></div>
            </div>
            <span class="text-[9px] tracking-[0.2em] uppercase opacity-40 group-hover:opacity-100 transition" id="music-status">Off</span>
        </div>
        <div class="hidden md:flex space-x-10 text-[10px] tracking-[0.3em] uppercase font-light opacity-60">
            <a href="works.html" onclick="saveAndGo(event, 'works.html')" class="hover:opacity-100 transition">Works</a>
            <span class="opacity-20 cursor-not-allowed">Cinema</span>
            <span class="opacity-20 cursor-not-allowed">Music</span>
            <span class="opacity-20 cursor-not-allowed">Reading</span>
        </div>
    </nav>

    <section class="pt-20 pb-16 px-6 md:px-10 max-w-7xl mx-auto relative z-10">
        <div class="mb-6 md:mb-10 h-[1px] w-12 bg-white"></div>
        <h1 class="vogue-title text-4xl md:text-[6rem] lg:text-[7rem] font-black leading-[0.9] mb-6">
            毛天艺
            <span class="vogue-sub block text-lg md:text-3xl lg:text-4xl opacity-30 font-light italic tracking-normal mt-4">The Visual Archive</span>
        </h1>
        <p class="text-xs md:text-base text-gray-400 max-w-xl leading-loose font-light tracking-wide">
            记录关于视觉、影像与声音的思考。探索数字时代下的审美边界。<br class="hidden md:block">
            <span class="vogue-sub text-[10px] opacity-40 italic mt-2 block uppercase tracking-[0.2em]">Curated by Mao Tianyi / Edition 2026</span>
        </p>
    </section>

    <section class="px-6 md:px-10 max-w-7xl mx-auto pb-24 relative z-10">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-0">
            
            <a href="works.html" onclick="saveAndGo(event, 'works.html')" class="vogue-card p-6 md:py-16 md:px-8 flex flex-col justify-between group border-l lg:border-l-0 border-white/10">
                <div>
                    <h2 class="vogue-title text-xl md:text-3xl font-bold group-hover:text-blue-500 transition">视觉作品集</h2>
                    <p class="vogue-sub text-[9px] md:text-xs opacity-30 italic mt-2">Works / Visual Portfolio</p>
                </div>
                <div class="text-[9px] tracking-[0.2em] opacity-20 group-hover:opacity-100 transition mt-10">EXPLORE →</div>
            </a>

            <div class="vogue-card p-6 md:py-16 md:px-8 flex flex-col justify-between opacity-50 cursor-not-allowed border-r lg:border-r-0 border-white/10">
                <div>
                    <h2 class="vogue-title text-xl md:text-3xl font-bold">电影板块</h2>
                    <p class="vogue-sub text-[9px] md:text-xs opacity-30 italic mt-2">Cinema / Private Curation</p>
                </div>
                <div class="text-[9px] tracking-[0.2em] opacity-10 mt-10">COMING SOON</div>
            </div>

            <div class="vogue-card p-6 md:py-16 md:px-8 flex flex-col justify-between opacity-50 cursor-not-allowed border-l lg:border-l-0 border-white/10">
                <div>
                    <h2 class="vogue-title text-xl md:text-3xl font-bold">音乐板块</h2>
                    <p class="vogue-sub text-[9px] md:text-xs opacity-30 italic mt-2">Music / Mental Shelter</p>
                </div>
                <div class="text-[9px] tracking-[0.2em] opacity-10 mt-10">COMING SOON</div>
            </div>

            <div class="vogue-card p-6 md:py-16 md:px-8 flex flex-col justify-between opacity-50 cursor-not-allowed border-r lg:border-b-0 border-b lg:border-r border-white/10 border-white/10">
                <div>
                    <h2 class="vogue-title text-xl md:text-3xl font-bold">阅读板块</h2>
                    <p class="vogue-sub text-[9px] md:text-xs opacity-30 italic mt-2">Read / Book & Notes</p>
                </div>
                <div class="text-[9px] tracking-[0.2em] opacity-10 mt-10">COMING SOON</div>
            </div>

        </div>
    </section>

    <script>
        const audio = document.getElementById('bgm');
        const iconBars = document.querySelectorAll('.bar');
        const statusText = document.getElementById('music-status');

        // 音频播放逻辑：刷新重置
        window.addEventListener('load', () => {
            if (audio) {
                audio.currentTime = 0; 
                if (localStorage.getItem('musicPlaying') === 'true') {
                    audio.play().then(() => updateUI(true)).catch(() => {});
                }
            }
        });

        // 交互触发：滑动或点击
        const startMusic = () => {
            if (audio && localStorage.getItem('musicPlaying') === 'true' && audio.paused) {
                audio.play().then(() => updateUI(true)).catch(() => {});
            }
        };
        document.addEventListener('click', startMusic);
        window.addEventListener('scroll', startMusic, { once: true });

        function saveAndGo(event, url) {
            event.preventDefault();
            if (audio) {
                localStorage.setItem('musicPlaying', audio.paused ? 'false' : 'true');
                // 如果是跳转到 Works 且当前是 Off，点击后应视为 On
                if (url === 'works.html') localStorage.setItem('musicPlaying', 'true');
            }
            setTimeout(() => { window.location.href = url; }, 150);
        }

        function toggleMusic(event) {
            event.stopPropagation();
            if (!audio) return;
            if (audio.paused) { audio.play().then(() => { updateUI(true); localStorage.setItem('musicPlaying', 'true'); }); }
            else { audio.pause(); updateUI(false); localStorage.setItem('musicPlaying', 'false'); }
        }

        function updateUI(isPlaying) {
            statusText.innerText = isPlaying ? "On" : "Off";
            iconBars.forEach(bar => isPlaying ? bar.classList.remove('bar-paused') : bar.classList.add('bar-paused'));
        }
    </script>
</body>
</html>
