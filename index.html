<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        .back-arrow {
            position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500;
            font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 龙鳞装 */
        .dragon-row { display: flex; overflow-x: auto; padding: 20px 0 60px 0; scrollbar-width: none; }
        .dragon-item {
            flex: 0 0 160px; margin-right: -60px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
        }
        .dragon-item:hover { margin-right: 60px; transform: translateY(-15px); z-index: 100 !important; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }

        /* 视觉作品集 2:1 */
        .works-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2.5rem; }
        @media (max-width: 768px) { .works-grid { grid-template-columns: 1fr; } }
        .works-card { width: 100%; aspect-ratio: 2/1; overflow: hidden; border-radius: 1.2rem; background: #111; }
        .works-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }
        .works-card:hover img { transform: scale(1.08); }

        /* 极致亲吻墙：无缝、紧密 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; width: 100%; }
        @media (max-width: 640px) { .kiss-wall { grid-template-columns: repeat(3, 1fr); } }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: opacity 1s, transform 0.6s; cursor: crosshair; }
        .kiss-item.loaded { opacity: 0.6; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.15); z-index: 50; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

        .search-input {
            background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
            color: white; padding: 0.9rem 1.4rem; width: 100%; border-radius: 1.2rem; outline: none; font-size: 0.85rem;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }
        
        .tag-btn {
            padding: 0.35rem 0.8rem; border-radius: 1rem; background: rgba(255,255,255,0.03);
            border: 0.5px solid rgba(255,255,255,0.06); font-size: 10px; color: rgba(255,255,255,0.4);
            cursor: pointer; transition: 0.3s;
        }
        .tag-btn:hover, .tag-active { background: rgba(255,255,255,0.15); color: #fff; }

        /* 广告级弹窗 */
        .ad-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.5s;
        }
        .ad-box {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 60px 40px; border-radius: 3rem; text-align: center; max-width: 480px;
        }

        .audio-btn {
            position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 500;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
        .pause-icon { width: 10px; height: 12px; border-left: 3px solid #fff; border-right: 3px solid #fff; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="icon"></div></div>

    <div id="ad-overlay" class="ad-overlay">
        <div class="ad-box">
            <span class="zh text-4xl mb-4 font-bold tracking-tight">他没看过！推荐给他吧</span>
            <span class="en text-[10px] opacity-30 mb-12 tracking-[0.3em] uppercase">He hasn't seen this! Recommend it to him</span>
            <div class="mt-10 px-10 py-4 bg-white text-black rounded-full cursor-pointer hover:bg-gray-200 transition active:scale-95 inline-block" onclick="closeAd()">
                <span class="zh text-sm font-bold">已经告诉他了</span>
                <span class="en text-[8px] opacity-60 font-black">I'VE TOLD HIM ALREADY</span>
            </div>
        </div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');
        const adOverlay = document.getElementById('ad-overlay');
        let searchTimer;

        function playMusic() { if (audio.paused) { audio.play().then(() => updateAudioUI(true)).catch(()=>{}); } }
        function toggleAudio(e) {
            e.stopPropagation();
            if (audio.paused) { audio.play(); updateAudioUI(true); }
            else { audio.pause(); updateAudioUI(false); }
        }
        function updateAudioUI(isPlaying) { icon.className = isPlaying ? 'pause-icon' : 'play-icon'; }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else renderSoon(page);
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [{id:'works', zh:'视觉作品集', en:'Visual Works'}, {id:'cinema', zh:'电影人生', en:'Cinema Life'}, {id:'music', zh:'音乐人生', en:'Music Life'}, {id:'read', zh:'阅读人生', en:'Reading Life'}];
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-4">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[9vw] font-light leading-none">毛天艺</span>
                        <span class="en text-[5vw] md:text-[2vw] opacity-20 tracking-[0.2em] mt-2">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>
            `;
        }

        function renderWorks() {
            const projects = [
                {zh:'离不了', en:'UNSEPARABLE', img:'批判1.png'},
                {zh:'新保龄运动', en:'NEW BOWLING MOVEMENT', img:'保龄1.png'},
                {zh:'血液涅槃', en:'BLOOD NIRVANA', img:'血液1.png'},
                {zh:'健身工厂', en:'FITNESS FACTORY', img:'健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light tracking-tighter">视觉作品集</span><span class="en text-lg">Visual Archive</span></div>
                <div class="works-grid px-4">
                    ${projects.map(p => `
                        <div class="glass p-5">
                            <div class="works-card"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/800x400/111?text=MAO+WORKS'"></div>
                            <div class="mt-6 border-t border-white/5 pt-4">
                                <span class="zh text-xl">${p.zh}</span>
                                <span class="en text-[10px] mt-1 opacity-30">${p.en}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCinema() {
            const top10Names = ["杀死比尔 2", "新世界", "爱在黎明破晓前", "勇士", "七宗罪", "无间道", "被解救的姜戈", "星际穿越", "胭脂扣", "美国丽人"];
            const top10 = top10Names.map(name => movieData.find(m => m.title.includes(name)) || {title: name, poster:''}).slice(0,10);
            const tags = ['科幻', '爱情', '喜剧', '剧情', '悬疑', '犯罪', '动画', '经典'];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span><span class="en text-lg">Cinema / Archive / 600+</span></div>
                <div class="mb-12 px-4"><div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}"><img src="${m.poster}"></div>`).join('')}</div></div>
                <div class="flex flex-col lg:flex-row gap-8 px-4">
                    <div class="glass p-8 md:p-10 flex-[1.4]">
                        <input type="text" id="movieSearch" class="search-input mb-6" placeholder="搜索一部你觉得毛天艺没有看过的电影" oninput="debounceSearch()">
                        <div class="flex flex-wrap gap-2 mb-8 border-b border-white/5 pb-6">
                            ${tags.map(t => `<button class="tag-btn" onclick="filterByTag('${t}', this)">${t}</button>`).join('')}
                        </div>
                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-4"></div>
                    </div>
                    <div class="flex-1 h-fit"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            
            listGrid.innerHTML = movies.map(m => `
                <div class="cursor-pointer group" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title.split('/')[0]}'), '_blank')">
                    <div class="zh text-[13px] opacity-40 group-hover:opacity-100 transition-all truncate">${m.title.split('/')[0]}</div>
                    <div class="en text-[8px] opacity-10 group-hover:opacity-30 truncate uppercase">${m.title.split('/')[1] || ''}</div>
                </div>
            `).join('');

            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                initLazyLoading();
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(term === '' ? movieData : filtered);

            searchTimer = setTimeout(() => {
                if (term !== '' && filtered.length === 0) {
                    adOverlay.style.pointerEvents = 'auto';
                    adOverlay.style.opacity = '1';
                }
            }, 1000); // 停顿1秒后判断
        }

        function filterByTag(tag, btn) {
            document.getElementById('movieSearch').value = '';
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
            btn.classList.add('tag-active');

            const rules = {
                '科幻': ['星际', '机动', '未来', '攻壳', '蝙蝠侠', '盗梦', '矩阵', '异形', '2049', '球', '战', '星球', '克隆', '赛博'],
                '爱情': ['爱', '情', '恋', '吻', '胭脂', '罗马', '泰坦尼克', '断背山', '花样', '甜', '心动', '巴黎', '初恋'],
                '喜剧': ['喜剧', '疯狂', '大话', '唐伯虎', '卓别林', '笑', '触不可及', '泰囧', '之王', '低俗', '顽主'],
                '剧情': ['霸王', '新世界', '美丽', '钢琴', '海边的', '忠犬', '活着', '美国丽人', '教父', '阿甘', '放牛班', '社会'],
                '悬疑': ['罪', '侦探', '疑', '无间', '魔术', '局', '岛', '控方', '嫌疑', '致命', '沉默', '电锯', '心理'],
                '犯罪': ['教父', '黑', '杀死', '姜戈', '往事', '毒', '命', '枭', '汉尼拔', '无间道', '大烟枪', '搏击', '暴力'],
                '动画': ['千与千寻', '龙猫', '大圣', '哈尔', '天空', '狮子王', '蜘蛛侠', '总动员', '皮克斯', '宫崎骏', '动漫', '动画'],
                '经典': ['肖申克', '霸王', '辛德勒', '阿甘', '教父', '杀手', '钢琴', '罗马', '乱世', '凯恩', '十二', '黑泽明']
            };
            const keywords = rules[tag];
            const filtered = movieData.filter(m => keywords.some(key => m.title.includes(key)));
            displayMovies(filtered);
        }

        function initLazyLoading() {
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.onload = () => img.classList.add('loaded');
                        obs.unobserve(img);
                    }
                });
            }, { rootMargin: "0px 0px 500px 0px" });
            document.querySelectorAll('.lazy-item').forEach(img => observer.observe(img));
        }

        function closeAd() { adOverlay.style.opacity = '0'; adOverlay.style.pointerEvents = 'none'; document.getElementById('movieSearch').value = ''; displayMovies(movieData); }
        function renderSoon(p) { app.innerHTML = `<div class="py-60 text-center glass mx-4"><span class="zh opacity-20 text-4xl uppercase">${p} Life Coming Soon</span></div>`; }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
