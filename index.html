
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .apple-search {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
            transition: all 0.3s ease; font-size: 14px;
        }
        .apple-search:focus { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); }

        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; height: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: 0.6s ease; cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        .artist-scroll { display: flex; gap: 4px; height: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; transition: 0.5s ease; border-radius: 4px; overflow: hidden; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }
        .stack-layer:hover { transform: translateX(15px) scale(1.02); z-index: 60 !important; }

        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }
        .movie-card { border-left: 1px solid rgba(255,255,255,0.05); padding-left: 8px; transition: 0.3s; }
        .movie-card:hover { border-left-color: #fff; opacity: 1 !important; }

        #viewer, #ad-pop { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #viewer { background: rgba(0,0,0,0.98); }
        #ad-pop { background: rgba(0,0,0,0.85); backdrop-filter: blur(40px); }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.05em; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 视频容器优化 */
        .video-container { width: 100%; max-width: 1000px; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-30 hover:opacity-100 transition p-2" onclick="toggleMusic(event)">
            <svg id="icon-playing" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5L6 9H2v6h4l5 4V5z m8 0a10 10 0 0 1 0 14 m-3.5-3.5a5 5 0 0 0 0-7"></path></svg>
            <svg id="icon-paused" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500 opacity-0"></div>

    <div id="viewer" onclick="closeViewer()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light">×</button>
        <div class="flex items-center gap-8 w-full justify-center px-4" onclick="event.stopPropagation()">
            <button class="text-5xl opacity-20 hover:opacity-100" onclick="prevImg()">‹</button>
            <img id="viewer-img" src="" class="max-h-[85vh] max-w-[85vw] object-contain rounded shadow-2xl transition-all">
            <button class="text-5xl opacity-20 hover:opacity-100" onclick="nextImg()">›</button>
        </div>
    </div>

    <div id="ad-pop">
        <div class="glass p-12 max-w-lg w-[90%] text-center border-none shadow-2xl">
            <div class="mb-10">
                <span class="zh text-2xl mb-2">他没看过，快推荐给他吧</span>
                <span class="en text-xs opacity-40">He hasn't seen it, recommend it to him.</span>
            </div>
            <div class="flex flex-col gap-4">
                <button class="bg-yellow-400 text-black py-4 rounded-xl font-bold hover:scale-105 transition shadow-lg">推荐给他 / Recommend</button>
                <div class="flex gap-4">
                    <button class="flex-1 py-3 rounded-xl border border-white/10 opacity-30 text-[10px]" onclick="alert('他肯定会看的')">懒得告诉他 / Lazy</button>
                    <button class="flex-1 py-3 rounded-xl bg-white/10 text-[10px]" onclick="closeAd()">已经分享给他了 / Shared</button>
                </div>
            </div>
        </div>
    </div>

    <script src="movies.js"></script>

    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        let currentImgList = [];
        let currentIndex = 0;

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span><span class="en text-[10px]">Business Sectors</span>
                        </div>
                        <div class="biz-sub-layer absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">平面设计</span><span class="en text-[9px]">Design</span></div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photo</span></div>
                            <div onclick="switchPage('video')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">视听影像</span><span class="en text-[9px]">Video</span></div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">运动教学</span><span class="en text-[9px]">Coach</span></div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Life</span></div>
                    <div class="glass p-10 opacity-30"><span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">Loading...</span></div>
                </div>`;
        }

        function renderWorks() {
            const projects = [{zh: '离不了', prefix: '平面设计/离不了', count: 4}, {zh: '新保龄运动', prefix: '平面设计/新保龄运动', count: 6}, {zh: '血液涅槃', prefix: '平面设计/血液涅槃', count: 4}, {zh: '健身工厂', prefix: '平面设计/健身工厂', count: 5}];
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">视觉作品集</span><span class="en text-sm mt-2 opacity-30">Portfolio</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${projects.map(p => `<div class="glass p-6 group"><div class="design-stack">${Array.from({length: p.count}).map((_, i) => `<div class="stack-layer shadow-xl" style="left:${i*12}%; z-index:${p.count-i}; background:#111;" onclick="openViewer('${p.prefix}', ${i+1}, ${p.count})"><img src="${p.prefix}${i+1}.png" class="w-full h-full object-cover rounded-lg"></div>`).join('')}</div><div class="mt-4"><span class="zh text-xl">${p.zh}</span></div></div>`).join('')}
                </div>`;
        }

        function renderPhoto() {
            const cats = [{id:'商业摄影', zh:'商业摄影'}, {id:'情绪摄影', zh:'情绪摄影'}, {id:'模特摄影', zh:'模特摄影'}, {id:'自媒体摄影', zh:'自媒体摄影'}];
            app.innerHTML = `<div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                <div class="md:w-1/4 flex flex-col gap-3">
                    <div class="mb-4"><span class="zh text-5xl font-light">摄影</span><span class="en text-xs mt-1 opacity-20">Photography</span></div>
                    ${cats.map(c => `<div onclick="loadPhotoSet('${c.id}')" class="glass p-5 cursor-pointer hover:bg-white/10 transition-all border-l-2 border-transparent hover:border-white/40"><span class="zh text-lg">${c.zh}</span></div>`).join('')}
                </div>
                <div class="flex-1 glass p-4 overflow-y-auto max-h-[85vh] no-scrollbar" id="photo-scroll-container">
                    <div id="photo-grid" class="tight-photo-grid"></div>
                </div>
            </div>`;
            loadPhotoSet('商业摄影');
        }

        function loadPhotoSet(prefix) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            let i = 1;
            const max = 30; 
            function addNext() {
                if(i > max) return;
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `<img src="摄影/${prefix}${i}.jpg" loading="lazy" class="w-full h-auto opacity-0 transition-opacity duration-700" onload="this.style.opacity='1'" onerror="this.parentElement.remove()">`;
                grid.appendChild(item);
                i++;
                setTimeout(addNext, 50);
            }
            addNext();
        }

        function renderVideo() {
            const videoUrl = "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4";
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">视听影像</span><span class="en text-sm mt-2 opacity-30">Video Portfolio</span></div>
                <div class="flex justify-center px-4">
                    <div class="video-container glass p-1">
                        <video controls autoplay muted class="w-full h-auto rounded-[18px]">
                            <source src="${videoUrl}" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>
                    </div>
                </div>`;
        }

        function renderCinema() {
            const top10 = [{zh:'星际穿越', img:'电影个人十佳海报/星际穿越.png'}, {zh:'杀死比尔2', img:'电影个人十佳海报/杀死比尔2.png'}, {zh:'七宗罪', img:'电影个人十佳海报/七宗罪.png'}, {zh:'美国丽人', img:'电影个人十佳海报/美国丽人.png'}, {zh:'安吉丽娜朱莉', img:'电影个人十佳海报/安吉丽娜朱莉.jpg'}, {zh:'爱在黎明破晓前', img:'电影个人十佳海报/爱在黎明破晓前.png'}, {zh:'新世界', img:'电影个人十佳海报/新世界.png'}, {zh:'胭脂扣', img:'电影个人十佳海报/胭脂扣.png'}, {zh:'被解救的姜戈', img:'电影个人十佳海报/被解救的姜戈.png'}, {zh:'无间道', img:'电影个人十佳海报/无间道.png'}];
            const artists = [{zh:'凯拉奈特利', img:'电影 演员导演/凯拉奈特利.jpg'}, {zh:'诺兰', img:'电影 演员导演/诺兰.jpg'}, {zh:'张国荣', img:'电影 演员导演/张国荣.jpg'}, {zh:'黑泽明', img:'电影 演员导演/黑泽明.jpg'}, {zh:'朱莉娅罗伯茨', img:'电影 演员导演/朱莉娅罗伯茨.jpg'}, {zh:'昆汀', img:'电影 演员导演/昆汀.jpg'}, {zh:'布拉德皮特', img:'电影 演员导演/布拉德皮特.jpg'}];
            const genres = [{zh:'全部', en:'ALL'}, {zh:'剧情', en:'DRAMA'}, {zh:'科幻', en:'SCI-FI'}, {zh:'犯罪', en:'CRIME'}, {zh:'悬疑', en:'MYSTERY'}];

            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light">电影人生</span><span class="en text-sm mt-2 opacity-30">Archive</span></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass overflow-hidden h-[420px] relative"><div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}"><img src="${m.img}"></div>`).join('')}</div></div>
                    <div class="glass p-2 h-[420px] relative"><div class="artist-scroll">${artists.map(a => `<div class="artist-strip"><img src="${a.img}"><div class="absolute bottom-4 left-1/2 -translate-x-1/2 writing-vertical-rl zh text-[10px] opacity-50">${a.zh}</div></div>`).join('')}</div></div>
                </div>
                <div class="px-4"><div class="glass p-8 md:p-12">
                    <div class="mb-6 max-w-2xl mx-auto"><input type="text" id="movieSearch" class="apple-search" placeholder="搜一部你觉得毛天艺没看过的电影 / Search..." oninput="liveSearch()" onkeydown="handleSearchEnter(event)"></div>
                    <div class="mb-10 max-w-2xl mx-auto overflow-x-auto no-scrollbar"><div class="flex gap-3 pb-2">${genres.map(g => `<button onclick="filterByGenre('${g.zh}', this)" class="genre-btn px-6 py-2 rounded-xl bg-white/5 border border-white/10 text-[11px] min-w-[90px] hover:bg-white/10 transition-all"><span class="zh">${g.zh}</span><span class="en opacity-30 text-[8px]">${g.en}</span></button>`).join('')}</div></div>
                    <div id="movie-names" class="movie-list-4col overflow-y-auto max-h-[1000px] pr-4 no-scrollbar"></div>
                </div></div>`;
            updateMovieGrid(movieData);
        }

        function updateMovieGrid(list) {
            const container = document.getElementById('movie-names');
            if(!container) return;
            container.innerHTML = list.map(m => {
                const parts = m.title.split(' / ');
                const cn = parts[0] || "";
                const en = parts[1] || "";
                return `<div class="movie-card opacity-30 hover:opacity-100">
                    <span class="zh text-[11px] mb-0.5">${cn}</span>
                    <span class="en text-[8px] leading-tight break-words">${en}</span>
                </div>`;
            }).join('');
        }

        function liveSearch() {
            const term = document.getElementById('movieSearch').value.toLowerCase();
            updateMovieGrid(movieData.filter(m => m.title.toLowerCase().includes(term)));
        }

        function handleSearchEnter(e) {
            if (e.key === 'Enter') {
                const term = e.target.value.trim().toLowerCase();
                if (term !== '' && !movieData.some(m => m.title.toLowerCase().includes(term))) {
                    document.getElementById('ad-pop').style.display = 'flex';
                }
            }
        }

        function filterByGenre(genre, btn) {
            document.querySelectorAll('.genre-btn').forEach(b => b.style.borderColor = 'rgba(255,255,255,0.1)');
            btn.style.borderColor = 'rgba(255,255,255,0.5)';
            updateMovieGrid(genre === '全部' ? movieData : movieData.filter(m => m.title.includes(genre)));
        }

        function renderCoach() {
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">运动教学</span><span class="en text-sm mt-2 opacity-30">Coach</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
                    <div class="glass p-12 text-center hover:bg-white/5 transition"><span class="zh text-2xl">增肌减脂</span></div>
                    <div class="glass p-12 text-center hover:bg-white/5 transition"><span class="zh text-2xl">力量训练</span></div>
                    <div class="glass p-12 text-center hover:bg-white/5 transition"><span class="zh text-2xl">动作优化</span></div>
                </div>`;
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'photo') renderPhoto();
                else if(page === 'video') renderVideo();
                else if(page === 'coach') renderCoach();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 300);
        }

        function openViewer(prefix, index, count) {
            currentImgList = Array.from({length: count}, (_, i) => `${prefix}${i+1}.png`);
            currentIndex = 0; updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }
        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function nextImg() { currentIndex = (currentIndex + 1) % currentImgList.length; updateViewer(); }
        function prevImg() { currentIndex = (currentIndex - 1 + currentImgList.length) % currentImgList.length; updateViewer(); }
        function updateViewer() { document.getElementById('viewer-img').src = currentImgList[currentIndex]; }
        function closeAd() { document.getElementById('ad-pop').style.display = 'none'; }
        function toggleMusic(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); updateMusicIcon(); }
        function updateMusicIcon() {
            document.getElementById('icon-playing').classList.toggle('hidden', audio.paused);
            document.getElementById('icon-paused').classList.toggle('hidden', !audio.paused);
        }

        window.addEventListener('load', () => {
            renderHome();
            app.style.opacity = '1';
        });
    </script>
</body>
</html>
