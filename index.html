<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
        }

        /* 龙鳞装滚动 - 电影人生版 */
        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; align-items: stretch; height: 100%; width: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer; position: relative; height: 100%; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 艺人条 */
        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; overflow: hidden; transition: all 0.5s ease; border-radius: 4px; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        /* 平面设计：龙鳞堆叠框 */
        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; margin-bottom: 1rem; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; box-shadow: -5px 0 15px rgba(0,0,0,0.4); }
        .stack-layer:hover { transform: translateX(15px) scale(1.02); z-index: 60 !important; }

        /* 密集摄影瀑布流 */
        .tight-photo-grid { columns: 3; gap: 0.25rem; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }

        /* 电影名四列 */
        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }

        #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; items: center; justify-content: center; }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-30 hover:opacity-100 transition p-2" onclick="toggleMusic(event)">
            <svg id="icon-playing" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5L6 9H2v6h4l5 4V5z m8 0a10 10 0 0 1 0 14 m-3.5-3.5a5 5 0 0 0 0-7"></path></svg>
            <svg id="icon-paused" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500" onclick="handleGlobalClick()"></div>

    <div id="viewer" onclick="closeViewer()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light z-[1100]">×</button>
        <div class="flex items-center gap-8 w-full justify-center px-4" onclick="event.stopPropagation()">
            <button class="text-5xl opacity-20 hover:opacity-100 transition" onclick="prevImg()">‹</button>
            <img id="viewer-img" src="" class="max-h-[80vh] max-w-[80vw] object-contain rounded shadow-2xl">
            <button class="text-5xl opacity-20 hover:opacity-100 transition" onclick="nextImg()">›</button>
        </div>
    </div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        let currentImgList = [];
        let currentIndex = 0;

        function handleGlobalClick() { if (audio.paused) audio.play().catch(()=>{}); updateMusicIcon(); }
        function toggleMusic(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); updateMusicIcon(); }
        function updateMusicIcon() {
            document.getElementById('icon-playing').classList.toggle('hidden', audio.paused);
            document.getElementById('icon-paused').classList.toggle('hidden', !audio.paused);
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'photo') renderPhoto();
                else if(page === 'coach') renderCoach();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span><span class="en text-[10px]">Business Sectors</span>
                        </div>
                        <div class="biz-sub-layer absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">平面设计</span><span class="en text-[9px]">Design</span></div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photo</span></div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">运动教学</span><span class="en text-[9px]">Coach</span></div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Life</span></div>
                    <div class="glass p-10 opacity-30"><span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">Loading...</span></div>
                </div>`;
        }

        // 平面设计 - 沿用龙鳞堆叠框版
        function renderWorks() {
            const projects = [
                {zh: '离不了', prefix: '平面设计/离不了', count: 4},
                {zh: '新保龄运动', prefix: '平面设计/新保龄运动', count: 6},
                {zh: '血液涅槃', prefix: '平面设计/血液涅槃', count: 4},
                {zh: '健身工厂', prefix: '平面设计/健身工厂', count: 5}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light">视觉作品集</span><span class="en text-sm mt-2 opacity-30">Portfolio</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${projects.map(p => `
                        <div class="glass p-6 group">
                            <div class="design-stack">
                                ${Array.from({length: p.count}).map((_, i) => `
                                    <div class="stack-layer shadow-xl" style="left:${i*12}%; z-index:${p.count-i}; background: #111;" 
                                         onclick="openViewer('${p.prefix}', ${i+1}, ${p.count})">
                                        <img src="${p.prefix}${i+1}.png" class="w-full h-full object-cover rounded-lg" loading="lazy">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-4"><span class="zh text-xl">${p.zh}</span></div>
                        </div>`).join('')}
                </div>`;
        }

        // 摄影作品 - 回到极致密集瀑布流
        function renderPhoto() {
            const cats = [{id:'商业摄影', zh:'商业摄影'}, {id:'情绪摄影', zh:'情绪摄影'}, {id:'自媒体摄影', zh:'自媒体摄影'}];
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="zh text-5xl font-light">摄影</span><span class="en text-xs mt-1 opacity-20">Photography</span></div>
                        ${cats.map(c => `<div onclick="loadPhotoSet('${c.id}')" class="glass p-5 cursor-pointer hover:bg-white/10 transition-all border-l-2 border-transparent hover:border-white/40"><span class="zh text-lg">${c.zh}</span></div>`).join('')}
                    </div>
                    <div class="flex-1 glass p-2 overflow-y-auto max-h-[85vh]"><div id="photo-grid" class="tight-photo-grid"></div></div>
                </div>`;
            loadPhotoSet('商业摄影');
        }

        function loadPhotoSet(prefix) {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = '';
            let i = 1;
            const next = () => {
                const img = new Image();
                img.src = `摄影/${prefix}${i}.jpg`;
                img.onload = () => {
                    grid.innerHTML += `<div class="break-inside-avoid mb-1"><img src="${img.src}" class="w-full h-auto rounded-lg"></div>`;
                    i++; if(i < 30) next();
                };
            };
            next();
        }

        // 电影人生 - 回到龙鳞滚动+艺人条，增加四列名单
        function renderCinema() {
            const top10 = [
                {zh:'星际穿越', img:'电影个人十佳海报/星际穿越.png'}, {zh:'杀死比尔', img:'电影个人十佳海报/杀死比尔2.png'},
                {zh:'七宗罪', img:'电影个人十佳海报/七宗罪.png'}, {zh:'美国丽人', img:'电影个人十佳海报/美国丽人.png'},
                {zh:'安吉丽娜朱莉', img:'电影个人十佳海报/安吉丽娜朱莉.jpg'}, {zh:'爱在黎明破晓前', img:'电影个人十佳海报/爱在黎明破晓前.png'},
                {zh:'新世界', img:'电影个人十佳海报/新世界.png'}, {zh:'胭脂扣', img:'电影个人十佳海报/胭脂扣.png'},
                {zh:'被解救的姜戈', img:'电影个人十佳海报/被解救的姜戈.png'}, {zh:'无间道', img:'电影个人十佳海报/无间道.png'}
            ];
            const artists = [
                {zh:'凯拉奈特利', img:'电影 演员导演/凯拉奈特利.jpg'}, {zh:'诺兰', img:'电影 演员导演/诺兰.jpg'},
                {zh:'张国荣', img:'电影 演员导演/张国荣.jpg'}, {zh:'黑泽明', img:'电影 演员导演/黑泽明.jpg'},
                {zh:'朱莉娅罗伯茨', img:'电影 演员导演/朱莉娅罗伯茨.jpg'}, {zh:'昆汀', img:'电影 演员导演/昆汀.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light">电影人生</span><span class="en text-sm mt-2 opacity-30">Archive</span></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass overflow-hidden h-[420px] relative">
                        <div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}"><img src="${m.img}"></div>`).join('')}</div>
                    </div>
                    <div class="glass p-2 h-[420px] relative">
                        <div class="artist-scroll">${artists.map(a => `<div class="artist-strip"><img src="${a.img}"><div class="absolute bottom-4 left-1/2 -translate-x-1/2 writing-vertical-rl zh text-[10px] opacity-50">${a.zh}</div></div>`).join('')}</div>
                    </div>
                </div>
                <div class="px-4"><div class="glass p-10"><div id="movie-names" class="movie-list-4col"></div></div></div>`;
            
            const list = document.getElementById('movie-names');
            list.innerHTML = movieData.slice(0, 120).map(m => `<div class="zh text-[10px] opacity-30 hover:opacity-100 truncate border-l border-white/5 pl-2">${m.title.split(' / ')[0]}</div>`).join('');
        }

        // 运动教学
        function renderCoach() {
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">运动教学</span><span class="en text-sm mt-2 opacity-30">Coach</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
                    <div class="glass p-12 text-center"><span class="zh text-2xl">增肌减脂</span></div>
                    <div class="glass p-12 text-center"><span class="zh text-2xl">力量训练</span></div>
                    <div class="glass p-12 text-center"><span class="zh text-2xl">动作优化</span></div>
                </div>`;
        }

        function openViewer(prefix, index, count) {
            currentImgList = Array.from({length: count}, (_, i) => `${prefix}${i+1}.png`);
            currentIndex = 0; // 强制从首图开始
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }
        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function nextImg() { currentIndex = (currentIndex + 1) % currentImgList.length; updateViewer(); }
        function prevImg() { currentIndex = (currentIndex - 1 + currentImgList.length) % currentImgList.length; updateViewer(); }
        function updateViewer() { document.getElementById('viewer-img').src = currentImgList[currentIndex]; }

        window.onload = () => { switchPage('home'); updateMusicIcon(); }
    </script>
</body>
</html>
