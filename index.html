<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        /* Apple 极致磨砂：更透、更润 */
        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 龙鳞装：横向铺满，极致重叠 */
        .dragon-row {
            display: flex; overflow-x: auto; padding: 20px 0 60px 0; scrollbar-width: none;
            cursor: grab;
        }
        .dragon-row::-webkit-scrollbar { display: none; }
        
        .dragon-card {
            flex: 0 0 160px; /* 卡片宽度 */
            margin-right: -100px; /* 极致重叠：只露出 60px */
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        /* 龙鳞展开效果 */
        .dragon-card:hover { 
            margin-right: 40px; transform: translateY(-15px) scale(1.05); z-index: 100 !important; 
        }

        .dragon-card img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover; 
            border: 0.5px solid rgba(255,255,255,0.1); border-radius: 4px; 
            box-shadow: -15px 0 30px rgba(0,0,0,0.5); background: #111;
        }

        /* 亲吻墙：极致无缝 */
        .kiss-wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; width: 100%; height: 100%; }
        .kiss-item { width: 100%; height: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.9; transition: 0.5s; cursor: pointer; }
        .kiss-item:hover { opacity: 1; transform: scale(1.05); z-index: 10; }

        /* 导航及控制 */
        .back-btn { position: fixed; top: 1.5rem; left: 1.5rem; padding: 0.8rem 1.2rem; border-radius: 1.5rem; z-index: 500; cursor: pointer; }
        .back-btn:hover { background: rgba(255,255,255,0.05); }

        .audio-btn {
            position: fixed; top: 1.5rem; right: 1.5rem;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); cursor: pointer; z-index: 500;
            display: flex; justify-content: center; align-items: center;
        }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
        .pause-icon { width: 10px; height: 12px; border-left: 3px solid #fff; border-right: 3px solid #fff; }

        /* 搜索框 */
        .search-input { background: rgba(255,255,255,0.03); border: none; color: white; padding: 0.8rem 1.2rem; width: 100%; border-radius: 1rem; outline: none; font-size: 0.9rem; }
        .search-input::placeholder { color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 0.05em; }
    
        #app-content { transition: opacity 0.5s ease; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui" class="hidden">
        <div class="back-btn glass" onclick="switchPage('home')"><span class="zh">返回</span><span class="en text-[10px]">HOME</span></div>
        <div id="dynamic-title" class="fixed top-8 left-40 z-50 transition-opacity duration-300 opacity-0">
            <span class="zh text-4xl font-light" id="dt-zh">离不了</span>
            <span class="en text-sm mt-1" id="dt-en">PRELONG DIVORCE</span>
        </div>
    </div>
    
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="icon"></div></div>

    <div id="app-content" class="pt-32 transition-opacity duration-300"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');
        const dt = document.getElementById('dynamic-title');
        const dtZh = document.getElementById('dt-zh');
        const dtEn = document.getElementById('dt-en');

        function playMusic() { if (audio.paused) audio.play().then(() => updateAudioUI(true)).catch(e => console.log(e)); }
        function toggleAudio(e) { e.stopPropagation(); if (audio.paused) { audio.play(); updateAudioUI(true); } else { audio.pause(); updateAudioUI(false); } }
        function updateAudioUI(isPlaying) { icon.className = isPlaying ? 'pause-icon' : 'play-icon'; }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else renderSoon(page);
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 300);
        }

        function renderHome() {
            const menus = [{id:'works', zh:'视觉作品集', en:'Visual Works'}, {id:'cinema', zh:'电影人生', en:'Cinema Life'}, {id:'music', zh:'音乐人生', en:'Music Life'}, {id:'read', zh:'阅读人生', en:'Reading Life'}];
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end px-10 md:px-20 mb-12">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[9vw] font-light leading-none">毛天艺</span>
                        <span class="en text-[5vw] md:text-[2vw] opacity-20 mt-2 tracking-widest uppercase">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-10 md:px-20">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>
            `;
        }

        // 核心修正：视觉作品集，全素材紧密龙鳞化
        function renderWorks() {
            // 严格匹配截图文件名：批判和保龄没有后缀，血液和健身有后缀
            const critical = ['批判1', '批判2', '批判3', '批判4'].map(img => ({img, project:'离不了', projectEn:'PRELONG DIVORCE'}));
            const bowling = ['保龄1', '保龄2', '保龄3', '保龄4', '保龄5', '保龄6'].map(img => ({img, project:'新保龄运动', projectEn:'NEW BOWLING MOVEMENT'}));
            const blood = ['血液1.png', '血液2.png', '血液3.png', '血液4.png'].map(img => ({img, project:'血液涅槃', projectEn:'BLOOD NIRVANA'}));
            const fitness = ['健身1.png', '健身2.png', '健身3.png', '健身4.png', '健身5.png'].map(img => ({img, project:'健身工厂', projectEn:'FITNESS FACTORY'}));

            // 合并所有 19 张图片为一条长龙
            const allImages = [...critical, ...bowling, ...blood, ...fitness];

            app.innerHTML = `
                <div class="mb-4 px-10 md:px-20 text-xs opacity-10 tracking-[0.5em] uppercase">19 ITEMS ARCHIVE WALL</div>
                <div class="dragon-row px-10 md:px-20">
                    ${allImages.map((p, i) => `
                        <div class="dragon-card" style="z-index:${50-i}" 
                             onmouseover="showWorksTitle('${p.project}', '${p.projectEn}')" 
                             onmouseout="hideWorksTitle()">
                            <img src="${p.img}" onerror="this.remove()">
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 动态标题交互
        function showWorksTitle(zh, en) { dtZh.innerText = zh; dtEn.innerText = en; dt.style.opacity = '1'; }
        function hideWorksTitle() { dt.style.opacity = '0'; }

        // 电影人生继续保持极简龙鳞
        function renderCinema() {
            const top10 = [
                {name:'新世界', en:'New World', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/9vHofM6cZonF1Xb1Gcl5CjE3ZkI.jpg'},
                {name:'杀死比尔 2', en:'Kill Bill 2', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/27TeSl3S8pZ1v7BNvL97m9v987E.jpg'},
                {name:'无间道', en:'Infernal Affairs', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/6yDInN27RtoWqO3uQ57Z6C6N7f.jpg'},
                {name:'被解救的姜戈', en:'Django', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/7oWY86pS9YfcP368oXvR707qqPk.jpg'},
                {name:'星际穿越', en:'Interstellar', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/gEU2QniE6E07Qv8vNGp9oYmtp6B.jpg'},
                {name:'胭脂扣', en:'Rouge', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/i9uQUv9EPia99SStpS68Z99986G.jpg'},
                {name:'爱在黎明破晓前', en:'Before Sunrise', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/69Sns8WoYnEJtG69yz6qvev5oM6.jpg'},
                {name:'勇士', en:'Warrior', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/pA0VscSByjM3H9R9Zf61X8k8V1B.jpg'},
                {name:'七宗罪', en:'Se7en', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/69Sns8WoYnEJtG69yz6qvev5oM6.jpg'},
                {name:'美国丽人', en:'American Beauty', poster:'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/w7r3bsiD7YEq6t9Lp9nu6kz9P6O.jpg'}
            ];

            app.innerHTML = `
                <div class="px-10 md:px-20 mb-4"><span class="text-xs opacity-10 tracking-[0.5em] uppercase">CINEMA Top 10 Picks</span></div>
                <div class="dragon-row px-10 md:px-20">
                    ${top10.map((m, i) => `<div class="dragon-card" style="z-index:${20-i}"><img src="${m.poster}"></div>`).join('')}
                </div>
                <div class="p-10 md:p-20"><div class="glass p-10">
                    <input type="text" class="search-input mb-10" placeholder="SEARCH ARCHIVE...">
                    <div class="kiss-wall">${movieData.slice(0, 100).map(m => `<img src="${m.poster}" class="kiss-item" onerror="this.remove()">`).join('')}</div>
                </div></div>
            `;
        }

        function renderSoon(p) { app.innerHTML = `<div class="py-60 text-center glass mx-4"><span class="zh opacity-20 text-4xluppercase">${p} LIFE COMING SOON</span></div>`; }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
