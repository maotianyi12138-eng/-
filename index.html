<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            overflow-x: hidden;
        }

        /* 磨砂玻璃 */
        .glass {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        /* 龙鳞全屏铺满逻辑 */
        .dragon-container { width: 100vw; overflow: hidden; padding: 40px 0 60px 0; }
        .dragon-row { display: flex; width: 100%; justify-content: space-between; align-items: flex-end; padding: 0 2%; }
        .dragon-item {
            flex: 1; margin-right: -4vw; max-width: 180px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center;
        }
        .dragon-item:last-child { margin-right: 0; }
        .dragon-item:hover { margin-right: 2vw; transform: translateY(-15px) scale(1.05); z-index: 100 !important; }

        /* 龙鳞标题文字 */
        .vertical-title {
            writing-mode: vertical-rl; font-size: 10px; margin-bottom: 20px; letter-spacing: 0.4em;
            height: 120px; text-align: right; pointer-events: none; opacity: 0.5;
        }

        .dragon-item img { 
            width: 100%; aspect-ratio: 2/3; object-fit: cover; 
            border: 0.5px solid rgba(255,255,255,0.1); border-radius: 2px; 
            box-shadow: -10px 10px 30px rgba(0,0,0,0.5);
        }

        /* 手机端龙鳞适配 */
        @media (max-width: 768px) {
            .dragon-item { margin-right: -7vw; }
            .dragon-item:hover { margin-right: 1vw; }
            .vertical-title { height: 80px; font-size: 8px; }
        }

        /* 50/50 分割布局 */
        .half-container { display: flex; flex-wrap: wrap; width: 100%; min-height: 100vh; border-top: 0.5px solid rgba(255,255,255,0.1); }
        .side-left { flex: 0 0 50%; padding: 40px; border-right: 0.5px solid rgba(255,255,255,0.1); }
        .side-right { flex: 0 0 50%; padding: 0; background: #050505; }

        @media (max-width: 1024px) {
            .side-left, .side-right { flex: 0 0 100%; border-right: none; }
        }

        /* 电影墙微型格子 */
        .kiss-wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.3; transition: 0.4s; cursor: crosshair; }
        .kiss-item:hover { opacity: 1; transform: scale(1.02); z-index: 10; }

        /* 搜索框 */
        .search-input { 
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 1rem 0; width: 100%; outline: none; 
            font-size: 1.5rem; font-weight: 100; letter-spacing: 0.1em;
        }

        .movie-list { margin-top: 2rem; max-height: 600px; overflow-y: auto; scrollbar-width: none; }
        .movie-list::-webkit-scrollbar { display: none; }
        .movie-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .movie-row:hover { opacity: 1; border-bottom-color: #fff; }

        /* 弹窗及音频 */
        .ad-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .audio-btn { position: fixed; top: 2rem; right: 2rem; width: 40px; height: 40px; border-radius: 50%; border: 0.5px solid rgba(255,255,255,0.2); z-index: 500; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div id="icon" class="border-l-[10px] border-l-white border-y-[6px] border-y-transparent ml-1"></div></div>

    <div id="ad-overlay" class="ad-overlay" onclick="this.style.display='none'">
        <div class="text-center p-10"><span class="block text-4xl font-bold mb-4">他没看过！</span><p class="opacity-30">推荐给毛天艺吧</p></div>
    </div>

    <div id="app-content" class="pt-20 transition-opacity duration-500"></div>

    <script src="movies.js"></script>
    <script>
        const app = document.getElementById('app-content');
        const audio = document.getElementById('main-audio');

        function playMusic() { if (audio.paused) audio.play().catch(()=>{}); }
        function toggleAudio(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[60vh] flex flex-col justify-center px-10 md:px-20">
                    <h1 class="text-[12vw] font-light italic leading-none tracking-tighter mb-10">MAO TIANYI</h1>
                    <div class="flex gap-10">
                        <div onclick="switchPage('cinema')" class="cursor-pointer group"><span class="block text-2xl group-hover:tracking-widest transition-all">电影人生</span><span class="text-[10px] opacity-30 italic">CINEMA LIFE</span></div>
                        <div class="opacity-20 cursor-not-allowed"><span class="block text-2xl">其他模块</span><span class="text-[10px]">COMING SOON</span></div>
                    </div>
                </div>
            `;
        }

        function renderCinema() {
            const top10 = [
                {n:'新世界', e:'NEW WORLD', p:'新世界.png'}, {n:'杀死比尔 2', e:'KILL BILL 2', p:'杀死比尔2.png'},
                {n:'无间道', e:'INFERNAL AFFAIRS', p:'无间道.png'}, {n:'被解救的姜戈', e:'DJANGO', p:'被解救的姜戈.png'},
                {n:'星际穿越', e:'INTERSTELLAR', p:'星际穿越.png'}, {n:'胭脂扣', e:'ROUGE', p:'胭脂扣.png'},
                {n:'爱在黎明', e:'BEFORE SUNRISE', p:'爱在黎明破晓前.png'}, {n:'勇士', e:'WARRIOR', p:'勇士.png'},
                {n:'七宗罪', e:'SE7EN', p:'七宗罪.png'}, {n:'美国丽人', e:'AMERICAN BEAUTY', p:'美国丽人.png'}
            ];

            app.innerHTML = `
                <div class="px-10 mb-2 flex justify-between items-end">
                    <span class="text-4xl font-bold italic opacity-10 uppercase">Top 10 Picks</span>
                    <span onclick="switchPage('home')" class="text-xs cursor-pointer opacity-40 hover:opacity-100">BACK TO HOME</span>
                </div>
                
                <div class="dragon-container"><div class="dragon-row">
                    ${top10.map((m, i) => `
                        <div class="dragon-item" style="z-index:${20-i}">
                            <div class="vertical-title">${m.n}</div>
                            <img src="${m.p}" onerror="this.src='https://via.placeholder.com/200x300/111?text=IMG'">
                        </div>
                    `).join('')}
                </div></div>

                <div class="half-container">
                    <div class="side-left">
                        <input type="text" class="search-input" placeholder="SEARCH ARCHIVE..." oninput="filterMovies(this.value)">
                        <div id="movie-list" class="movie-list">
                            ${movieData.slice(0, 30).map(m => `
                                <div class="movie-row" onclick="document.getElementById('ad-overlay').style.display='flex'">
                                    <span class="text-sm font-medium">${m.title}</span>
                                    <span class="text-[10px] opacity-30">${m.year || 'UNKNOWN'}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="side-right">
                        <div class="kiss-wall">
                            ${movieData.slice(0, 100).map(m => `<img src="${m.poster}" class="kiss-item" onerror="this.remove()">`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        window.filterMovies = (val) => {
            const list = document.getElementById('movie-list');
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(val.toLowerCase())).slice(0, 50);
            list.innerHTML = filtered.map(m => `
                <div class="movie-row" onclick="document.getElementById('ad-overlay').style.display='flex'">
                    <span class="text-sm font-medium">${m.title}</span>
                    <span class="text-[10px] opacity-30">${m.year || ''}</span>
                </div>
            `).join('');
        };

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
