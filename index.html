<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        /* 全局毛玻璃底座 */
        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        
        /* 中英双语字体规范 */
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 音乐控制浮窗 */
        .music-ctrl { position: fixed; top: 2rem; right: 2rem; z-index: 1000; cursor: pointer; }

        /* 龙鳞装核心逻辑 */
        .dragon-container { position: relative; height: 180px; width: 100%; display: flex; align-items: flex-end; padding-bottom: 10px; }
        .dragon-stack { position: absolute; bottom: 0; width: 110px; height: 150px; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.1); transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1); cursor: zoom-in; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        .dragon-stack:hover { transform: translateY(-15px) scale(1.05); z-index: 100 !important; }

        /* 电影人生：个人十佳 & 艺人流式 */
        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; overflow: hidden; transition: all 0.6s ease; border-radius: 4px; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }
        .label-v { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); writing-mode: vertical-rl; text-align: right; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }

        /* 灯箱系统：极致磨砂 */
        #lightbox { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.8); backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .lb-btn { position: absolute; top: 50%; transform: translateY(-50%); padding: 2rem; font-size: 1.5rem; cursor: pointer; opacity: 0.2; transition: 0.3s; }
        .lb-btn:hover { opacity: 1; background: rgba(255,255,255,0.05); }

        /* 海报墙强制显示 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 1s; }
        .kiss-item.loaded { opacity: 0.3; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div class="music-ctrl glass p-4" onclick="toggleMusic(event)">
        <div id="music-icon" class="text-pair items-center">
            <span class="zh text-[10px]" id="m-status">音乐·播</span>
            <span class="en text-[8px]">Audio Control</span>
        </div>
    </div>

    <nav id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] glass px-6 py-3 cursor-pointer opacity-50 hover:opacity-100" onclick="switchPage('home')">
            <span class="zh text-sm">返回</span><span class="en text-[8px]">Back</span>
        </div>
    </nav>

    <div id="lightbox" onclick="closeLB()">
        <div class="lb-btn left-0" onclick="changeImg(-1, event)">←</div>
        <img id="lb-img" src="" class="max-h-[75vh] max-w-[85vw] object-contain rounded shadow-2xl border border-white/10">
        <div class="mt-8 text-center">
            <span class="zh text-2xl" id="lb-zh"></span>
            <span class="en text-[10px] mt-2" id="lb-en"></span>
        </div>
        <div class="lb-btn right-0" onclick="changeImg(1, event)">→</div>
        <div class="absolute top-10 right-10 cursor-pointer opacity-40 hover:opacity-100" onclick="closeLB()">CLOSE ×</div>
    </div>

    <main id="app" class="pt-24 p-6 md:p-16 transition-opacity duration-500"></main>

    <script src="movies.js"></script>
    <script>
        const bgm = document.getElementById('bgm');
        const app = document.getElementById('app');
        const navUI = document.getElementById('nav-ui');
        let isMusicPlaying = false;

        function playMusic() { if(!isMusicPlaying) { bgm.play(); isMusicPlaying = true; updateMusicUI(); } }
        function toggleMusic(e) { e.stopPropagation(); isMusicPlaying ? bgm.pause() : bgm.play(); isMusicPlaying = !isMusicPlaying; updateMusicUI(); }
        function updateMusicUI() { document.getElementById('m-status').innerText = isMusicPlaying ? '音乐·播' : '音乐·停'; }

        // 强力海报解析逻辑
        function getSafePoster(url, title) {
            // 修正杀死比尔和爱在黎明的本地路径，确保与库中一致
            if (title.includes("杀死比尔")) return "杀死比尔.png";
            if (title.includes("爱在黎明")) return "爱在黎明破晓前.png";
            if (!url) return '';
            // 针对海报墙失效的重定向策略
            return url.replace(/img\d.doubanio.com/, 'img2.doubanio.com');
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${[{id:'works',zh:'视觉作品集',en:'Visual Works'},{id:'cinema',zh:'电影人生',en:'Cinema Life'},{id:'music',zh:'音乐人生',en:'Music Life'},{id:'read',zh:'阅读人生',en:'Reading Life'}]
                    .map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>`;
        }

        function renderWorks() {
            const projects = [
                {zh:'离不了', en:'UNSEPARABLE', prefix:'批判', count:4},
                {zh:'新保龄运动', en:'NEW BOWLING', prefix:'保龄', count:6},
                {zh:'血液涅槃', en:'BLOOD NIRVANA', prefix:'血液', count:4},
                {zh:'健身工厂', en:'FITNESS FACTORY', prefix:'健身', count:5}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light">视觉作品集</span><span class="en text-sm mt-2 opacity-30">Visual Concept Archive</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 px-4">
                    ${projects.map(p => `
                        <div class="glass p-8 flex flex-col h-[400px]">
                            <div class="text-pair mb-6"><span class="zh text-2xl">${p.zh}</span><span class="en text-[10px]">${p.en}</span></div>
                            <div class="dragon-container">
                                ${Array.from({length: p.count}).map((_, i) => `
                                    <img src="${p.prefix}${i+1}.png" 
                                         class="dragon-stack" 
                                         style="left:${i*35}px; z-index:${20-i}" 
                                         onclick="openLB('${p.prefix}', ${p.count}, ${i+1}, '${p.zh}', '${p.en}')"
                                         onerror="this.src='https://via.placeholder.com/200x300/11?text=IMG'">
                                `).join('')}
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        function renderCinema() {
            const top10 = [
                {zh:'新世界', en:'New World', img:'新世界.png'}, {zh:'杀死比尔', en:'Kill Bill', img:'杀死比尔.png'},
                {zh:'无间道', en:'Internal Affairs', img:'无间道.png'}, {zh:'姜戈', en:'Django', img:'被解救的姜戈.png'},
                {zh:'星际穿越', en:'Interstellar', img:'星际穿越.png'}, {zh:'胭脂扣', en:'Rouge', img:'胭脂扣.png'},
                {zh:'爱在黎明', en:'Before Sunrise', img:'爱在黎明破晓前.png'}, {zh:'勇士', en:'Warrior', img:'勇士.png'},
                {zh:'七宗罪', en:'Se7en', img:'七宗罪.png'}, {zh:'美国丽人', en:'American Beauty', img:'美国丽人.png'}
            ];
            const artists = [
                {zh:'昆汀', en:'Quentin', img:'昆汀.jpg'}, {zh:'黑泽明', en:'Kurosawa', img:'黑泽明.jpg'},
                {zh:'诺兰', en:'Nolan', img:'诺兰.jpg'}, {zh:'皮特', en:'Brad Pitt', img:'布拉德皮特.jpg'},
                {zh:'休格兰特', en:'Hugh Grant', img:'休格兰特.jpg'}, {zh:'张国荣', en:'Leslie', img:'张国荣.jpg'},
                {zh:'朱莉', en:'Angelina', img:'安吉丽娜朱莉.jpg'}, {zh:'凯拉', en:'Keira', img:'凯拉奈特利.jpg'},
                {zh:'罗伯茨', en:'Julia', img:'朱莉娅罗伯茨.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light">电影人生</span></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass h-[420px] relative overflow-hidden">
                        <div class="dragon-row h-full">
                            ${top10.map((m, i) => `
                                <div class="dragon-item" style="z-index:${20-i}">
                                    <div class="label-v"><span class="zh text-[10px] text-white">${m.zh}</span><span class="en text-[7px] text-white/40 uppercase">${m.en}</span></div>
                                    <img src="${getSafePoster('', m.zh)}">
                                </div>`).join('')}
                        </div>
                    </div>
                    <div class="glass p-2 h-[420px] overflow-hidden">
                        <div class="artist-scroll">
                            ${artists.map(a => `
                                <div class="artist-strip">
                                    <img src="${a.img}">
                                    <div class="label-v"><span class="zh text-[10px] font-bold text-white">${a.zh}</span><span class="en text-[7px] text-white/40">${a.en}</span></div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4">
                    <div class="glass p-10 min-h-[600px]"><input type="text" id="movieSearch" class="bg-white/5 border border-white/10 w-full p-4 rounded-xl outline-none mb-8" placeholder="SEARCH..." oninput="debounceSearch()"><div id="movie-list" class="grid grid-cols-2 gap-4"></div></div>
                    <div class="glass p-1"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>`;
            displayMovies(movieData, true);
        }

        // 电影墙逻辑
        function displayMovies(movies, initWall = false) {
            const list = document.getElementById('movie-list');
            const wall = document.getElementById('cinema-wall');
            if(!list || !wall) return;
            list.innerHTML = movies.slice(0, 60).map(m => `<div class="group border-l border-white/5 pl-4 hover:border-white/40 transition"><span class="zh text-sm opacity-40 group-hover:opacity-100 truncate">${m.title.split(' / ')[0]}</span><span class="en text-[8px] opacity-10 group-hover:opacity-30 truncate">${m.title.split(' / ')[1]||''}</span></div>`).join('');
            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${getSafePoster(m.poster, m.title)}" class="kiss-item lazy">`).join('');
                const obs = new IntersectionObserver((es) => { es.forEach(e => { if(e.isIntersecting){ e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); } })} , {rootMargin:"500px"});
                document.querySelectorAll('.lazy').forEach(img => obs.observe(img));
            }
        }

        // 灯箱逻辑
        let ctx = { p:'', c:0, i:1, zh:'', en:'' };
        function openLB(p, c, i, zh, en) {
            ctx = { p, c, i, zh, en };
            updateLB();
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLB() { document.getElementById('lightbox').style.display = 'none'; }
        function changeImg(s, e) { e.stopPropagation(); ctx.i += s; if(ctx.i > ctx.c) ctx.i=1; if(ctx.i < 1) ctx.i=ctx.c; updateLB(); }
        function updateLB() {
            document.getElementById('lb-img').src = `${ctx.p}${ctx.i}.png`;
            document.getElementById('lb-zh').innerText = ctx.zh;
            document.getElementById('lb-en').innerText = `${ctx.en} (${ctx.i} / ${ctx.c})`;
        }

        let timer;
        function debounceSearch() { clearTimeout(timer); timer = setTimeout(() => { const t = document.getElementById('movieSearch').value.toLowerCase(); displayMovies(movieData.filter(m => m.title.toLowerCase().includes(t))); }, 300); }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
