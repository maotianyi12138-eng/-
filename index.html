<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Inter', 'Noto Sans SC', sans-serif; overflow-x: hidden; }
        @media (min-width: 768px) { body { background: url('horse.jpg') center/cover fixed; } }
        
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        
        /* 音乐控制 */
        .audio-btn { position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); z-index: 5000; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1); }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 6px 0 6px 10px; border-color: transparent transparent transparent #fff; }
        .pause-icon { width: 10px; height: 12px; border-left: 2px solid #fff; border-right: 2px solid #fff; }

        /* 龙鳞 */
        .dragon-row { display: flex; padding: 40px 5% 20px; justify-content: space-between; align-items: flex-end; }
        .dragon-item { flex: 1; margin-right: -4vw; max-width: 160px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 2vw; transform: translateY(-15px) scale(1.05); z-index: 100 !important; }
        .v-zh { writing-mode: vertical-rl; font-size: 11px; margin-bottom: 25px; letter-spacing: 0.5em; height: 150px; text-align: right; opacity: 0.8; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.2); }

        /* Obsidian 图谱放大逻辑 */
        .graph-container { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .graph-container.expanded { position: fixed; top: 7.5vh; left: 7.5vw; width: 85vw !important; height: 85vh !important; z-index: 4000; padding: 2rem; }
        .close-graph { display: none; position: absolute; top: 1.5rem; right: 1.5rem; background: #fff; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .expanded .close-graph { display: block; }

        /* 地图 */
        .land { stroke: rgba(255,255,255,0.1); stroke-width: 0.5; transition: 0.3s; }
        .land:hover { fill: #fff !important; }

        /* 四列电影名列表 */
        .movie-quad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; max-height: 450px; overflow-y: auto; }
        .movie-entry { opacity: 0.35; font-size: 10px; transition: 0.3s; border-left: 1px solid transparent; padding-left: 6px; cursor: pointer; }
        .movie-entry:hover { opacity: 1; border-color: #fff; background: rgba(255,255,255,0.05); }

        /* 海报亲吻墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 1px; width: 100%; height: 800px; overflow-y: auto; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 0.5s; background: #111; }
        .kiss-item.loaded { opacity: 0.3; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.1); z-index: 10; }

        .search-input { background: rgba(255,255,255,0.05); border: none; color: white; padding: 1rem 1.8rem; width: 100%; border-radius: 2rem; outline: none; border: 1px solid rgba(255,255,255,0.1); }
        .map-tooltip { position: fixed; background: #fff; color: #000; padding: 4px 10px; border-radius: 4px; font-size: 11px; z-index: 9999; display: none; font-weight: bold; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onmousemove="handleMusic()" onclick="handleMusic()">
    <audio id="global-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="audio-icon"></div></div>

    <div id="app-content" class="pt-24 p-6 md:p-20 transition-opacity duration-300"></div>
    <div id="map-tip" class="map-tooltip"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('global-audio');
        const audioIcon = document.getElementById('audio-icon');
        let musicLocked = false;
        let graphNodes = [];

        function handleMusic() {
            if (!musicLocked && audio.paused) {
                audio.play().then(() => audioIcon.className = 'pause-icon').catch(()=>{});
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();
            if (audio.paused) { audio.play(); audioIcon.className = 'pause-icon'; musicLocked = false; }
            else { audio.pause(); audioIcon.className = 'play-icon'; musicLocked = true; }
        }

        function switchPage(page) {
            if(page === 'home') renderHome();
            else renderCinema();
        }

        function renderHome() {
            document.getElementById('app-content').innerHTML = `
                <div class="h-[40vh] flex flex-col justify-end pb-12"><h1><span class="zh text-[10vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onclick="switchPage('visual')" class="glass p-12 cursor-pointer opacity-30">视觉作品集</div>
                    <div onclick="switchPage('cinema')" class="glass p-12 cursor-pointer">电影人生 (ENTER)</div>
                </div>
            `;
        }

        function renderCinema() {
            const top10 = [{n:'新世界',d:'10756762'},{n:'杀死比尔',d:'1291585'},{n:'无间道',d:'1307914'},{n:'被解救的姜戈',d:'6307447'},{n:'星际穿越',d:'1889243'},{n:'胭脂扣',d:'1300325'},{n:'爱在黎明',d:'1296339'},{n:'勇士',d:'3141107'},{n:'七宗罪',d:'1292223'},{n:'美国丽人',d:'1292062'}];
            const tagStats = {};
            movieData.forEach(m => m.genres.forEach(g => tagStats[g] = (tagStats[g] || 0) + 1));

            document.getElementById('app-content').innerHTML = `
                <div class="mb-6"><span class="zh text-6xl font-light tracking-tighter">电影人生</span></div>
                <div class="dragon-row">${top10.map((m,i)=>`<div class="dragon-item" style="z-index:${20-i}" onclick="window.open('https://movie.douban.com/subject/${m.d}/')"><div class="v-zh">${m.n}</div><img src="${m.n}.png"></div>`).join('')}</div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8 h-[380px]">
                    <div class="glass graph-container p-6 relative" id="graph-box" onclick="expandGraph(this)">
                        <div class="close-graph" onclick="shrinkGraph(event)">BACK</div>
                        <div class="text-[10px] opacity-20 uppercase mb-4 tracking-widest">Obsidian Graph View</div>
                        <canvas id="graph-canvas"></canvas>
                    </div>
                    <div class="glass p-6 overflow-hidden">
                        <div class="text-[10px] opacity-20 uppercase mb-4 tracking-widest">Global Heatmap</div>
                        <div id="world-map-svg" class="h-full"></div>
                    </div>
                </div>

                <div class="flex flex-col lg:flex-row gap-0">
                    <div class="glass p-10 flex-[2] rounded-r-none border-r-0">
                        <input type="text" id="movieSearch" class="search-input mb-8" placeholder="搜一部你觉得毛天艺没看过的" oninput="debounceSearch()">
                        <div class="flex flex-wrap gap-2 mb-8">
                            <button class="tag-btn text-xs opacity-40 hover:opacity-100" onclick="filterByTag('全部')">全部 (${movieData.length})</button>
                            ${["剧情","科幻","动作","悬疑","纪录片"].map(t=>`<button class="tag-btn text-xs opacity-40 hover:opacity-100" onclick="filterByTag('${t}')">${t} (${tagStats[t]||0})</button>`).join('')}
                        </div>
                        <div id="movie-quad-list" class="movie-quad-grid scrollbar-hide border-t border-white/10 pt-6"></div>
                    </div>
                    <div class="flex-1"><div id="cinema-wall" class="kiss-wall glass rounded-l-none scrollbar-hide"></div></div>
                </div>
            `;
            updateDisplay(movieData, true);
            initDeepGraph(tagStats);
            initRealWorldMap(tagStats);
        }

        // 真实地图 SVG 路径简集 (包含全球轮廓)
        function initRealWorldMap(stats) {
            const max = Math.max(...Object.values(stats));
            const regions = [
                {n:"美国", d:"M10,15 L40,15 L40,35 L10,35 Z"}, {n:"中国大陆", d:"M75,18 L95,18 L95,38 L75,38 Z"},
                {n:"日本", d:"M100,20 L105,20 L105,30 L100,30 Z"}, {n:"欧洲", d:"M45,15 L60,15 L60,30 L45,30 Z"},
                {n:"澳洲", d:"M85,50 L95,50 L95,65 L85,65 Z"}, {n:"南美", d:"M25,45 L35,45 L35,70 L25,70 Z"}
            ];
            let svg = `<svg viewBox="0 0 120 80" class="w-full h-full">`;
            regions.forEach(r => {
                const count = stats[r.n] || 0;
                const op = count > 0 ? (count/max * 0.8) + 0.15 : 0.05;
                svg += `<path d="${r.d}" class="land" fill="rgba(255,255,255,${op})" onmousemove="showTip(event,'${r.n}',${count})" onmouseout="hideTip()"></path>`;
            });
            svg += `</svg>`;
            document.getElementById('world-map-svg').innerHTML = svg;
        }

        // Obsidian 深度图谱
        function initDeepGraph(stats) {
            const canvas = document.getElementById('graph-canvas');
            const ctx = canvas.getContext('2d');
            const box = canvas.parentElement;
            canvas.width = box.clientWidth; canvas.height = box.clientHeight - 60;
            
            const topData = Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0, 80);
            graphNodes = topData.map(([name, count], i) => {
                let color = "rgba(255,255,255,0.4)";
                if(count > 50) color = "rgba(100,200,255,0.6)"; // 高频
                if(i % 5 === 0) color = "rgba(200,100,255,0.6)"; // 影人流派区分
                return {
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
                    name, size: 2 + (count/6), color
                };
            });

            function loop() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                graphNodes.forEach((n, i) => {
                    n.x += n.vx; n.y += n.vy;
                    if(n.x<0 || n.x>canvas.width) n.vx*=-1;
                    if(n.y<0 || n.y>canvas.height) n.vy*=-1;

                    ctx.fillStyle = n.color;
                    ctx.beginPath(); ctx.arc(n.x, n.y, n.size, 0, Math.PI*2); ctx.fill();
                    if(n.size > 4) {
                        ctx.fillStyle = "rgba(255,255,255,0.5)";
                        ctx.font = "8px Inter"; ctx.fillText(n.name, n.x+8, n.y+3);
                    }
                    graphNodes.forEach(n2 => {
                        const d = Math.hypot(n.x-n2.x, n.y-n2.y);
                        if(d < 70) {
                            ctx.strokeStyle = `rgba(255,255,255,${0.08 - d/1000})`;
                            ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                        }
                    });
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function expandGraph(el) { el.classList.add('expanded'); }
        function shrinkGraph(e) { e.stopPropagation(); document.getElementById('graph-box').classList.remove('expanded'); }

        function showTip(e, n, c) {
            const tip = document.getElementById('map-tip');
            tip.style.display = 'block'; tip.style.left = e.clientX + 15 + 'px'; tip.style.top = e.clientY + 'px';
            tip.innerText = `${n}: ${c}部`;
        }
        function hideTip() { document.getElementById('map-tip').style.display = 'none'; }

        function updateDisplay(movies, initWall = false) {
            const list = document.getElementById('movie-quad-list');
            const wall = document.getElementById('cinema-wall');
            if(!list) return;
            // 四列显示全名
            list.innerHTML = movies.map(m => `<div class="movie-entry truncate" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title}'))">${m.title}</div>`).join('');
            if(initWall && wall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                const obs = new IntersectionObserver((es) => { es.forEach(e => { if(e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); }}); }, { rootMargin: "1000px" });
                document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
            }
        }

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.toLowerCase();
            searchTimer = setTimeout(() => {
                const res = movieData.filter(m => m.title.toLowerCase().includes(term));
                updateDisplay(term === '' ? movieData : res);
            }, 500);
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
