<script>
    const audio = document.getElementById('global-bgm');
    const app = document.getElementById('app-content');

    // 统一 UI 更新函数（兼容页面切换后的元素查找）
    function upUI(p) {
        const statusText = document.getElementById('m-status');
        const bars = document.querySelectorAll('.bar');
        if (statusText) statusText.innerText = p ? "On" : "Off";
        bars.forEach(b => p ? b.classList.remove('bar-p') : b.classList.add('bar-p'));
    }

    // 激活音频监听
    document.addEventListener('click', function initAudio() {
        if (audio.paused && localStorage.getItem('mPlay') !== 'false') {
            audio.play().then(() => {
                upUI(true);
                localStorage.setItem('mPlay', 'true');
                document.removeEventListener('click', initAudio);
            }).catch(() => {});
        }
    });

    function toggleMusic(e) {
        if(e) e.stopPropagation();
        if (audio.paused) { 
            audio.play(); upUI(true); localStorage.setItem('mPlay', 'true'); 
        } else { 
            audio.pause(); upUI(false); localStorage.setItem('mPlay', 'false'); 
        }
    }

    async function router(url) {
        app.classList.add('page-fade');
        
        try {
            const res = await fetch(url);
            const text = await res.text();
            const dom = new DOMParser().parseFromString(text, 'text/html');
            const newContent = dom.getElementById('app-content');
            
            setTimeout(() => {
                // 1. 替换 HTML 内容
                app.innerHTML = newContent.innerHTML;
                
                // 2. 【关键修复】手动执行新页面中的脚本
                const scripts = newContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });

                // 3. 更新状态
                history.pushState({url}, '', url);
                window.scrollTo(0, 0);
                app.classList.remove('page-fade');
                
                // 4. 确保切换后 UI 状态正确
                setTimeout(() => upUI(!audio.paused), 50);
            }, 400);
        } catch (err) {
            console.error("Navigation failed:", err);
            window.location.href = url; // 失败则普通跳转备份
        }
    }

    window.onpopstate = () => location.reload();
</script>
