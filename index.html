<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 个人十佳龙鳞装：横向铺满 */
        .dragon-row { 
            display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; 
            align-items: stretch; height: 100%; width: 100%;
        }
        .dragon-item {
            flex: 0 0 160px; margin-right: -100px; 
            transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            cursor: pointer; position: relative; height: 100%;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; }
        .dragon-label {
            position: absolute; bottom: 20px; left: 10px; z-index: 10;
            writing-mode: vertical-rl; pointer-events: none;
        }

        /* 艺人流式条 */
        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow: hidden; }
        .artist-strip { 
            flex: 1; position: relative; overflow: hidden; 
            transition: all 0.5s ease; border-radius: 4px;
        }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }
        .artist-info {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            writing-mode: vertical-rl; text-align: right; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        /* 电影墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 1s; }
        .kiss-item.loaded { opacity: 0.35; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.02); z-index: 5; }

        .search-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 1rem 1.5rem; width: 100%; border-radius: 1.2rem; outline: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="fixed top-8 left-8 z-[500] text-pair cursor-pointer opacity-50 hover:opacity-100" onclick="switchPage('home')"><span class="zh">返回</span><span class="en text-[10px]">Return</span></div></div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');

        function playMusic() { if (audio.paused) audio.play().catch(()=>{}); }
        
        // 核心：海报修复逻辑
        function fixPosterUrl(url) {
            if (!url) return '';
            // 强力替换：针对豆瓣防盗链，将 img1/img3 统一重定向到更开放的源，或添加直接解析前缀
            return url.replace('img1.doubanio.com', 'img2.doubanio.com')
                      .replace('img3.doubanio.com', 'img2.doubanio.com')
                      .replace('img9.doubanio.com', 'img2.doubanio.com');
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${[
                        {id:'works', zh:'视觉作品集', en:'Visual Works'},
                        {id:'cinema', zh:'电影人生', en:'Cinema Life'},
                        {id:'music', zh:'音乐人生', en:'Music Life'},
                        {id:'read', zh:'阅读人生', en:'Reading Life'}
                    ].map(m => `
                        <div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all">
                            <span class="zh text-2xl mb-2">${m.zh}</span>
                            <span class="en text-[10px]">${m.en}</span>
                        </div>`).join('')}
                </div>`;
        }

        function renderCinema() {
            // 个人十佳：完整中英对照
            const top10 = [
                {zh:'新世界', en:'New World', img:'新世界.png'},
                {zh:'杀死比尔', en:'Kill Bill', img:'杀死比尔2.png'},
                {zh:'无间道', en:'Internal Affairs', img:'无间道.png'},
                {zh:'姜戈', en:'Django Unchained', img:'被解救的姜戈.png'},
                {zh:'星际穿越', en:'Interstellar', img:'星际穿越.png'},
                {zh:'胭脂扣', en:'Rouge', img:'胭脂扣.png'},
                {zh:'爱在黎明破晓前', en:'Before Sunrise', img:'爱在黎明破晓前.png'},
                {zh:'勇士', en:'Warrior', img:'勇士.png'},
                {zh:'七宗罪', en:'Se7en', img:'七宗罪.png'},
                {zh:'美国丽人', en:'American Beauty', img:'美国丽人.png'}
            ];

            const allArtists = [
                {zh:'昆汀', en:'Quentin Tarantino', img:'昆汀.jpg'},
                {zh:'黑泽明', en:'Akira Kurosawa', img:'黑泽明.jpg'},
                {zh:'诺兰', en:'Christopher Nolan', img:'诺兰.jpg'},
                {zh:'皮特', en:'Brad Pitt', img:'布拉德皮特.jpg'},
                {zh:'休格兰特', en:'Hugh Grant', img:'休格兰特.jpg'},
                {zh:'张国荣', en:'Leslie Cheung', img:'张国荣.jpg'},
                {zh:'朱莉', en:'Angelina Jolie', img:'安吉丽娜朱莉.jpg'},
                {zh:'凯拉', en:'Keira Knightley', img:'凯拉奈特利.jpg'},
                {zh:'罗伯茨', en:'Julia Roberts', img:'朱莉娅罗伯茨.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col">
                    <span class="zh text-6xl font-light tracking-tighter">电影人生</span>
                    <span class="en text-sm mt-2 opacity-30">Cinema Archive & Collection</span>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass overflow-hidden h-[420px] relative">
                        <div class="absolute top-6 left-8 z-30"><span class="en text-[10px] opacity-40 tracking-[0.5em]">PERSONAL TOP 10</span></div>
                        <div class="dragon-row">
                            ${top10.map((m, i) => `
                                <div class="dragon-item" style="z-index:${20-i}">
                                    <div class="dragon-label">
                                        <span class="zh text-[11px] text-white/90">${m.zh}</span>
                                        <span class="en text-[7px] text-white/30 uppercase mt-2">${m.en}</span>
                                    </div>
                                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/11?text=${m.zh}'">
                                </div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="glass p-2 h-[420px] relative">
                        <div class="absolute top-6 left-8 z-30"><span class="en text-[10px] opacity-40 tracking-[0.5em]">FAVORITE ARTISTS</span></div>
                        <div class="artist-scroll">
                            ${allArtists.map(a => `
                                <div class="artist-strip">
                                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/300x600/11?text=${a.zh}'">
                                    <div class="artist-info">
                                        <span class="zh text-[11px] font-bold text-white/90">${a.zh}</span>
                                        <span class="en text-[7px] text-white/40 uppercase">${a.en}</span>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4">
                    <div class="glass p-10 min-h-[600px]">
                        <input type="text" id="movieSearch" class="search-input mb-10" placeholder="搜一部你觉得毛天艺没看过的电影..." oninput="debounceSearch()">
                        <div id="movie-list-grid" class="grid grid-cols-2 gap-y-4 gap-x-6"></div>
                    </div>
                    <div class="glass p-1 h-fit"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;

            // 搜索列表：中英双语，中文大英文小
            listGrid.innerHTML = movies.slice(0, 80).map(m => {
                const names = m.title.split(' / ');
                return `
                <div class="group cursor-default border-l border-white/5 pl-4 hover:border-white/30 transition">
                    <span class="zh text-sm opacity-40 group-hover:opacity-100 truncate transition">${names[0]}</span>
                    <span class="en text-[8px] opacity-10 group-hover:opacity-30 truncate transition">${names[1] || ''}</span>
                </div>`;
            }).join('');

            if(initWall) {
                wall.innerHTML = movieData.map(m => `
                    <img data-src="${fixPosterUrl(m.poster)}" 
                         class="kiss-item lazy-item" 
                         onerror="this.src='https://via.placeholder.com/200x300/11?text=404'">
                `).join('');
                
                const observer = new IntersectionObserver((entries) => { 
                    entries.forEach(entry => { 
                        if (entry.isIntersecting) { 
                            const img = entry.target; 
                            img.src = img.dataset.src; 
                            img.onload = () => img.classList.add('loaded'); 
                            observer.unobserve(img); 
                        } 
                    });
                }, { rootMargin: "600px" });
                document.querySelectorAll('.lazy-item').forEach(img => observer.observe(img));
            }
        }

        // 搜索防抖
        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = document.getElementById('movieSearch').value.trim().toLowerCase();
                const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
                displayMovies(filtered);
            }, 300);
        }

        function renderWorks() {
            const workList = [
                {zh: '离不了', en: 'UNSEPARABLE', img: '批判1.png'},
                {zh: '新保龄运动', en: 'NEW BOWLING', img: '保龄1.png'},
                {zh: '血液涅槃', en: 'BLOOD NIRVANA', img: '血液1.png'},
                {zh: '健身工厂', en: 'FITNESS FACTORY', img: '健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col">
                    <span class="zh text-6xl font-light tracking-tighter">视觉作品集</span>
                    <span class="en text-sm mt-2 opacity-30">Visual & Concept Portfolio</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${workList.map(w => `
                        <div class="glass p-5 group">
                            <div class="aspect-[2/1] overflow-hidden rounded-2xl">
                                <img src="${w.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            </div>
                            <div class="mt-6 flex flex-col">
                                <span class="zh text-xl">${w.zh}</span>
                                <span class="en text-[9px] opacity-30 mt-1">${w.en}</span>
                            </div>
                        </div>`).join('')}
                </div>`;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
