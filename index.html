<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Times New Roman', 'Noto Sans SC', serif;
            background-size: cover; background-position: center; 
            background-attachment: fixed; /* 电脑端保持固定 */
            overflow-x: hidden;
            transition: background-image 0.8s ease-in-out;
        }
        
        /* 移除全局所有加粗 */
        * { font-weight: 300 !important; }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { 
            body { 
                background-image: url('mobile_bg.jpg'); 
                background-attachment: scroll; /* 手机端禁止缩放关键：改为跟随滚动 */
            } 
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .en-main { display: block; letter-spacing: 0.05em; text-transform: uppercase; }
        .zh-sub { display: block; opacity: 0.4; font-size: 0.75rem; line-height: 1.2; }
        
        .nav-active { border-left: 2px solid rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        .video-card-mini { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 1rem; transition: transform 0.3s ease; }
        .video-card-mini:hover { transform: scale(1.02); }

        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }
        .stack-layer:hover { transform: translateX(15px) scale(1.02); z-index: 60 !important; }

        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; height: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: 0.6s ease; cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        .artist-scroll { display: flex; gap: 4px; height: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; transition: 0.5s ease; border-radius: 4px; overflow: hidden; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }

        .apple-search {
            background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
        }

        #viewer, #ad-pop { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #viewer { background: rgba(0,0,0,0.98); }

        body.reading-page { background:#cdd2d2!important; background-image:none!important; }
        body.reading-page #app-content { min-height:100svh; padding:0!important; }
        body.reading-page #music-toggle { display:none; }
        body.reading-page #back-btn {
            top:24px; left:24px; padding:11px 15px; color:#151819; opacity:.78;
            background:rgba(239,235,220,.74); border:1px solid rgba(21,24,25,.36);
            box-shadow:7px 8px 0 rgba(21,24,25,.12); backdrop-filter:blur(8px);
        }
        .reading-inline-frame { display:block; width:100%; height:100svh; border:0; background:#cdd2d2; }
        @media (max-width:760px) {
            .reading-inline-frame { height:200svh; }
            body.reading-page #back-btn { top:10px; left:10px; padding:7px 10px; box-shadow:4px 5px 0 rgba(21,24,25,.1); }
        }

        .thoughts-grid { width:min(1680px,100%); margin:0 auto; display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; align-items:start; }
        .thought-card { position:relative; min-width:0; height:270px; overflow:hidden; display:flex; flex-direction:column; background:rgba(9,10,10,.34); border:1px solid rgba(255,255,255,.13); padding:1.15rem; border-radius:1.2rem; cursor:pointer; transition:background .3s,transform .3s,border-color .3s; box-shadow:0 18px 40px rgba(0,0,0,.14); }
        .thought-card:after { content:""; position:absolute; z-index:2; left:0; right:0; bottom:0; height:42%; background:linear-gradient(transparent,rgba(8,9,9,.94)); pointer-events:none; transition:opacity .25s; }
        .thought-card:hover { background:rgba(255,255,255,.075); transform:translateY(-3px); border-color:rgba(255,255,255,.24); }
        .thought-card.expanded { grid-column:span 2; height:auto; min-height:270px; max-height:none; background:rgba(8,9,9,.68); border-color:rgba(255,255,255,.27); cursor:zoom-out; }
        .thought-card.expanded:after { opacity:0; }
        .thought-date { flex:0 0 auto; }
        .thought-text { position:relative; z-index:1; margin:0; color:rgba(255,255,255,.9); font:300 13px/1.72 'Noto Sans SC',sans-serif; white-space:pre-line; display:-webkit-box; -webkit-line-clamp:10; -webkit-box-orient:vertical; overflow:hidden; }
        .thought-card.expanded .thought-text { display:block; overflow:visible; }
        .thought-expand-hint { position:absolute; z-index:3; left:1.15rem; bottom:.85rem; color:rgba(255,255,255,.54); font:300 8px/1 'Noto Sans SC',sans-serif; letter-spacing:.12em; }
        .thought-card.expanded .thought-expand-hint { position:relative; left:auto; bottom:auto; margin-top:1.1rem; align-self:flex-end; }
        .thought-images { display:none; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:1rem; }
        .thought-card.expanded .thought-images { display:grid; }
        .thought-image-item { width: 100%; border: 0; padding: 0; background: transparent; border-radius: 10px; overflow: hidden; cursor: zoom-in; }
        .thought-image-item img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; display: block; transition: transform 0.25s ease; }
        .thought-image-item:hover img { transform: scale(1.03); }
        @media (max-width: 767px) {
            .thoughts-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
            .thought-card { height:220px; min-height:0; padding:.9rem; border-radius:1rem; }
            .thought-card.expanded { grid-column:1/-1; height:auto; min-height:220px; }
            .thought-text { font-size:11px; line-height:1.65; -webkit-line-clamp:9; }
            .thought-expand-hint { left:.9rem; bottom:.7rem; }
        }
        @media (min-width:768px) and (max-width:1023px) {
            .thoughts-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
            .thought-card.expanded { grid-column:span 2; }
        }

        .ink-gallery-shell { position:relative; width:min(1700px,100%); margin:0 auto; padding:clamp(18px,3vw,42px) 0 clamp(22px,4vw,54px); overflow:hidden; border:1px solid rgba(255,255,255,.12); border-radius:1.5rem; background:linear-gradient(110deg,rgba(255,255,255,.05),rgba(4,4,4,.28)); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); box-shadow:0 35px 90px rgba(0,0,0,.24); }
        .ink-gallery-track { display:grid; grid-auto-flow:column; grid-auto-columns:clamp(250px,28vw,390px); gap:clamp(18px,2.5vw,38px); overflow-x:auto; scroll-snap-type:x mandatory; overscroll-behavior-x:contain; scrollbar-width:none; padding:8px clamp(26px,5vw,76px) 24px; }
        .ink-gallery-track::-webkit-scrollbar { display:none; }
        .ink-frame { scroll-snap-align:center; position:relative; min-height:clamp(390px,61vh,720px); display:grid; grid-template-rows:1fr auto; padding:clamp(12px,1.5vw,20px); color:#171512; background:#ded6c3; border:clamp(8px,1vw,14px) solid #24211d; box-shadow:0 20px 36px rgba(0,0,0,.38),inset 0 0 0 3px rgba(255,255,255,.44); transform:rotate(var(--tilt,0deg)); cursor:zoom-in; }
        .ink-frame:before { content:""; position:absolute; inset:7px; border:1px solid rgba(255,255,255,.35); pointer-events:none; }
        .ink-frame:nth-child(3n+1) { --tilt:-.4deg; }
        .ink-frame:nth-child(3n+2) { --tilt:.35deg; }
        .ink-art { min-height:0; display:grid; place-items:center; overflow:hidden; background:#f1ede2; }
        .ink-art img { width:100%; height:100%; object-fit:contain; display:block; filter:contrast(1.02) saturate(.94); transition:transform .45s; }
        .ink-frame:hover .ink-art img { transform:scale(1.025); }
        .ink-caption { display:flex; justify-content:space-between; gap:12px; padding:12px 2px 0; color:#24211d; font:300 9px/1.4 'Noto Sans SC',sans-serif; letter-spacing:.1em; }
        .ink-gallery-controls { display:flex; justify-content:center; align-items:center; gap:14px; }
        .ink-gallery-controls button { width:42px; height:42px; border:1px solid rgba(255,255,255,.24); border-radius:50%; color:white; background:rgba(0,0,0,.32); cursor:pointer; transition:.2s; }
        .ink-gallery-controls button:hover { background:rgba(255,255,255,.16); }
        .ink-gallery-count { min-width:76px; text-align:center; color:rgba(255,255,255,.55); font-size:9px; letter-spacing:.14em; }
        .ink-empty { min-height:56vh; display:grid; place-items:center; padding:32px; text-align:center; color:rgba(255,255,255,.66); }
        @media (max-width:767px) {
            .ink-gallery-shell { border-radius:1rem; padding-top:12px; }
            .ink-gallery-track { grid-auto-columns:82vw; gap:16px; padding-inline:9vw; }
            .ink-frame { min-height:57svh; border-width:8px; padding:10px; }
        }
        .works-project-cover { aspect-ratio: 4 / 3; object-fit: cover; width: 100%; }
        .works-detail-main { max-height: 72vh; width: 100%; object-fit: contain; background: #000; }
        .works-thumb { width: 68px; height: 68px; object-fit: cover; border-radius: 8px; opacity: 0.45; border: 1px solid rgba(255,255,255,0.1); transition: opacity 0.2s ease; }
        .works-thumb:hover, .works-thumb.active { opacity: 1; }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui">
        <div id="back-btn" class="fixed top-4 left-4 md:top-8 md:left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition hidden" onclick="switchPage('home')">
            <span class="en-main text-[10px]">Return</span><span class="zh-sub">返回</span>
        </div>
        <div id="music-toggle" class="fixed top-4 right-4 md:top-8 md:right-8 z-[500] cursor-pointer opacity-40 hover:opacity-100 transition p-3 glass" onclick="toggleMusic()">
            <div id="music-on" class="w-4 h-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            <div id="music-off" class="w-4 h-4 hidden"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></div>
        </div>
    </div>

    <div id="app-content" class="pt-14 px-4 pb-6 md:pt-16 md:p-16 opacity-0 transition-opacity duration-500"></div>

    <div id="viewer" onclick="closeViewer()">
        <button class="absolute top-10 right-10 text-white text-4xl font-light">×</button>
        <div class="flex items-center gap-8 w-full justify-center px-4" onclick="event.stopPropagation()">
            <button class="text-5xl opacity-20 hover:opacity-100 hidden md:block" onclick="prevImg()">‹</button>
            <div id="viewer-touch-area" class="relative">
                <img id="viewer-img" src="" alt="Preview image" class="max-h-[85vh] max-w-[85vw] object-contain rounded shadow-2xl transition-all">
            </div>
            <button class="text-5xl opacity-20 hover:opacity-100 hidden md:block" onclick="nextImg()">›</button>
        </div>
    </div>

    <div id="ad-pop" class="bg-black/80 backdrop-blur-xl">
        <div class="glass p-12 text-center">
            <span class="en-main text-2xl mb-2">Recommend a movie to him</span>
            <span class="zh-sub">他还没看过，快推荐给他吧</span>
            <div class="flex flex-col gap-4 mt-8">
                <button class="bg-white text-black py-4 rounded-xl text-xs tracking-widest uppercase">Recommend</button>
                <button class="py-3 rounded-xl bg-white/10 text-[10px] uppercase opacity-40" onclick="closeAd()">Already Shared</button>
            </div>
        </div>
    </div>

    <script src="movies.js"></script>
    <script src="thoughts.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');
        let readingAlbumOwnsAudio = false;
        let mainAudioWasPlayingBeforeAlbums = false;
        let currentImgList = [];
        let currentIndex = 0;

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        const viewerArea = document.getElementById('viewer-touch-area');
        
        viewerArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        viewerArea.addEventListener('touchend', e => { 
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextImg();
            if (touchEndX > touchStartX + 50) prevImg();
        }

        if (typeof myThoughts === 'undefined') {
            window.myThoughts = [{date:'INFO', zh:'请创建 thoughts.js 文件开始书写日记。'}];
        }

        const getImdbUrl = (q) => `https://www.imdb.com/find?q=${encodeURIComponent(q)}`;
        const worksCategories = [
            { id: '工作实践', en: 'Work Practice', path: '平面设计/工作实践' },
            { id: '批判设计', en: 'Critical Design', path: '平面设计/批判设计' },
            { id: '个人创意', en: 'Personal Creation', path: '平面设计/个人创意' }
        ];
        const worksFallbackManifest = {
            '工作实践': [
                '平面设计/工作实践/56851639451479_.pic.jpg',
                '平面设计/工作实践/56951639451522_.pic.jpg',
                '平面设计/工作实践/57031639451560_.pic.jpg',
                '平面设计/工作实践/57051639451575_.pic.jpg'
            ],
            '批判设计': [
                '平面设计/批判设计/健身工厂1.png',
                '平面设计/批判设计/健身工厂2.png',
                '平面设计/批判设计/健身工厂3.png',
                '平面设计/批判设计/健身工厂4.png',
                '平面设计/批判设计/健身工厂5.png',
                '平面设计/批判设计/离不了1.png',
                '平面设计/批判设计/离不了2.png',
                '平面设计/批判设计/离不了3.png',
                '平面设计/批判设计/离不了4.png',
                '平面设计/批判设计/新保龄运动1.png',
                '平面设计/批判设计/新保龄运动2.png',
                '平面设计/批判设计/新保龄运动3.png',
                '平面设计/批判设计/新保龄运动4.png',
                '平面设计/批判设计/新保龄运动5.png',
                '平面设计/批判设计/新保龄运动6.png',
                '平面设计/批判设计/血液涅槃1.png',
                '平面设计/批判设计/血液涅槃2.png',
                '平面设计/批判设计/血液涅槃3.png',
                '平面设计/批判设计/血液涅槃4.png'
            ],
            '个人创意': [
                '平面设计/个人创意/mobile_bg.jpg'
            ]
        };
        const worksProjectMeta = {
            '工作实践': {},
            '批判设计': {},
            '个人创意': {}
        };
        const worksState = {
            filesByCategory: {},
            projectsByCategory: {},
            currentCategory: '工作实践',
            currentProjectName: '',
            currentImageIndex: 0
        };

        function escapeHtml(str = '') {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function getWorksCategoryById(id) {
            return worksCategories.find(c => c.id === id);
        }

        function parseWorksProjectFromFile(filePath) {
            const rawName = decodeURIComponent((filePath.split('/').pop() || '').trim());
            const extLess = rawName.replace(/\.[^.]+$/, '');
            const cleanBase = extLess.replace(/[.。](pic|heic|jpeg|jpg|png|webp|gif)$/i, '');
            const match = cleanBase.match(/^(.*?)(?:[\s_-]*(\d+))$/);
            const projectName = (match?.[1] || cleanBase || '未命名项目').trim();
            const order = match?.[2] ? parseInt(match[2], 10) : Number.MAX_SAFE_INTEGER;
            return { projectName, order };
        }

        function groupWorksProjects(files = []) {
            const projectMap = new Map();
            const sorted = [...files].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' }));
            sorted.forEach(path => {
                const { projectName, order } = parseWorksProjectFromFile(path);
                if (!projectMap.has(projectName)) projectMap.set(projectName, []);
                projectMap.get(projectName).push({ path, order });
            });

            return [...projectMap.entries()]
                .map(([name, images]) => ({
                    name,
                    images: images
                        .sort((a, b) => a.order - b.order || a.path.localeCompare(b.path, 'zh-Hans-CN', { numeric: true }))
                        .map(item => item.path)
                }))
                .sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN', { numeric: true }));
        }

        async function fetchWorksFilesFromDirectory(dirPath) {
            try {
                const res = await fetch(encodeURI(`${dirPath}/`), { cache: 'no-store' });
                if (!res.ok) return [];
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href') || '');
                const files = hrefs
                    .filter(href => href && !href.startsWith('?') && !href.startsWith('#') && !href.endsWith('/'))
                    .map(href => decodeURIComponent(href.split('/').pop() || '').trim())
                    .filter(name => /\.(png|jpe?g|webp|gif)$/i.test(name))
                    .map(name => `${dirPath}/${name}`);
                return [...new Set(files)];
            } catch (_) {
                return [];
            }
        }

        async function getWorksFilesByCategory(categoryId) {
            if (worksState.filesByCategory[categoryId]) return worksState.filesByCategory[categoryId];
            const category = getWorksCategoryById(categoryId);
            if (!category) return [];

            const autoFiles = await fetchWorksFilesFromDirectory(category.path);
            const files = autoFiles.length > 0 ? autoFiles : (worksFallbackManifest[categoryId] || []);
            worksState.filesByCategory[categoryId] = files;
            return files;
        }

        function getWorksProjectMeta(categoryId, projectName) {
            const meta = worksProjectMeta?.[categoryId]?.[projectName] || {};
            return {
                time: meta.time || '时间待补充',
                intro: meta.intro || '项目介绍待补充（可在 worksProjectMeta 中按项目名填写）。'
            };
        }

        let hasInteracted = false;
        const startAudio = () => {
            if(!hasInteracted) {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
                hasInteracted = true;
                updateMusicIcon();
            }
        };
        ['click', 'touchstart', 'scroll', 'wheel'].forEach(e => window.addEventListener(e, startAudio, {once:true}));

        function toggleMusic() {
            if (audio.paused) {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
            } else {
                audio.pause();
            }
            updateMusicIcon();
        }
        function updateMusicIcon() {
            document.getElementById('music-on').classList.toggle('hidden', audio.paused);
            document.getElementById('music-off').classList.toggle('hidden', !audio.paused);
        }

        window.addEventListener('message', event => {
            if (event.origin !== window.location.origin || event.data?.type !== 'reading-album-playing') return;
            const readingFrame = document.querySelector('.reading-inline-frame');
            if (!readingFrame || event.source !== readingFrame.contentWindow) return;
            if (!readingAlbumOwnsAudio) mainAudioWasPlayingBeforeAlbums = !audio.paused;
            readingAlbumOwnsAudio = true;
            audio.pause();
            updateMusicIcon();
        });

        function restoreMainAudioFromReading() {
            if (!readingAlbumOwnsAudio) return;
            readingAlbumOwnsAudio = false;
            if (mainAudioWasPlayingBeforeAlbums) {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
            }
            mainAudioWasPlayingBeforeAlbums = false;
            updateMusicIcon();
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] md:h-[45vh] flex flex-col justify-end pb-8 px-4">
                    <div class="flex flex-col md:flex-row items-baseline gap-2">
                        <span class="zh-sub opacity-100 order-2 md:order-1" style="font-size: 10vw;">毛天艺</span>
                        <span class="en-main text-[4vw] md:text-[2.5vw] order-1 md:order-2">Tianyi Mao</span>
                    </div>
                    <div class="mt-2">
                        <span class="en-main text-xs md:text-sm tracking-wider">Those who seek brilliance in the process cannot be deprived.</span>
                        <span class="zh-sub mt-1">一个只想使过程精彩的人是无法被剥夺的</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4 mt-12 md:mt-24">
                    <div class="glass p-6 relative overflow-hidden group h-[140px]">

        const calligraphyState = { items: [], current: 0 };

        function calligraphyLabel(name = '') {
            return decodeURIComponent(name).replace(/\.[^.]+$/, '').replace(/[_]/g, ' · ').replace(/-/g, '.');
        }

        async function loadCalligraphyGallery() {
            const track = document.getElementById('ink-gallery-track');
            const count = document.getElementById('ink-gallery-count');
            if (!track) return;
            try {
                const endpoint = 'https://api.github.com/repos/maotianyi12138-eng/-/contents/%E4%B9%A6%E6%B3%95?ref=main';
                const response = await fetch(endpoint, { headers: { Accept: 'application/vnd.github+json' }, cache: 'no-store' });
                if (!response.ok) throw new Error('暂时没有作品');
                const payload = await response.json();
                calligraphyState.items = (Array.isArray(payload) ? payload : [])
                    .filter(item => item.type === 'file' && /\.(png|jpe?g|webp|gif)$/i.test(item.name) && !/^latest\./i.test(item.name))
                    .sort((a, b) => b.name.localeCompare(a.name, 'zh-Hans-CN', { numeric: true }))
                    .map(item => ({ name: item.name, src: item.download_url || encodeURI(item.path) }));
                if (!calligraphyState.items.length) throw new Error('暂时没有作品');
                track.innerHTML = calligraphyState.items.map((item, index) => `
                    <article class="ink-frame" onclick="openCalligraphyViewer(${index})">
                        <div class="ink-art"><img src="${escapeHtml(item.src)}" loading="${index < 3 ? 'eager' : 'lazy'}" decoding="async" alt="${escapeHtml(calligraphyLabel(item.name))} 书法练习"></div>
                        <div class="ink-caption"><span>${escapeHtml(calligraphyLabel(item.name))}</span><span>${String(index + 1).padStart(2, '0')}</span></div>
                    </article>`).join('');
                calligraphyState.current = 0;
                updateCalligraphyCount();
                track.addEventListener('scroll', updateCalligraphyCount, { passive: true });
            } catch (error) {
                track.innerHTML = `<div class="ink-empty"><div><span class="en-main text-xs">AWAITING TODAY'S INK</span><span class="zh-sub mt-3 opacity-70">把作品上传到“书法”文件夹，建议命名为 YYYY-MM-DD.jpg</span></div></div>`;
                if (count) count.textContent = '0 / 0';
            }
        }

        function updateCalligraphyCount() {
            const track = document.getElementById('ink-gallery-track');
            const count = document.getElementById('ink-gallery-count');
            if (!track || !count || !calligraphyState.items.length) return;
            const frames = [...track.querySelectorAll('.ink-frame')];
            const center = track.scrollLeft + track.clientWidth / 2;
            let nearest = 0;
            frames.forEach((frame, index) => {
                const frameCenter = frame.offsetLeft + frame.offsetWidth / 2;
                if (Math.abs(frameCenter - center) < Math.abs((frames[nearest]?.offsetLeft || 0) + (frames[nearest]?.offsetWidth || 0) / 2 - center)) nearest = index;
            });
            calligraphyState.current = nearest;
            count.textContent = `${nearest + 1} / ${calligraphyState.items.length}`;
        }

        function moveCalligraphy(direction) {
            const track = document.getElementById('ink-gallery-track');
            if (!track) return;
            track.scrollBy({ left: direction * Math.max(260, track.clientWidth * .72), behavior: 'smooth' });
        }

        function openCalligraphyViewer(index) {
            currentImgList = calligraphyState.items.map(item => item.src);
            currentIndex = Math.max(0, Math.min(index, currentImgList.length - 1));
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

                    const img = document.createElement('img');
                    img.src = `${cfg.path}${i}${cfg.ext}`;
                    img.className = 'w-full h-auto cursor-zoom-in';
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.alt = `${id}-${i}`;
                    img.onclick = () => openViewerSingle(img.src);
                    img.onerror = function() { this.parentElement.remove(); };
                    div.appendChild(img);
                    area.appendChild(div);
                }
            }
        }

        function switchPage(page) {
            if (page === 'home') restoreMainAudioFromReading();
            app.style.opacity = '0';
            setTimeout(() => {
                backBtn.classList.toggle('hidden', page === 'home');
                document.body.classList.toggle('reading-page', page === 'reading');
                
                const isMobile = window.innerWidth < 768;
                if (page === 'thoughts' || page === 'calligraphy') {
                    document.body.style.backgroundImage = isMobile ? "url('反思竖屏.jpg')" : "url('反思横屏.jpg')";
                } else {
                    document.body.style.backgroundImage = isMobile ? "url('mobile_bg.jpg')" : "url('horse.jpg')";
                }

                if(page === 'home') renderHome();
                else if(page === 'photo') renderPhoto();
                else if(page === 'coach') renderCoach();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'reading') renderReading();
                else if(page === 'thoughts') renderThoughts();
                else if(page === 'calligraphy') renderCalligraphy();
                
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function updateMovieGrid(list) {
            const container = document.getElementById('movie-names');
            if(container) {
                container.innerHTML = list.slice(0, 160).map(m => {
                    const titles = m.title.split(' / ');
                    const mainTitle = titles[0];
                    const altTitle = titles[1] || '';
                    return `<a href="${getImdbUrl(mainTitle)}" target="_blank" rel="noopener noreferrer" class="block border-l border-white/5 pl-2 transition-all hover:opacity-100 opacity-30">
                        <div class="en-main text-[9px] truncate">${altTitle || mainTitle}</div>
                        <div class="zh-sub text-[8px] truncate">${mainTitle}</div>
                    </a>`;
                }).join('');
            }
        }

        function liveSearch() {
            const val = document.getElementById('movieSearch').value.toLowerCase();
            updateMovieGrid(movieData.filter(m => m.title.toLowerCase().includes(val)));
        }
        
        function handleSearchEnter(e) {
            if (e.key === 'Enter') {
                const term = e.target.value.trim().toLowerCase();
                if (term !== '' && !movieData.some(m => m.title.toLowerCase().includes(term))) {
                    document.getElementById('ad-pop').style.display = 'flex';
                }
            }
        }

        function openViewerList(prefix, index, count) {
            currentImgList = Array.from({length: count}, (_, i) => `${prefix}${i+1}.png`);
            currentIndex = index - 1;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function openViewerSingle(src) {
            currentImgList = [src];
            currentIndex = 0;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function nextImg() { if(currentImgList.length <= 1) return; currentIndex = (currentIndex + 1) % currentImgList.length; updateViewer(); }
        function prevImg() { if(currentImgList.length <= 1) return; currentIndex = (currentIndex - 1 + currentImgList.length) % currentImgList.length; updateViewer(); }
        function updateViewer() { document.getElementById('viewer-img').src = currentImgList[currentIndex]; }
        function closeAd() { document.getElementById('ad-pop').style.display = 'none'; }

        window.onload = () => { renderHome(); app.style.opacity = '1'; };
    </script>
</body>
</html>
