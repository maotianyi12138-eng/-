<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        .back-arrow {
            position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500;
            font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 极致铺满容器 */
        .dragon-container {
            width: 100vw;
            overflow: hidden;
            padding: 40px 0 100px 0;
        }

        .dragon-row { 
            display: flex; 
            width: 100%;
            padding: 0 5%; /* 给最左右留一点点呼吸感 */
            justify-content: space-between;
            align-items: flex-end;
        }

        .dragon-item {
            flex: 1; /* 自动平分宽度 */
            margin-right: -5vw; /* 龙鳞重叠 */
            max-width: 200px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .dragon-item:last-child { margin-right: 0; }

        /* 悬停推开 */
        .dragon-item:hover { 
            margin-right: 2vw; 
            transform: translateY(-20px) scale(1.1); 
            z-index: 100 !important; 
        }

        /* 手机端微调 */
        @media (max-width: 768px) {
            .dragon-item { margin-right: -8vw; }
            .dragon-item:hover { margin-right: 1vw; }
            .vertical-title { height: 100px !important; font-size: 8px !important; margin-bottom: 10px !important; }
        }

        .vertical-title {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 11px; margin-bottom: 25px; letter-spacing: 0.4em;
            height: 150px; text-align: right; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .v-zh { color: rgba(255,255,255,0.9); margin-left: 6px; font-weight: 500; }
        .v-en { color: rgba(255,255,255,0.15); font-size: 8px; font-weight: 100; text-transform: uppercase; margin-top: 5px; }

        .dragon-item img { 
            width: 100%; aspect-ratio: 2/3; object-fit: cover; 
            border: 0.5px solid rgba(255,255,255,0.2); border-radius: 4px; 
            background: #111; box-shadow: -10px 10px 30px rgba(0,0,0,0.8);
        }

        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.4; transition: 0.6s; }
        .kiss-item:hover { opacity: 1; transform: scale(1.1); z-index: 50; }

        .audio-btn { position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 500; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
        .pause-icon { width: 10px; height: 12px; border-left: 3px solid #fff; border-right: 3px solid #fff; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="icon"></div></div>

    <div id="app-content" class="pt-32 transition-opacity duration-300"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');

        function playMusic() { if (audio.paused) { audio.play().catch(()=>{}); } }
        function toggleAudio(e) { e.stopPropagation(); if (audio.paused) { audio.play(); icon.className = 'pause-icon'; } else { audio.pause(); icon.className = 'play-icon'; } }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-10 md:px-20">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[9vw] font-light leading-none italic">MAO TIANYI</span>
                        <span class="en text-[5vw] md:text-[2vw] opacity-20 tracking-[0.2em] mt-2">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-10 md:px-20">
                    <div onclick="switchPage('works')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">视觉作品集</span><span class="en text-[10px]">Visual Archive</span></div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">电影人生</span><span class="en text-[10px]">Cinema Life</span></div>
                </div>
            `;
        }

        function renderWorks() {
            // 后缀精准匹配你的 png 文件
            const projects = [
                {zh:'离不了', en:'PRELONG DIVORCE', img:'批判1.png'},
                {zh:'新保龄运动', en:'NEW BOWLING MOVEMENT', img:'保龄1.png'},
                {zh:'血液涅槃', en:'BLOOD NIRVANA', img:'血液1.png'},
                {zh:'健身工厂', en:'FITNESS FACTORY', img:'健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-2 px-10 md:px-20"><span class="zh text-6xl font-light tracking-tighter opacity-10">WORKS</span></div>
                <div class="dragon-container">
                    <div class="dragon-row">
                        ${projects.map((p, i) => `
                            <div class="dragon-item" style="z-index:${15-i}">
                                <img src="${p.img}">
                                <div class="mt-6 text-center">
                                    <span class="text-xs block mb-1 opacity-80">${p.zh}</span>
                                    <span class="text-[8px] opacity-20 uppercase block">${p.en}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderCinema() {
            // 直接链接你的 png 文件，不改名字
            const top10 = [
                {name:'新世界', en:'New World', poster:'新世界.png'},
                {name:'杀死比尔 2', en:'Kill Bill 2', poster:'杀死比尔2.png'},
                {name:'无间道', en:'Infernal Affairs', poster:'无间道.png'},
                {name:'被解救的姜戈', en:'Django', poster:'被解救的姜戈.png'},
                {name:'星际穿越', en:'Interstellar', poster:'星际穿越.png'},
                {name:'胭脂扣', en:'Rouge', poster:'胭脂扣.png'},
                {name:'爱在黎明破晓前', en:'Before Sunrise', poster:'爱在黎明破晓前.png'},
                {name:'勇士', en:'Warrior', poster:'勇士.png'},
                {name:'七宗罪', en:'Se7en', poster:'七宗罪.png'},
                {name:'美国丽人', en:'American Beauty', poster:'美国丽人.png'}
            ];

            app.innerHTML = `
                <div class="mb-4 px-10 md:px-20"><span class="zh text-6xl font-light tracking-tighter opacity-10">CINEMA</span></div>
                <div class="dragon-container">
                    <div class="dragon-row">
                        ${top10.map((m, i) => `
                            <div class="dragon-item" style="z-index:${20-i}">
                                <div class="vertical-title">
                                    <span class="v-zh">${m.name}</span>
                                    <span class="v-en">${m.en}</span>
                                </div>
                                <img src="${m.poster}">
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="px-10 md:px-20 pb-20"><div class="kiss-wall">${movieData.slice(0, 48).map(m => `<img src="${m.poster}" class="kiss-item" onerror="this.remove()">`).join('')}</div></div>
            `;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
