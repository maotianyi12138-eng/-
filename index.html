<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        /* 首页板块辨识度增强：增加文字阴影和背景微光 */
        .nav-card {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: all 0.5s ease;
        }
        .nav-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; }
        
        /* 电影页横向龙鳞装：从左到右铺满 */
        .dragon-row {
            display: flex;
            overflow-x: auto;
            padding: 40px 0;
            gap: -20px; /* 负间距实现堆叠 */
        }
        .dragon-item {
            flex: 0 0 200px;
            margin-right: -100px; /* 龙鳞堆叠效果 */
            transition: all 0.5s ease;
            cursor: pointer;
            position: relative;
        }
        .dragon-item:hover { margin-right: 20px; transform: translateY(-20px); z-index: 100 !important; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; box-shadow: -10px 0 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }

        /* 海报墙 (Kiss Wall) */
        .kiss-wall { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; filter: grayscale(100%); opacity: 0.4; transition: 0.6s; }
        .kiss-item:hover { filter: grayscale(0%); opacity: 1; z-index: 10; transform: scale(1.05); }

        /* 搜索框样式 */
        .search-input {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 0;
            width: 100%;
            outline: none;
            font-size: 1.2rem;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #fff; }

        ::-webkit-scrollbar { height: 4px; width: 0px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="fixed top-0 w-full p-8 z-[100] flex justify-between items-start pointer-events-none">
        <div onclick="switchPage('home')" class="pointer-events-auto cursor-pointer">
            <span class="zh text-2xl">毛天艺</span><span class="en text-sm">Tianyi Mao</span>
        </div>
        <div id="status" class="opacity-50 text-[10px] tracking-[0.3em]">AUDIO WAITING</div>
    </nav>

    <div id="app-content" class="pt-32 p-8 md:p-20"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');

        function playMusic() {
            if (audio.paused) {
                audio.play().catch(() => {});
                document.getElementById('status').innerText = "AUDIO PLAYING";
            }
        }

        function switchPage(page) {
            app.classList.add('opacity-0');
            setTimeout(() => {
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else renderSoon(page);
                app.classList.remove('opacity-0');
                window.scrollTo(0,0);
            }, 500);
        }

        function renderHome() {
            const menus = [
                {id:'works', zh:'视觉作品集', en:'Visual Works'},
                {id:'cinema', zh:'电影人生', en:'Cinema Life'},
                {id:'music', zh:'音乐人生', en:'Music Life'},
                {id:'read', zh:'阅读人生', en:'Reading Life'}
            ];
            app.innerHTML = `
                <div class="h-[55vh] flex flex-col justify-end pb-12">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[15vw] md:text-[10vw]">毛天艺</span>
                        <span class="en text-[4vw] md:text-[2vw]">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    ${menus.map(m => `
                        <div onclick="switchPage('${m.id}')" class="nav-card p-8 cursor-pointer group">
                            <span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">${m.zh}</span>
                            <span class="en text-xs">${m.en}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCinema() {
            // 准备数据：按拼音/字母排序
            const sortedMovies = [...movieData].sort((a, b) => a.title.localeCompare(b.title, 'zh'));
            const top10Names = ["杀死比尔 2", "新世界", "爱在黎明破晓前", "勇士", "七宗罪", "无间道", "被解救的姜戈", "星际穿越", "胭脂扣", "美国丽人"];
            const top10 = top10Names.map(name => movieData.find(m => m.title.includes(name))).filter(Boolean);

            app.innerHTML = `
                <div class="mb-12"><span class="zh text-6xl">电影人生</span><span class="en text-xl">Cinema Archive</span></div>
                
                <div class="mb-24">
                    <div class="flex justify-between items-end mb-8 border-b border-white/10 pb-4">
                        <span class="zh text-2xl font-light">个人十佳 / Personal Top 10</span>
                    </div>
                    <div class="dragon-row">
                        ${top10.map((m, i) => `
                            <div class="dragon-item" style="z-index: ${10-i}">
                                <img src="${m.poster}">
                                <div class="mt-4 text-center px-2">
                                    <div class="text-[10px] opacity-80 truncate">${m.title.split('/')[0]}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-16">
                    <div class="w-full md:w-8/12">
                        <div class="mb-10">
                            <input type="text" id="movieSearch" class="search-input" placeholder="搜索电影名称..." oninput="filterMovies()">
                        </div>
                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-4 text-[11px] opacity-60">
                            </div>
                    </div>

                    <div class="w-full md:w-4/12">
                        <div class="mb-6 border-b border-white/10 pb-2"><span class="en text-[10px]">THE KISS WALL</span></div>
                        <div id="kiss-wall" class="kiss-wall"></div>
                    </div>
                </div>
            `;

            // 初始化名单和海报墙
            window.currentMovies = sortedMovies;
            displayMovies(sortedMovies);
        }

        function displayMovies(movies) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('kiss-wall');
            
            if (movies.length === 0) {
                listGrid.innerHTML = `<div class="col-span-4 py-20 text-center zh text-xl opacity-40">毛天艺还没有看过，请推荐给他</div>`;
                wall.innerHTML = '';
                return;
            }

            // 渲染名单
            listGrid.innerHTML = movies.map(m => {
                const parts = m.title.split('/');
                return `
                    <div class="hover:opacity-100 transition-opacity cursor-default border-l border-white/5 pl-2">
                        <div class="font-medium text-white/90 truncate">${parts[0]}</div>
                        <div class="opacity-40 truncate scale-90 origin-left">${parts[1] || ''}</div>
                    </div>
                `;
            }).join('');

            // 渲染海报墙
            wall.innerHTML = movies.map(m => `
                <img src="${m.poster}" class="kiss-item" loading="lazy" onerror="this.remove()">
            `).join('');
        }

        function filterMovies() {
            const term = document.getElementById('movieSearch').value.toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(filtered);
        }

        function renderSoon(p) {
            app.innerHTML = `<div class="py-60 text-center"><span class="zh opacity-20 text-4xl uppercase tracking-widest">${p} PREPARING</span></div>`;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
