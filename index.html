<div class="px-4">
    <div class="glass p-8 md:p-12">
        <div class="mb-6 max-w-2xl mx-auto">
            <input type="text" id="movieSearch" class="apple-search" 
                placeholder="搜一部你觉得毛天艺没看过的电影 / Search for a movie you think he hasn't seen"
                oninput="liveSearch()" onkeydown="handleSearchEnter(event)">
        </div>

        <div class="mb-10 max-w-2xl mx-auto overflow-x-auto">
            <div id="genre-tags" class="flex gap-2 pb-2 scrollbar-none whitespace-nowrap">
                </div>
        </div>

        <div id="movie-names" class="movie-list-4col"></div>
    </div>
</div>

<script>
// 在原有脚本中更新以下函数

function renderCinema() {
    // ... 前面的 Top10 和 艺人条 代码保持不变 ...

    // 定义分类数据
    const genres = [
        {zh: '全部', en: 'ALL'},
        {zh: '剧情', en: 'DRAMA'},
        {zh: '犯罪', en: 'CRIME'},
        {zh: '动作', en: 'ACTION'},
        {zh: '科幻', en: 'SCI-FI'},
        {zh: '悬疑', en: 'MYSTERY'},
        {zh: '爱情', en: 'ROMANCE'},
        {zh: '惊悚', en: 'THRILLER'}
    ];

    // 更新页面结构（包含搜索框和分类按钮）
    app.innerHTML = `
        <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light">电影人生</span><span class="en text-sm mt-2 opacity-30">Archive</span></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
            <div class="glass overflow-hidden h-[420px] relative">
                <div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}"><img src="${m.img}"></div>`).join('')}</div>
            </div>
            <div class="glass p-2 h-[420px] relative">
                <div class="artist-scroll">${artists.map(a => `<div class="artist-strip"><img src="${a.img}"><div class="absolute bottom-4 left-1/2 -translate-x-1/2 writing-vertical-rl zh text-[10px] opacity-50">${a.zh}</div></div>`).join('')}</div>
            </div>
        </div>
        <div class="px-4">
            <div class="glass p-8 md:p-12">
                <div class="mb-6 max-w-2xl mx-auto">
                    <input type="text" id="movieSearch" class="apple-search" 
                        placeholder="搜一部你觉得毛天艺没看过的电影 / Search for a movie he hasn't seen"
                        oninput="liveSearch()" onkeydown="handleSearchEnter(event)">
                </div>
                <div class="mb-10 max-w-2xl mx-auto overflow-x-auto no-scrollbar">
                    <div id="genre-tags" class="flex gap-3 pb-2">
                        ${genres.map(g => `
                            <button onclick="filterByGenre('${g.zh}', this)" class="genre-btn px-5 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-[11px] flex flex-col items-center min-w-[80px]">
                                <span class="zh">${g.zh}</span>
                                <span class="en opacity-30 text-[8px]">${g.en}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
                <div id="movie-names" class="movie-list-4col"></div>
            </div>
        </div>`;
    
    updateMovieGrid(movieData);
}

// 分类过滤逻辑
function filterByGenre(genre, btn) {
    // 处理按钮高亮
    document.querySelectorAll('.genre-btn').forEach(b => {
        b.classList.remove('bg-white/20', 'border-white/40');
        b.classList.add('bg-white/5', 'border-white/10');
    });
    btn.classList.add('bg-white/20', 'border-white/40');
    btn.classList.remove('bg-white/5', 'border-white/10');

    // 过滤逻辑
    if (genre === '全部') {
        updateMovieGrid(movieData);
    } else {
        const filtered = movieData.filter(m => m.title.includes(genre));
        updateMovieGrid(filtered);
    }
}

// 搜索逻辑保持不变
function liveSearch() {
    const term = document.getElementById('movieSearch').value.toLowerCase();
    const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
    updateMovieGrid(filtered);
}
</script>

<style>
    /* 辅助样式：隐藏滚动条但保留功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .genre-btn .zh { font-size: 13px; margin-bottom: 1px; }
    .genre-btn.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); }
</style>
