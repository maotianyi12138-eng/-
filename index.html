<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        /* 统一中英对照样式 */
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.5; letter-spacing: 0.05em; text-transform: uppercase; }
        
        /* 导航激活状态 */
        .nav-active { border-left-color: rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 视频卡片 */
        .video-card-mini { aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 1rem; transition: transform 0.3s ease; }
        .video-card-mini:hover { transform: scale(1.02); }

        #app-content { transition: opacity 0.5s ease; }
    </style>
</head>
<body>
    <audio id="main-audio" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="global-controls">
        <div id="back-btn" class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition hidden" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>

        <div id="music-btn" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition p-2 glass" onclick="toggleMusic()">
            <div id="music-icon-playing" class="w-5 h-5 flex items-center justify-center">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-full h-full">
                    <line x1="10" y1="5" x2="10" y2="19" /><line x1="14" y1="5" x2="14" y2="19" />
                </svg>
            </div>
            <div id="music-icon-paused" class="w-5 h-5 hidden flex items-center justify-center">
                <svg viewBox="0 0 24 24" fill="currentColor" class="w-full h-full">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </div>
        </div>
    </div>
    
    <div id="app-content" class="pt-16 p-6 md:p-16 opacity-0"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');
        const playIcon = document.getElementById('music-icon-playing');
        const pauseIcon = document.getElementById('music-icon-paused');

        // --- 音乐控制逻辑 ---
        
        let musicStarted = false;
        function startMusicOnce() {
            if (!musicStarted) {
                audio.play().catch(e => console.log("等待用户交互以播放音乐"));
                musicStarted = true;
                updateMusicUI();
                // 播放后移除监听
                ['click', 'scroll', 'touchstart', 'wheel'].forEach(type => {
                    window.removeEventListener(type, startMusicOnce);
                });
            }
        }

        // 监听任意用户交互以自动播放
        ['click', 'scroll', 'touchstart', 'wheel'].forEach(type => {
            window.addEventListener(type, startMusicOnce, { once: true });
        });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
            updateMusicUI();
        }

        function updateMusicUI() {
            if (audio.paused) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        // --- 路由与渲染逻辑 ---

        const photoConfig = {
            'video': { 
                type: 'video-list', 
                links: [
                    "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4",
                    "https://sns-video-zl.xhscdn.com/stream/110/4/01e6cd6d950f58330103700391927eff1a_4.mp4",
                    "https://www.chali.com/material/brand/ys/video1.mp4",
                    "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4"
                ] 
            }
        };

        function renderHome() {
            app.innerHTML = `
                <div class="h-[30vh] flex flex-col justify-end pb-8 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <div class="mt-4">
                        <span class="zh text-base md:text-lg opacity-90">一个只想使过程精彩的人是无法被剥夺的</span>
                        <span class="en text-xs md:text-sm opacity-60 tracking-[0.2em] mt-2 font-light">Those who seek brilliance in the process cannot be deprived.</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4 mt-8">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span><span class="en text-[10px]">Core Business Sectors</span>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">平面设计</span><span class="en text-[9px]">Graphic Design</span>
                            </div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photography</span>
                            </div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">运动教学</span><span class="en text-[9px]">Coach</span>
                            </div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer hover:bg-white/5 transition-all">
                        <span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Life</span>
                    </div>
                    <div class="glass p-10 opacity-30">
                        <span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">More to come</span>
                    </div>
                </div>`;
        }

        // 简化的摄影渲染（包含视听影像）
        function renderPhoto() {
            app.innerHTML = `
                <div class="flex flex-col gap-8 px-4">
                    <div class="mb-4"><span class="zh text-5xl font-light">摄影与影像</span><span class="en text-xs mt-1 opacity-20">Photography & Film</span></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${photoConfig.video.links.map(url => `
                            <div class="video-card-mini glass p-1">
                                <video loop muted playsinline autoplay class="w-full h-full object-cover rounded-xl">
                                    <source src="${url}" type="video/mp4">
                                </video>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        // 板块切换引擎
        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                // 控制返回按钮显示
                backBtn.classList.toggle('hidden', page === 'home');
                
                if(page === 'home') renderHome();
                else if(page === 'photo') renderPhoto();
                else {
                    // 占位其他板块
                    app.innerHTML = `<div class="p-10"><span class="zh text-4xl">${page.toUpperCase()} 正在建设中</span><span class="en">Coming Soon</span></div>`;
                }
                
                app.style.opacity = '1';
                window.scrollTo(0, 0);
            }, 400);
        }

        // 初始化
        window.addEventListener('load', () => {
            renderHome();
            app.style.opacity = '1';
        });
    </script>
</body>
</html>
