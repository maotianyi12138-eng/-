<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 个人十佳：撑满容器的龙鳞布局 */
        .dragon-row { 
            display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; 
            align-items: stretch; height: 100%; width: 100%;
        }
        .dragon-item {
            flex: 0 0 140px; margin-right: -70px; 
            transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            cursor: pointer; position: relative; height: 100%;
        }
        .dragon-item:hover { margin-right: 70px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { 
            width: 100%; height: 100%; object-fit: cover; 
            border-right: 0.5px solid rgba(255,255,255,0.1);
        }
        .dragon-title {
            position: absolute; bottom: 20px; left: 10px; z-index: 10;
            writing-mode: vertical-rl; pointer-events: none;
        }

        /* 艺人板块：流式排列 (非3x3) */
        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow-x: auto; scrollbar-width: none; }
        .artist-strip { 
            flex: 1; min-width: 60px; position: relative; overflow: hidden; 
            transition: all 0.5s ease; border-radius: 4px;
        }
        .artist-strip:hover { flex: 2.5; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }
        .artist-label {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            writing-mode: vertical-rl; text-align: right; pointer-events: none;
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        /* 电影墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 0.8s; }
        .kiss-item.loaded { opacity: 0.4; }
        .kiss-item:hover { opacity: 1 !important; z-index: 10; transform: scale(1.05); }

        .search-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 0.8rem 1.2rem; width: 100%; border-radius: 1rem; outline: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="fixed top-8 left-8 z-[500] text-2xl cursor-pointer opacity-50 hover:opacity-100" onclick="switchPage('home')">←</div></div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');

        function playMusic() { if (audio.paused) { audio.play().catch(()=>{}); } }
        
        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [
                {id:'works', zh:'视觉作品集', en:'Visual Works'},
                {id:'cinema', zh:'电影人生', en:'Cinema Life'},
                {id:'music', zh:'音乐人生', en:'Music Life'},
                {id:'read', zh:'阅读人生', en:'Reading Life'}
            ];
            app.innerHTML = `
                <div class="h-[30vh] flex flex-col justify-end pb-12 px-4"><h1><span class="zh text-[12vw] md:text-[7vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-8 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-xl mb-1">${m.zh}</span><span class="en text-[9px]">${m.en}</span></div>`).join('')}
                </div>`;
        }

        function renderWorks() {
            const workList = [
                {zh: '离不了', title: 'UNSEPARABLE', img: '批判1.png'},
                {zh: '新保龄运动', title: 'NEW BOWLING', img: '保龄1.png'},
                {zh: '血液涅槃', title: 'BLOOD NIRVANA', img: '血液1.png'},
                {zh: '健身工厂', title: 'FITNESS FACTORY', img: '健身1.png'}
            ];
            app.innerHTML = `<div class="mb-10 px-4"><span class="zh text-5xl font-light tracking-tighter">视觉作品集</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${workList.map(w => `<div class="glass p-4 group"><div class="aspect-[2/1] overflow-hidden rounded-xl"><img src="${w.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/800x400/11?text=${w.zh}'"></div><div class="mt-4"><span class="zh text-lg">${w.zh}</span><span class="en text-[8px] opacity-30">${w.title}</span></div></div>`).join('')}
                </div>`;
        }

        function renderCinema() {
            const top10 = [
                {zh:'新世界', img:'新世界.png'}, {zh:'杀死比尔', img:'杀死比尔.png'}, {zh:'无间道', img:'无间道.png'}, 
                {zh:'姜戈', img:'被解救的姜戈.png'}, {zh:'星际穿越', img:'星际穿越.png'}, {zh:'胭脂扣', img:'胭脂扣.png'}, 
                {zh:'爱在黎明', img:'爱在黎明破晓前.png'}, {zh:'勇士', img:'勇士.png'}, {zh:'七宗罪', img:'七宗罪.png'}, {zh:'美国丽人', img:'美国丽人.png'}
            ];
            
            // 艺人海报链接已全部替换为解析后的直接地址
            const allArtists = [
                {zh:'昆汀', img:'https://img1.doubanio.com/view/photo/l/public/p1917601710.jpg'},
                {zh:'黑泽明', img:'https://img1.doubanio.com/view/photo/l/public/p976101747.jpg'},
                {zh:'诺兰', img:'https://img1.doubanio.com/view/photo/l/public/p642960334.jpg'},
                {zh:'皮特', img:'https://img1.doubanio.com/view/photo/l/public/p1026468025.jpg'},
                {zh:'休格兰特', img:'https://img1.doubanio.com/view/photo/l/public/p643096837.jpg'},
                {zh:'张国荣', img:'https://img1.doubanio.com/view/photo/l/public/p643053678.jpg'},
                {zh:'朱莉', img:'https://img1.doubanio.com/view/photo/l/public/p2211824901.jpg'},
                {zh:'凯拉', img:'https://img1.doubanio.com/view/photo/l/public/p1251764866.jpg'},
                {zh:'罗伯茨', img:'https://img1.doubanio.com/view/photo/l/public/p1704524740.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-8 px-4"><span class="zh text-5xl font-light tracking-tighter">电影人生</span></div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 px-4 mb-8">
                    <div class="glass overflow-hidden h-[380px] flex flex-col relative">
                        <div class="absolute top-4 left-6 z-20"><span class="zh text-[10px] opacity-20 tracking-widest uppercase">My Top 10</span></div>
                        <div class="dragon-row">
                            ${top10.map((m, i) => `
                                <div class="dragon-item" style="z-index:${20-i}">
                                    <div class="dragon-title"><span class="zh text-[10px] text-white/80">${m.zh}</span></div>
                                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/22?text=${m.zh}'">
                                </div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="glass p-2 h-[380px] flex flex-col relative">
                        <div class="absolute top-4 left-6 z-20"><span class="zh text-[10px] opacity-20 tracking-widest uppercase">Favorite Artists</span></div>
                        <div class="artist-scroll">
                            ${allArtists.map(a => `
                                <div class="artist-strip">
                                    <img src="${a.img}">
                                    <div class="artist-label"><span class="zh text-[10px] font-bold text-white/90">${a.zh}</span></div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 px-4">
                    <div class="glass p-8 min-h-[600px]">
                        <input type="text" id="movieSearch" class="search-input mb-8" placeholder="SEARCH ARCHIVE..." oninput="debounceSearch()">
                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-3 gap-y-3 gap-x-4"></div>
                    </div>
                    <div class="glass p-1 h-fit"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            listGrid.innerHTML = movies.slice(0, 100).map(m => `<div class="group cursor-pointer"><div class="zh text-[12px] opacity-30 group-hover:opacity-100 truncate transition">${m.title.split(' / ')[0]}</div></div>`).join('');
            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item">`).join('');
                const observer = new IntersectionObserver((entries) => { 
                    entries.forEach(entry => { if (entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; img.onload = () => img.classList.add('loaded'); observer.unobserve(img); } });
                }, { rootMargin: "500px" });
                document.querySelectorAll('.lazy-item').forEach(img => observer.observe(img));
            }
        }

        function debounceSearch() {
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            displayMovies(movieData.filter(m => m.title.toLowerCase().includes(term)));
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
