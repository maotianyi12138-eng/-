<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 返回导航 */
        .back-arrow { position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500; font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s; }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 电影十佳：横向龙鳞 */
        .dragon-container { width: 100vw; overflow: hidden; margin-left: -1.5rem; }
        .dragon-row { display: flex; width: 100%; padding: 40px 5% 80px; justify-content: space-between; align-items: flex-end; }
        .dragon-item { flex: 1; margin-right: -4.5vw; max-width: 170px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; }
        .dragon-item:last-child { margin-right: 0; }
        .dragon-item:hover { margin-right: 2.5vw; transform: translateY(-20px) scale(1.05); z-index: 100 !important; }
        .v-zh { writing-mode: vertical-rl; font-size: 11px; margin-bottom: 25px; letter-spacing: 0.5em; height: 150px; text-align: right; color: rgba(255,255,255,0.9); font-weight: 500; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 0.5px solid rgba(255,255,255,0.2); border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        /* 亲吻墙 (海报小) */
        .kiss-wall { display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; width: 100%; height: 750px; overflow-y: auto; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: opacity 0.8s, transform 0.3s; background: #111; cursor: pointer; }
        .kiss-item.loaded { opacity: 0.3; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.2); z-index: 50; box-shadow: 0 0 30px rgba(255,255,255,0.2); }

        /* 苹果风搜索框 */
        .search-input { 
            background: rgba(255,255,255,0.05); border: none; color: white; padding: 1rem 1.8rem; 
            width: 100%; border-radius: 1.5rem; outline: none; transition: 0.3s; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); font-size: 0.9rem;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }

        /* 标签与评分控制 */
        .filter-section { margin-bottom: 1.5rem; }
        .filter-title { font-size: 10px; opacity: 0.2; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; font-weight: bold; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag-btn { 
            padding: 5px 10px; font-size: 11px; border-radius: 4px; 
            background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .tag-btn .count { opacity: 0.3; font-size: 9px; }
        .tag-btn:hover, .tag-btn.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* 随机按钮 */
        .random-btn { 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 0.5px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 1rem;
            cursor: pointer; transition: 0.3s; text-align: center; margin-top: 10px;
        }
        .random-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .movie-title-row:hover { color: #fff; opacity: 1; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>

    <div id="ad-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-3xl z-[2000] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="glass p-20 text-center">
            <span class="zh text-4xl mb-4 font-bold">他真没看过！</span>
            <p class="opacity-40 mb-10">你成功发现了一块毛天艺的电影荒原。</p>
            <div class="px-10 py-4 bg-white text-black rounded-full cursor-pointer font-bold" onclick="closeAd()">已经推荐给他了 I'VE TOLD HIM</div>
        </div>
    </div>

    <div id="random-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[2000] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-500">
        <div id="random-card" class="scale-90 transition-transform duration-500 text-center">
            <img id="random-poster" src="" class="w-[300px] rounded-xl shadow-2xl mb-6 border border-white/20">
            <h2 id="random-title" class="text-2xl font-bold mb-2"></h2>
            <div id="random-meta" class="opacity-50 text-sm"></div>
            <div class="mt-8 text-white/30 text-xs cursor-pointer" onclick="closeRandom()">点击空白处关闭</div>
        </div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20 transition-opacity duration-300"></div>

    <script src="movies.js"></script>
    <script>
        const app = document.getElementById('app-content');
        const audio = document.getElementById('main-audio');
        let searchTimer;
        window.currentFilters = { type: '全部', tag: '全部', rating: 0 };

        function playMusic() { if (audio.paused) audio.play(); }
        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('nav-ui').classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                app.style.opacity = '1';
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-4"><h1><span class="zh text-[16vw] md:text-[9vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-2 md:grid-cols-2 gap-6 px-4">
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5"><span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Archive</span></div>
                    <div class="glass p-10 opacity-20"><span class="zh text-2xl mb-2">即将开放</span><span class="en text-[10px]">Coming Soon</span></div>
                </div>
            `;
        }

        function renderCinema() {
            // 自动化提取全量标签并按数量排序
            const allTags = {};
            movieData.forEach(m => m.genres.forEach(g => allTags[g] = (allTags[g] || 0) + 1));
            const topTags = Object.entries(allTags).sort((a,b) => b[1] - a[1]).slice(0, 20).map(i => i[0]);

            const top10 = [
                {name:'新世界', db:'10756762'}, {name:'杀死比尔 2', db:'1291585'}, {name:'无间道', db:'1307914'}, 
                {name:'被解救的姜戈', db:'6307447'}, {name:'星际穿越', db:'1889243'}, {name:'胭脂扣', db:'1300325'}, 
                {name:'爱在黎明破晓前', db:'1296339'}, {name:'勇士', db:'3141107'}, {name:'七宗罪', db:'1292223'}, {name:'美国丽人', db:'1292062'}
            ];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span></div>
                <div class="dragon-container"><div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}" onclick="window.open('https://movie.douban.com/subject/${m.db}/')"><div class="v-zh">${m.name}</div><img src="${m.name}.png" onerror="this.src='https://via.placeholder.com/200x300/111/fff?text=${m.name}'"></div>`).join('')}</div></div>
                
                <div class="flex flex-col lg:flex-row gap-0 px-4">
                    <div class="glass p-10 flex-[1] rounded-r-none border-r-0">
                        <input type="text" id="movieSearch" class="search-input mb-8" placeholder="搜一部你认为毛天艺没看过的电影" oninput="debounceSearch()">
                        
                        <div class="grid grid-cols-2 gap-8 mb-8">
                            <div class="filter-section">
                                <div class="filter-title">评分筛选 (★及以上)</div>
                                <input type="range" min="0" max="5" value="0" class="w-full accent-white opacity-50" oninput="applyFilter('rating', this.value)">
                            </div>
                            <div class="random-btn" onclick="pickRandom()">🎲 帮我选一部</div>
                        </div>

                        <div class="filter-section">
                            <div class="filter-title">热门流派 / 地区</div>
                            <div class="tag-group">
                                <button class="tag-btn active" onclick="applyFilter('tag', '全部', this)">全部</button>
                                ${topTags.map(t => `<button class="tag-btn" onclick="applyFilter('tag', '${t}', this)">${t} <span class="count">${allTags[t]}</span></button>`).join('')}
                            </div>
                        </div>

                        <div id="movie-list-grid" class="grid grid-cols-2 gap-x-4 gap-y-3 max-h-[400px] overflow-y-auto pr-2 scrollbar-hide border-t border-white/5 pt-6"></div>
                    </div>

                    <div class="flex-1 h-fit"><div id="cinema-wall" class="kiss-wall glass rounded-l-none scrollbar-hide"></div></div>
                </div>
            `;
            updateDisplay(movieData, true);
        }

        function applyFilter(key, val, el) {
            if(el) {
                el.parentElement.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            }
            window.currentFilters[key] = val;
            const filtered = movieData.filter(m => {
                const tagMatch = window.currentFilters.tag === '全部' || m.genres.includes(window.currentFilters.tag);
                const rateMatch = m.rating >= window.currentFilters.rating;
                return tagMatch && rateMatch;
            });
            updateDisplay(filtered);
        }

        function updateDisplay(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid) return;
            
            listGrid.innerHTML = movies.map(m => `
                <div class="movie-title-row cursor-pointer opacity-30 transition-all text-sm truncate" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title}'))">
                    ${m.title.split('/')[0]} <span class="text-[10px] ml-1 opacity-50">${'★'.repeat(m.rating)}</span>
                </div>`).join('');

            if(initWall && wall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onclick="showMovieDetail('${m.title}')">`).join('');
                initLazy();
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            searchTimer = setTimeout(() => {
                const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
                updateDisplay(term === '' ? movieData : filtered);
                if(term !== '' && filtered.length === 0) {
                    document.getElementById('ad-overlay').style.opacity = '1';
                    document.getElementById('ad-overlay').style.pointerEvents = 'auto';
                }
            }, 800);
        }

        function pickRandom() {
            const m = movieData[Math.floor(Math.random() * movieData.length)];
            showMovieDetail(m.title);
        }

        function showMovieDetail(title) {
            const m = movieData.find(i => i.title === title);
            document.getElementById('random-poster').src = m.poster;
            document.getElementById('random-title').innerText = m.title.split('/')[0];
            document.getElementById('random-meta').innerText = `${m.type} · ${m.genres.join(' ')} · ${'★'.repeat(m.rating)}`;
            const ov = document.getElementById('random-overlay');
            ov.style.opacity = '1'; ov.style.pointerEvents = 'auto';
            document.getElementById('random-card').style.transform = 'scale(1)';
        }

        function closeAd() { document.getElementById('ad-overlay').style.opacity = '0'; document.getElementById('ad-overlay').style.pointerEvents = 'none'; }
        function closeRandom() { 
            const ov = document.getElementById('random-overlay');
            ov.style.opacity = '0'; ov.style.pointerEvents = 'none'; 
            document.getElementById('random-card').style.transform = 'scale(0.9)';
        }
        document.getElementById('random-overlay').onclick = closeRandom;

        function initLazy() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); }});
            }, { rootMargin: "1000px" });
            document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
