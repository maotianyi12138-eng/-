<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="movies.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 全局转场动画 */
        #app-wrapper { transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page-fade { opacity: 0; transform: translateY(20px); }

        /* 音乐动效 */
        .bar { width: 2px; background: #fff; animation: play 0.8s infinite alternate; height: 3px; }
        .bar-p { animation-play-state: paused !important; height: 2px !important; opacity: 0.3; }
        @keyframes play { 0% { height: 4px; } 100% { height: 13px; } }

        /* Josh Warner 风格公共样式 */
        .vogue-title { font-size: 12vw; font-weight: 100; line-height: 0.8; letter-spacing: -0.04em; }
        .sub-label { font-size: 10px; letter-spacing: 0.5em; opacity: 0.3; text-transform: uppercase; }
        
        /* 电影板块样式 */
        .top10-item { display: grid; grid-template-columns: repeat(12, 1fr); margin-bottom: 20vh; align-items: end; }
        .top10-img-box { grid-column: span 8; overflow: hidden; }
        .top10-item:nth-child(even) .top10-img-box { grid-column: 5 / span 8; }
        .top10-text { grid-column: span 4; padding-bottom: 2rem; z-index: 10; }
        .top10-item:nth-child(even) .top10-text { grid-column: 1 / span 4; text-align: right; }
        .big-num { font-size: 8vw; font-weight: 100; opacity: 0.1; margin-bottom: -1rem; }
        .poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1px; background: #111; }
        .poster-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .poster-item:hover { opacity: 1; transform: scale(1.4); z-index: 50; outline: 1px solid #fff; }

        /* 作品板块样式 */
        .stack-c { position: relative; height: 180px; transition: 0.8s; cursor: pointer; margin-bottom: 2rem; }
        .s-img { position: absolute; top: 0; width: 100%; aspect-ratio: 16/10; object-fit: cover; transition: 0.6s; border: 1px solid #222; }
        .s-img:nth-child(1) { z-index: 3; }
        .s-img:nth-child(2) { z-index: 2; transform: translateY(15px) scale(0.96); opacity: 0.7; }
        .s-img:nth-child(3) { z-index: 1; transform: translateY(30px) scale(0.92); opacity: 0.4; }
        .expanded { height: auto !important; }
        .expanded .s-img { position: relative; transform: none !important; opacity: 1 !important; margin-bottom: 10px; }
    </style>
</head>
<body>
    <audio id="global-bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="fixed top-0 w-full p-8 md:p-12 z-[100] flex justify-between items-start pointer-events-none">
        <div onclick="router('index.html')" class="sub-label pointer-events-auto cursor-pointer hover:opacity-100">Index / 2026</div>
        <div onclick="toggleMusic(event)" class="flex items-end gap-[3px] cursor-pointer pointer-events-auto p-4">
            <div class="bar bar-p"></div><div class="bar bar-p" style="animation-delay: 0.2s"></div><div class="bar bar-p" style="animation-delay: 0.4s"></div>
        </div>
    </nav>

    <div id="app-wrapper">
        <main class="min-h-screen flex flex-col justify-center p-8 md:p-24">
            <section class="mb-24">
                <h1 class="vogue-title">MAO<br>TIANYI</h1>
                <p class="sub-label mt-8 max-w-xs leading-loose">Visual & Cinema Archive. Exploring the boundaries of digital aesthetics.</p>
            </section>
            <div class="grid grid-cols-1 md:grid-cols-2 border-t border-white/10">
                <div onclick="router('works.html')" class="py-12 border-b md:border-b-0 md:border-r border-white/10 group cursor-pointer">
                    <span class="sub-label opacity-20">01</span>
                    <h2 class="text-4xl font-light group-hover:pl-4 transition-all">WORKS</h2>
                </div>
                <div onclick="router('cinema.html')" class="py-12 border-b md:border-b-0 group cursor-pointer">
                    <span class="sub-label opacity-20">02</span>
                    <h2 class="text-4xl font-light group-hover:pl-4 transition-all">CINEMA</h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        const audio = document.getElementById('global-bgm');
        const wrapper = document.getElementById('app-wrapper');

        function toggleMusic(e) {
            if(e) e.stopPropagation();
            const bars = document.querySelectorAll('.bar');
            if (audio.paused) { audio.play(); bars.forEach(b => b.classList.remove('bar-p')); }
            else { audio.pause(); bars.forEach(b => b.classList.add('bar-p')); }
        }

        async function router(url) {
            if(url === 'index.html' && window.location.pathname.endsWith('index.html')) return;
            
            wrapper.classList.add('page-fade');
            setTimeout(async () => {
                try {
                    const res = await fetch(url);
                    const text = await res.text();
                    const doc = new DOMParser().parseFromString(text, 'text/html');
                    const newContent = doc.querySelector('main').innerHTML;
                    
                    wrapper.innerHTML = newContent;
                    history.pushState({}, '', url);
                    window.scrollTo(0, 0);
                    wrapper.classList.remove('page-fade');
                    
                    // 动态初始化脚本
                    initSubPage(url);
                } catch (e) { window.location.href = url; }
            }, 600);
        }

        function initSubPage(url) {
            if(url.includes('cinema.html')) {
                const wall = document.getElementById('poster-wall');
                if(wall && typeof movieData !== 'undefined') {
                    movieData.forEach(m => {
                        const img = new Image(); img.src = m.poster; img.className = 'poster-item';
                        img.loading = "lazy"; img.onerror = () => img.remove();
                        wall.appendChild(img);
                    });
                }
            }
        }

        window.onpopstate = () => location.reload();
    </script>
</body>
</html>
