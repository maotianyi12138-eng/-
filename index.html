<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 龙鳞装 */
        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; align-items: stretch; height: 100%; width: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer; position: relative; height: 100%; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; }
        .dragon-label { position: absolute; bottom: 20px; left: 10px; z-index: 10; writing-mode: vertical-rl; pointer-events: none; }

        /* 艺人流式条 */
        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; overflow: hidden; transition: all 0.5s ease; border-radius: 4px; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }
        .artist-info { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); writing-mode: vertical-rl; text-align: right; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }

        /* 电影墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 1s; }
        .kiss-item.loaded { opacity: 0.35; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.02); z-index: 5; }

        .search-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 1rem 1.5rem; width: 100%; border-radius: 1.2rem; outline: none; }
        ::-webkit-scrollbar { display: none; }
        
        /* 业务板块动效 */
        .biz-sub-layer { transform: translateY(101%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .group:hover .biz-sub-layer { transform: translateY(0); }

        /* 密集型瀑布流适配 */
        .tight-photo-grid {
            columns: 3; /* 移动端默认3列 */
            gap: 0.25rem; /* 极小间距 */
            space-y: 0.25rem;
        }
        @media (min-width: 768px) {
            .tight-photo-grid {
                columns: 5; /* 桌面端5列 */
            }
        }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-30 hover:opacity-100 transition p-2" onclick="toggleMusic(event)">
            <svg id="icon-playing" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="icon-paused" class="w-4 h-4 hidden opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
    </div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500" onclick="handleGlobalClick()"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const iconPlaying = document.getElementById('icon-playing');
        const iconPaused = document.getElementById('icon-paused');
        let isFirstClick = true; // 记录是否是第一次点击

        // 处理全局第一次点击以启用音乐 (浏览器限制)
        function handleGlobalClick() {
            if (isFirstClick) {
                audio.play().catch(()=>{});
                updateMusicIcon();
                isFirstClick = false;
            }
        }

        // 切换音乐播放/暂停
        function toggleMusic(event) {
            // 阻止冒泡，防止触发 globalClick
            if(event) event.stopPropagation(); 
            
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
            updateMusicIcon();
            isFirstClick = false; // 既然手动加载了，就不需要 globalClick 了
        }

        // 更新音乐图标状态
        function updateMusicIcon() {
            if (audio.paused) {
                iconPlaying.classList.add('hidden');
                iconPaused.classList.remove('hidden');
            } else {
                iconPlaying.classList.remove('hidden');
                iconPaused.classList.add('hidden');
            }
        }
        
        function fixPosterUrl(url) {
            if (!url) return '';
            return url.replace('img1.doubanio.com', 'img2.doubanio.com')
                      .replace('img3.doubanio.com', 'img2.doubanio.com')
                      .replace('img9.doubanio.com', 'img2.doubanio.com');
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'photo') renderPhoto();
                else if(page === 'coach') renderCoach();
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span>
                            <span class="en text-[10px]">Business & Creative Sectors</span>
                        </div>
                        <div class="biz-sub-layer absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">平面设计</span><span class="en text-[9px]">Design</span>
                            </div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photo</span>
                            </div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">私人教练</span><span class="en text-[9px]">Coach</span>
                            </div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all">
                        <span class="zh text-2xl mb-2">电影人生</span>
                        <span class="en text-[10px]">Cinema Life</span>
                    </div>
                    <div class="glass p-10 opacity-30"><span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">Loading...</span></div>
                </div>`;
        }

        // --- 摄影板块：密集型适配 ---
        function renderPhoto() {
            const categories = [
                { id: '商业摄影', zh: '商业摄影', en: 'Commercial' },
                { id: '情绪摄影', zh: '情绪摄影', en: 'Mood' },
                { id: '自媒体摄影', zh: '自媒体摄影', en: 'Social Media' }
            ];

            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="zh text-5xl font-light">摄影</span><span class="en text-xs mt-1 opacity-20">Photography</span></div>
                        ${categories.map(cat => `
                            <div onclick="loadPhotoSet('${cat.id}')" class="glass p-5 cursor-pointer hover:bg-white/10 transition-all border-l-2 border-transparent hover:border-white/40">
                                <span class="zh text-lg">${cat.zh}</span>
                                <span class="en text-[8px] opacity-20">${cat.en}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex-1 glass p-2 overflow-y-auto max-h-[85vh]">
                        <div id="photo-grid" class="tight-photo-grid"></div>
                    </div>
                </div>
            `;
            loadPhotoSet('商业摄影');
        }

        function loadPhotoSet(prefix) {
            const grid = document.getElementById('photo-grid');
            grid.style.opacity = '0';
            
            setTimeout(() => {
                grid.innerHTML = '';
                let count = 1;
                const maxAttempt = 200; // 安全上限

                const checkAndAdd = (index) => {
                    if (index > maxAttempt) return;
                    
                    const src = `摄影/${prefix}${index}.jpg`;
                    const img = new Image();
                    
                    img.onload = () => {
                        grid.innerHTML += `
                            <div class="break-inside-avoid glass border-none rounded-xl p-0.5">
                                <img src="${src}" class="w-full h-auto rounded-lg hover:scale-105 transition duration-700">
                            </div>`;
                        checkAndAdd(index + 1);
                    };
                    img.onerror = () => {
                        if(index === 1) grid.innerHTML = '<p class="p-4 opacity-10 text-xs">暂无作品加载</p>';
                        grid.style.opacity = '1';
                    };
                    img.src = src;
                };
                checkAndAdd(count);
            }, 300);
        }

        // --- 教练板块 ---
        function renderCoach() {
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light">私人教练</span><span class="en text-sm mt-2 opacity-30">Fitness Architect</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
                    <div class="glass p-12 text-center flex flex-col items-center">
                        <span class="text-4xl opacity-10 italic">01</span><span class="zh text-2xl mb-4 mt-6">增肌减脂</span>
                    </div>
                    <div class="glass p-12 text-center flex flex-col items-center">
                        <span class="text-4xl opacity-10 italic">02</span><span class="zh text-2xl mb-4 mt-6">力量训练</span>
                    </div>
                    <div class="glass p-12 text-center flex flex-col items-center">
                        <span class="text-4xl opacity-10 italic">03</span><span class="zh text-2xl mb-4 mt-6">动作优化</span>
                    </div>
                </div>`;
        }

        // --- 视觉作品 ---
        function renderWorks() {
            const workList = [
                {zh: '离不了', en: 'UNSEPARABLE', img: '批判1.png'},
                {zh: '新保龄运动', en: 'NEW BOWLING', img: '保龄1.png'},
                {zh: '血液涅槃', en: 'BLOOD NIRVANA', img: '血液1.png'},
                {zh: '健身工厂', en: 'FITNESS FACTORY', img: '健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light">视觉作品集</span><span class="en text-sm mt-2 opacity-30">Design Portfolio</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${workList.map(w => `
                        <div class="glass p-5 group">
                            <div class="aspect-[2/1] overflow-hidden rounded-2xl"><img src="${w.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000"></div>
                            <div class="mt-6 flex flex-col"><span class="zh text-xl">${w.zh}</span><span class="en text-[9px] opacity-30 mt-1">${w.en}</span></div>
                        </div>`).join('')}
                </div>`;
        }

        // --- 电影人生 ---
        function renderCinema() {
            const top10 = [
                {zh:'新世界', en:'New World', img:'新世界.png'},
                {zh:'杀死比尔', en:'Kill Bill', img:'杀死比尔2.png'},
                {zh:'无间道', en:'Internal Affairs', img:'无间道.png'},
                {zh:'姜戈', en:'Django Unchained', img:'被解救的姜戈.png'},
                {zh:'星际穿越', en:'Interstellar', img:'星际穿越.png'},
                {zh:'胭脂扣', en:'Rouge', img:'胭脂扣.png'},
                {zh:'爱在黎明破晓前', en:'Before Sunrise', img:'爱在黎明破晓前.png'},
                {zh:'勇士', en:'Warrior', img:'勇士.png'},
                {zh:'七宗罪', en:'Se7en', img:'七宗罪.png'},
                {zh:'美国丽人', en:'American Beauty', img:'美国丽人.png'}
            ];
            const allArtists = [
                {zh:'昆汀', en:'Quentin Tarantino', img:'昆汀.jpg'},
                {zh:'黑泽明', en:'Akira Kurosawa', img:'黑泽明.jpg'},
                {zh:'诺兰', en:'Christopher Nolan', img:'诺兰.jpg'},
                {zh:'皮特', en:'Brad Pitt', img:'布拉德皮特.jpg'},
                {zh:'休格兰特', en:'Hugh Grant', img:'休格兰特.jpg'},
                {zh:'张国荣', en:'Leslie Cheung', img:'张国荣.jpg'},
                {zh:'朱莉', en:'Angelina Jolie', img:'安吉丽娜朱莉.jpg'},
                {zh:'凯拉', en:'Keira Knightley', img:'凯拉奈特利.jpg'},
                {zh:'罗伯茨', en:'Julia Roberts', img:'朱莉娅罗伯茨.jpg'}
            ];

            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light tracking-tighter">电影人生</span><span class="en text-sm mt-2 opacity-30">Cinema Archive</span></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4 mb-12">
                    <div class="glass overflow-hidden h-[420px] relative">
                        <div class="dragon-row">
                            ${top10.map((m, i) => `
                                <div class="dragon-item" style="z-index:${20-i}">
                                    <div class="dragon-label"><span class="zh text-[11px] text-white/90">${m.zh}</span><span class="en text-[7px] text-white/30 uppercase mt-2">${m.en}</span></div>
                                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/11?text=${m.zh}'">
                                </div>`).join('')}
                        </div>
                    </div>
                    <div class="glass p-2 h-[420px] relative">
                        <div class="artist-scroll">
                            ${allArtists.map(a => `
                                <div class="artist-strip">
                                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/300x600/11?text=${a.zh}'">
                                    <div class="artist-info"><span class="zh text-[11px] font-bold text-white/90">${a.zh}</span><span class="en text-[7px] text-white/40 uppercase">${a.en}</span></div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-4">
                    <div class="glass p-10 min-h-[600px]"><input type="text" id="movieSearch" class="search-input mb-10" placeholder="搜索..." oninput="debounceSearch()"><div id="movie-list-grid" class="grid grid-cols-2 gap-y-4 gap-x-6"></div></div>
                    <div class="glass p-1 h-fit"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>`;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            listGrid.innerHTML = movies.slice(0, 80).map(m => `
                <div class="group border-l border-white/5 pl-4 hover:border-white/30 transition">
                    <span class="zh text-sm opacity-40 group-hover:opacity-100 truncate transition">${m.title.split(' / ')[0]}</span>
                </div>`).join('');
            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${fixPosterUrl(m.poster)}" class="kiss-item lazy-item">`).join('');
                const obs = new IntersectionObserver((es) => { es.forEach(e => { if (e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); } }); }, { rootMargin: "600px" });
                document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
            }
        }

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = document.getElementById('movieSearch').value.toLowerCase();
                displayMovies(movieData.filter(m => m.title.toLowerCase().includes(term)));
            }, 300);
        }

        // 绑定音乐更新事件，确保外部暂停时UI也同步
        audio.addEventListener('play', updateMusicIcon);
        audio.addEventListener('pause', updateMusicIcon);

        window.onload = () => {
            switchPage('home');
            updateMusicIcon(); // 初始状态
        }
    </script>
</body>
</html>
