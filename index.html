<script>
    // 1. 获取全局元素（加上防御逻辑，防止报错）
    const audio = document.getElementById('global-bgm');
    const app = document.getElementById('app-content');

    // 2. 初始状态检查：强制确保主页显示
    window.onload = () => {
        if (app) app.classList.remove('page-fade');
    };

    function upUI(p) {
        const statusText = document.getElementById('m-status');
        const bars = document.querySelectorAll('.bar');
        if (statusText) statusText.innerText = p ? "On" : "Off";
        bars.forEach(b => p ? b.classList.remove('bar-p') : b.classList.add('bar-p'));
    }

    // 激活音频
    document.addEventListener('click', function initAudio() {
        if (audio && audio.paused && localStorage.getItem('mPlay') !== 'false') {
            audio.play().then(() => {
                upUI(true);
                localStorage.setItem('mPlay', 'true');
                document.removeEventListener('click', initAudio);
            }).catch(() => {});
        }
    });

    function toggleMusic(e) {
        if(e) e.stopPropagation();
        if (!audio) return;
        if (audio.paused) { 
            audio.play(); upUI(true); localStorage.setItem('mPlay', 'true'); 
        } else { 
            audio.pause(); upUI(false); localStorage.setItem('mPlay', 'false'); 
        }
    }

    // 3. 增强版路由：即使失败也不会白屏
    async function router(url) {
        if (!app) { window.location.href = url; return; }
        
        // 自动纠正文件名
        let targetUrl = (url === 'movie.html') ? 'movies.html' : url;
        
        app.classList.add('page-fade');
        
        try {
            const res = await fetch(targetUrl);
            if (!res.ok) throw new Error('Fetch failed');
            
            const text = await res.text();
            const dom = new DOMParser().parseFromString(text, 'text/html');
            const newContent = dom.getElementById('app-content');
            
            if (!newContent) throw new Error('No Container');

            setTimeout(() => {
                app.innerHTML = newContent.innerHTML;
                
                // 执行新页面脚本
                const scripts = newContent.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });

                history.pushState({url: targetUrl}, '', targetUrl);
                window.scrollTo(0, 0);
                app.classList.remove('page-fade'); // 核心：确保移除透明层
                setTimeout(() => upUI(!audio.paused), 50);
            }, 400);

        } catch (err) {
            console.error("Routing error, falling back:", err);
            window.location.href = targetUrl; // 报错直接跳转，拒绝白屏
        }
    }

    window.onpopstate = () => location.reload();
</script>
