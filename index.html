<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem;
            display: flex; flex-direction: column;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        .back-arrow {
            position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500;
            font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 个人十佳 龙鳞布局优化 */
        .dragon-row { display: flex; overflow-x: auto; padding: 20px 0; scrollbar-width: none; align-items: flex-end; flex-grow: 1; }
        .dragon-item {
            flex: 0 0 100px; margin-right: -50px; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer; position: relative;
        }
        .dragon-item:hover { margin-right: 50px; transform: translateY(-10px); z-index: 100 !important; }
        
        .vertical-title {
            writing-mode: vertical-rl; text-orientation: mixed;
            font-size: 10px; margin-bottom: 15px; letter-spacing: 0.3em;
            height: 140px; text-align: right; pointer-events: none;
            color: rgba(255,255,255,0.8);
        }

        .dragon-item img { 
            width: 100%; aspect-ratio: 2/3; object-fit: cover; 
            border: 0.5px solid rgba(255,255,255,0.2); border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 艺人 3x3 板块对齐海报墙比例 */
        .artist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; flex-grow: 1; }
        .artist-card { aspect-ratio: 2/3; overflow: hidden; border-radius: 0.8rem; position: relative; border: 0.5px solid rgba(255,255,255,0.08); background: #111; }
        .artist-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .artist-card:hover img { opacity: 1; transform: scale(1.05); }
        .artist-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* 亲吻墙网格 */
        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: opacity 1s; }
        .kiss-item.loaded { opacity: 0.5; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.1); z-index: 50; }

        .search-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 1rem 1.5rem; width: 100%; border-radius: 1.2rem; outline: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>
    <div id="audio-control" class="audio-btn fixed top-6 right-6 w-11 h-11 rounded-full bg-white/5 backdrop-blur-md z-[500] flex justify-center items-center cursor-pointer" onclick="toggleAudio(event)"><div class="play-icon border-y-[7px] border-y-transparent border-l-[11px] border-l-white ml-0.5" id="icon"></div></div>

    <div id="app-content" class="pt-32 p-6 md:p-20 transition-opacity duration-500"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');

        function playMusic() { if (audio.paused) { audio.play().then(() => updateAudioUI(true)).catch(()=>{}); } }
        function toggleAudio(e) { e.stopPropagation(); if (audio.paused) { audio.play(); updateAudioUI(true); } else { audio.pause(); updateAudioUI(false); } }
        function updateAudioUI(isPlaying) { icon.className = isPlaying ? 'w-[10px] h-[12px] border-l-[3px] border-r-[3px] border-white' : 'border-y-[7px] border-y-transparent border-l-[11px] border-l-white ml-0.5'; }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else renderSoon(page);
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [{id:'cinema', zh:'电影人生', en:'Cinema Life'}, {id:'music', zh:'音乐人生', en:'Music Life'}, {id:'read', zh:'阅读人生', en:'Reading Life'}];
            app.innerHTML = `<div class="h-[40vh] flex flex-col justify-end pb-12 px-4"><h1><span class="zh text-[16vw] md:text-[9vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6 px-4">${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}</div>`;
        }

        function renderCinema() {
            const top10 = ['新世界', '杀死比尔', '无间道', '被解救的姜戈', '星际穿越', '胭脂扣', '爱在黎明破晓前', '勇士', '七宗罪', '美国丽人'];
            
            const artists = [
                {type:'导演', names:['昆汀', '黑泽明', '诺兰']},
                {type:'男演员', names:['布拉德皮特', '休格兰特', '张国荣']},
                {type:'女演员', names:['安吉丽娜朱莉', '凯拉奈特利', '朱莉娅罗伯茨']}
            ];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span><span class="en text-lg">Cinema Archive</span></div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 px-4 mb-16 items-stretch">
                    <div class="glass p-10">
                        <span class="zh text-sm opacity-30 mb-8 tracking-widest uppercase">My Top 10 Archive</span>
                        <div class="dragon-row">
                            ${top10.map((name, i) => `
                                <div class="dragon-item" style="z-index:${20-i}">
                                    <div class="vertical-title"><span class="v-zh">${name}</span></div>
                                    <img src="${name}.png" onerror="this.src='https://via.placeholder.com/300x450/222?text=${name}'">
                                </div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="glass p-10">
                        <span class="zh text-sm opacity-30 mb-8 tracking-widest uppercase">Favorite Artists</span>
                        <div class="artist-grid">
                            ${artists.map(group => group.names.map(name => `
                                <div class="artist-card">
                                    <img src="${name}.png" onerror="this.src='https://via.placeholder.com/400x600/111?text=${name}'">
                                    <div class="artist-info">
                                        <span class="zh text-[9px] opacity-40">${group.type}</span>
                                        <span class="zh text-[11px] font-bold">${name}</span>
                                    </div>
                                </div>`).join('')).join('')}
                        </div>
                    </div>
                </div>

                <div class="flex flex-col lg:flex-row gap-8 px-4">
                    <div class="glass p-10 flex-[1.4]">
                        <input type="text" id="movieSearch" class="search-input mb-10" placeholder="搜索一部你觉得毛天艺没有看过的电影" oninput="debounceSearch()">
                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-4"></div>
                    </div>
                    <div class="flex-1"><div id="cinema-wall" class="kiss-wall"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            listGrid.innerHTML = movies.map(m => `<div class="cursor-pointer group" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title.split('/')[0]}'), '_blank')"><div class="zh text-[13px] opacity-40 group-hover:opacity-100 transition-all truncate">${m.title.split('/')[0]}</div><div class="en text-[8px] opacity-10 group-hover:opacity-30 truncate uppercase">${m.title.split('/')[1] || ''}</div></div>`).join('');
            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { const img = entry.target; img.src = img.dataset.src; img.onload = () => img.classList.add('loaded'); observer.unobserve(img); } }); }, { rootMargin: "500px" });
                document.querySelectorAll('.lazy-item').forEach(img => observer.observe(img));
            }
        }

        function debounceSearch() {
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(term === '' ? movieData : filtered);
        }

        function renderSoon(p) { app.innerHTML = `<div class="py-60 text-center glass mx-4"><span class="zh opacity-20 text-4xl uppercase">${p} Coming Soon</span></div>`; }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
