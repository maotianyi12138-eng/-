<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 首页业务卡片动效 */
        #biz-card { transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .sub-btn { transition: all 0.4s ease; cursor: pointer; }
        .sub-btn:hover { transform: translateY(-5px); filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* 龙鳞装 & 艺人流式条 (保留原样式) */
        .dragon-row { display: flex; overflow-x: auto; scrollbar-width: none; align-items: stretch; height: 100%; width: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer; position: relative; height: 100%; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; }
        .dragon-label { position: absolute; bottom: 20px; left: 10px; z-index: 10; writing-mode: vertical-rl; pointer-events: none; }

        .artist-scroll { display: flex; gap: 4px; height: 100%; width: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; overflow: hidden; transition: all 0.5s ease; border-radius: 4px; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        .kiss-wall { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 1s; }
        .kiss-item.loaded { opacity: 0.35; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.02); z-index: 5; }

        .search-input { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); color: white; padding: 1rem 1.5rem; width: 100%; border-radius: 1.2rem; outline: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
    </div>
    
    <div id="app-content" class="pt-24 p-6 md:p-16 transition-opacity duration-500"></div>

    <script src="movies.js"></script> 
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');

        function playMusic() { if (audio.paused) audio.play().catch(()=>{}); }
        
        function fixPosterUrl(url) {
            if (!url) return '';
            return url.replace(/img[1-9].doubanio.com/g, 'img2.doubanio.com');
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'works') renderWorks();
                else if(page === 'photo') renderPhoto();
                else if(page === 'coach') renderCoach();
                else if(page === 'cinema') renderCinema();
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        }

        // --- 核心页面渲染 ---

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-[0.4em]">Tianyi Mao</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div id="biz-card" class="glass p-10 md:col-span-2 relative overflow-hidden group">
                        <div id="biz-init" class="transition-all duration-700">
                            <span class="zh text-3xl mb-2">核心业务</span>
                            <span class="en text-xs opacity-30">Business Sectors</span>
                            <div class="mt-8 flex gap-4">
                                <span class="px-3 py-1 border border-white/10 rounded-full text-[10px] opacity-40">DESIGN</span>
                                <span class="px-3 py-1 border border-white/10 rounded-full text-[10px] opacity-40">PHOTO</span>
                                <span class="px-3 py-1 border border-white/10 rounded-full text-[10px] opacity-40">COACH</span>
                            </div>
                        </div>
                        
                        <div class="absolute inset-0 flex items-center justify-around bg-black/40 backdrop-blur-xl translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out">
                            <div onclick="switchPage('works')" class="sub-btn text-center">
                                <span class="zh text-xl">平面设计</span><span class="en text-[9px]">Visual</span>
                            </div>
                            <div onclick="switchPage('photo')" class="sub-btn text-center">
                                <span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photo</span>
                            </div>
                            <div onclick="switchPage('coach')" class="sub-btn text-center">
                                <span class="zh text-xl">私人教练</span><span class="en text-[9px]">Coach</span>
                            </div>
                        </div>
                    </div>

                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all">
                        <span class="zh text-2xl mb-2">电影人生</span>
                        <span class="en text-[10px]">Cinema Life</span>
                    </div>

                    <div class="glass p-10 opacity-30 cursor-not-allowed">
                        <span class="zh text-2xl mb-2">更多模块</span>
                        <span class="en text-[10px]">Coming Soon</span>
                    </div>
                </div>
            `;
        }

        function renderPhoto() {
            const cats = [
                {id:'commercial', zh:'商业摄影', en:'Commercial'},
                {id:'mood', zh:'情绪摄影', en:'Mood Mood'},
                {id:'media', zh:'自媒体摄影', en:'Social Media'}
            ];
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-12 min-h-[70vh]">
                    <div class="md:w-64 flex flex-col gap-4">
                        <span class="zh text-5xl mb-8">摄影</span>
                        ${cats.map(c => `
                            <div onclick="loadPhotos('${c.id}')" class="glass p-6 cursor-pointer hover:bg-white/10 transition-all border-l-2 border-transparent hover:border-white/50">
                                <span class="zh text-lg">${c.zh}</span>
                                <span class="en text-[8px]">${c.en}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div id="photo-wall" class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 transition-all duration-500">
                        </div>
                </div>
            `;
            loadPhotos('commercial');
        }

        function loadPhotos(type) {
            const wall = document.getElementById('photo-wall');
            wall.style.opacity = '0';
            wall.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                const imgs = [1,2,3].map(n => `${type}${n}.jpg`); // 自动匹配：商业摄影1.jpg 等
                wall.innerHTML = imgs.map(src => `
                    <div class="glass p-2 overflow-hidden rounded-3xl aspect-[3/4]">
                        <img src="${src}" class="w-full h-full object-cover rounded-2xl hover:scale-110 transition-transform duration-1000" onerror="this.src='https://via.placeholder.com/600x800/11?text=MAO+PHOTO'">
                    </div>
                `).join('');
                wall.style.opacity = '1';
                wall.style.transform = 'translateY(0)';
            }, 300);
        }

        function renderWorks() {
            const workList = [
                {zh: '离不了', en: 'UNSEPARABLE', img: '批判1.png'},
                {zh: '新保龄运动', en: 'NEW BOWLING', img: '保龄1.png'},
                {zh: '血液涅槃', en: 'BLOOD NIRVANA', img: '血液1.png'},
                {zh: '健身工厂', en: 'FITNESS FACTORY', img: '健身1.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 flex flex-col"><span class="zh text-6xl font-light">平面设计</span><span class="en text-sm opacity-30 mt-2">Visual Works</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${workList.map(w => `
                        <div class="glass p-5 group">
                            <div class="aspect-[2/1] overflow-hidden rounded-2xl">
                                <img src="${w.img}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            </div>
                            <div class="mt-6 flex flex-col"><span class="zh text-xl">${w.zh}</span><span class="en text-[9px] opacity-30 mt-1">${w.en}</span></div>
                        </div>`).join('')}
                </div>`;
        }

        function renderCoach() {
            app.innerHTML = `
                <div class="mb-12 flex flex-col"><span class="zh text-6xl font-light">私人教练</span><span class="en text-sm opacity-30 mt-2">Health & Fitness</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass p-12 text-center">
                        <div class="text-4xl mb-6 opacity-40 italic">01</div>
                        <span class="zh text-2xl mb-2">增肌减脂</span>
                        <span class="en text-[10px] opacity-20">Body Composition</span>
                    </div>
                    <div class="glass p-12 text-center">
                        <div class="text-4xl mb-6 opacity-40 italic">02</div>
                        <span class="zh text-2xl mb-2">力量训练</span>
                        <span class="en text-[10px] opacity-20">Strength Training</span>
                    </div>
                    <div class="glass p-12 text-center">
                        <div class="text-4xl mb-6 opacity-40 italic">03</div>
                        <span class="zh text-2xl mb-2">饮食规划</span>
                        <span class="en text-[10px] opacity-20">Nutrition Plan</span>
                    </div>
                </div>
            `;
        }

        function renderCinema() {
            // (此处保留你原有的 renderCinema 逻辑，为了字数限制，内部实现参考你之前的代码即可)
            // 包含 top10, allArtists, movieSearch 等逻辑
            const top10 = [
                {zh:'新世界', en:'New World', img:'新世界.png'},
                {zh:'杀死比尔', en:'Kill Bill', img:'杀死比尔2.png'},
                {zh:'无间道', en:'Internal Affairs', img:'无间道.png'},
                {zh:'姜戈', en:'Django Unchained', img:'被解救的姜戈.png'},
                {zh:'星际穿越', en:'Interstellar', img:'星际穿越.png'},
                {zh:'胭脂扣', en:'Rouge', img:'胭脂扣.png'},
                {zh:'爱在黎明破晓前', en:'Before Sunrise', img:'爱在黎明破晓前.png'},
                {zh:'勇士', en:'Warrior', img:'勇士.png'},
                {zh:'七宗罪', en:'Se7en', img:'七宗罪.png'},
                {zh:'美国丽人', en:'American Beauty', img:'美国丽人.png'}
            ];
            app.innerHTML = `
                <div class="mb-12 flex flex-col"><span class="zh text-6xl font-light">电影人生</span><span class="en text-sm opacity-30 mt-2">Cinema Archive</span></div>
                <div class="glass overflow-hidden h-[420px] mb-12 relative">
                    <div class="dragon-row">${top10.map((m,i)=>`
                        <div class="dragon-item" style="z-index:${20-i}">
                            <div class="dragon-label"><span class="zh text-[11px]">${m.zh}</span><span class="en text-[7px] mt-2">${m.en}</span></div>
                            <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/11?text=${m.zh}'">
                        </div>`).join('')}
                    </div>
                </div>
                <div class="glass p-10 min-h-[400px]">
                    <p class="opacity-20 text-sm">更多电影数据库加载中...</p>
                </div>
            `;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
