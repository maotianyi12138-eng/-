<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #app-content { transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.8s ease; opacity: 0; transform: translateY(20px); }
        .page-active { opacity: 1 !important; transform: translateY(0) !important; }
        
        /* Josh Warner 特有的超大标题排版 */
        .big-title { font-size: 14vw; font-weight: 100; line-height: 0.8; letter-spacing: -0.04em; }
        .sub-label { font-size: 10px; letter-spacing: 0.5em; opacity: 0.3; text-transform: uppercase; }
        
        .nav-item { position: relative; padding: 2rem 0; border-top: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s; }
        .nav-item:hover { padding-left: 2rem; border-top-color: #fff; }
        .nav-num { position: absolute; left: -4rem; top: 2.2rem; font-size: 10px; opacity: 0.2; }

        /* 音乐控制条 */
        .bar { width: 1px; height: 12px; background: white; transition: 0.3s; }
        .bar-p { height: 1px !important; opacity: 0.2; }
    </style>
</head>
<body>
    <audio id="global-bgm" loop src="bgm.mp3"></audio>

    <nav class="fixed top-0 w-full p-10 md:p-16 z-[100] flex justify-between items-start pointer-events-none">
        <div class="sub-label pointer-events-auto">Portfolio / 2026</div>
        <div onclick="toggleMusic(event)" class="flex items-end gap-[3px] cursor-pointer pointer-events-auto p-4">
            <div class="bar bar-p"></div><div class="bar bar-p"></div><div class="bar bar-p"></div>
        </div>
    </nav>

    <div id="app-content" class="min-h-screen flex flex-col justify-end p-10 md:p-24">
        <div class="mb-32">
            <h1 class="big-title">MAO<br>TIANYI</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
            <div class="flex flex-col">
                <div onclick="router('works.html')" class="nav-item group">
                    <span class="nav-num">01</span>
                    <h2 class="text-4xl font-light tracking-tighter">视觉作品 / VISUAL</h2>
                </div>
                <div onclick="router('cinema.html')" class="nav-item group">
                    <span class="nav-num">02</span>
                    <h2 class="text-4xl font-light tracking-tighter">电影人生 / CINEMA</h2>
                </div>
                <div onclick="router('read.html')" class="nav-item group">
                    <span class="nav-num">03</span>
                    <h2 class="text-4xl font-light tracking-tighter">阅读人生 / READ</h2>
                </div>
                <div onclick="router('music.html')" class="nav-item group">
                    <span class="nav-num">04</span>
                    <h2 class="text-4xl font-light tracking-tighter">音乐人生 / AUDIO</h2>
                </div>
            </div>
            <div class="hidden md:flex items-end justify-end">
                <p class="sub-label leading-loose text-right">
                    Focused on digital curation<br>and visual storytelling.<br>Based in China.
                </p>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('global-bgm');
        const app = document.getElementById('app-content');

        function toggleMusic(e) {
            if(e) e.stopPropagation();
            const bars = document.querySelectorAll('.bar');
            if (audio.paused) { 
                audio.play(); bars.forEach(b => b.classList.remove('bar-p'));
            } else { 
                audio.pause(); bars.forEach(b => b.classList.add('bar-p'));
            }
        }

        async function router(url) {
            app.style.transform = "translateY(-20px)";
            app.style.opacity = "0";
            localStorage.setItem('bgmTime', audio.currentTime);
            localStorage.setItem('bgmPlaying', !audio.paused);
            setTimeout(() => { window.location.href = url; }, 800);
        }

        window.onload = () => {
            const savedTime = localStorage.getItem('bgmTime');
            if(savedTime) audio.currentTime = savedTime;
            if(localStorage.getItem('bgmPlaying') === 'true') {
                audio.play().catch(() => {});
                document.querySelectorAll('.bar').forEach(b => b.classList.remove('bar-p'));
            }
            setTimeout(() => app.classList.add('page-active'), 100);
        };
    </script>
</body>
</html>
