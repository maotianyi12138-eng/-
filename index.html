<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .video-card-mini {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            border-radius: 1rem;
            transition: transform 0.3s ease;
        }
        .video-card-mini:hover { transform: scale(1.02); }

        .apple-search {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
            transition: all 0.3s ease; font-size: 14px;
        }

        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }

        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        @media (max-width: 767px) { grid-template-columns: repeat(2, 1fr); }
        
        .nav-active { border-left-color: rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.05em; text-transform: uppercase; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #viewer, #ad-pop { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #viewer { background: rgba(0,0,0,0.98); }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="nav-ui" class="hidden">
        <div class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-30 hover:opacity-100 transition p-2" onclick="toggleMusic(event)">
            <svg id="icon-playing" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 5L6 9H2v6h4l5 4V5z m8 0a10 10 0 0 1 0 14 m-3.5-3.5a5 5 0 0 0 0-7"></path></svg>
            <svg id="icon-paused" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>
    
    <div id="app-content" class="pt-16 p-6 md:p-16 transition-opacity duration-500 opacity-0"></div>

    <div id="ad-pop" style="display:none;" class="fixed inset-0 z-[1001] items-center justify-center bg-black/80 backdrop-blur-xl">
        <div class="glass p-12 max-w-lg w-[90%] text-center border-none">
            <span class="zh text-2xl mb-2">他没看过，快推荐给他吧</span>
            <span class="en text-xs opacity-40">He hasn't seen it, recommend it.</span>
            <div class="flex flex-col gap-4 mt-8">
                <button class="bg-yellow-400 text-black py-4 rounded-xl font-bold">
                    <span class="zh">推荐</span><span class="en text-[10px]">Recommend</span>
                </button>
                <button class="py-3 rounded-xl bg-white/10" onclick="closeAd()">
                    <span class="zh">已经分享</span><span class="en text-[10px]">Shared</span>
                </button>
            </div>
        </div>
    </div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        
        // 更新视听影像库内容
        const photoConfig = {
            '商业摄影': { type: 'grid', prefix: '摄影/商业摄影', max: 50 },
            '模特': { type: 'grid', prefix: '摄影/模特', max: 50 },
            '情绪摄影': { type: 'grid', prefix: '摄影/情绪摄影', max: 50 },
            '自媒体摄影': { type: 'grid', prefix: '摄影/自媒体摄影', max: 50 },
            'video': { 
                type: 'video-list', 
                links: [
                    "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4",
                    "https://sns-video-zl.xhscdn.com/stream/110/4/01e6cd6d950f58330103700391927eff1a_4.mp4", // 修正为图中第二条
                    "https://www.chali.com/material/brand/ys/video1.mp4",
                    "https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4"
                ] 
            }
        };

        function renderHome() {
            app.innerHTML = `
                <div class="h-[30vh] flex flex-col justify-end pb-8 px-4">
                    <span class="zh text-[12vw] md:text-[8vw] font-light">毛天艺</span>
                    <div class="mt-2">
                        <span class="zh text-sm md:text-base opacity-80">一个只想使过程精彩的人是无法被剥夺的</span>
                        <span class="en text-[10px] opacity-20 tracking-widest mt-1">THOSE WHO SEEK BRILLIANCE IN THE PROCESS CANNOT BE DEPRIVED.</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span><span class="en text-[10px]">Core Business Sectors</span>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">平面设计</span><span class="en text-[9px]">Graphic Design</span>
                            </div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photography</span>
                            </div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition">
                                <span class="zh text-xl">运动教学</span><span class="en text-[9px]">Sports Coaching</span>
                            </div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer hover:bg-white/5 transition-all">
                        <span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Life</span>
                    </div>
                    <div class="glass p-10 opacity-30">
                        <span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">More to Come</span>
                    </div>
                </div>`;
        }

        function renderPhoto() {
            const cats = [
                {id:'商业摄影', zh:'商业摄影', en:'Commercial'}, {id:'模特', zh:'模特', en:'Model'}, 
                {id:'情绪摄影', zh:'情绪摄影', en:'Mood'}, {id:'自媒体摄影', zh:'自媒体摄影', en:'Social Media'},
                {id:'video', zh:'视听影像', en:'Visual Media'}
            ];
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="zh text-5xl font-light">摄影</span><span class="en text-xs mt-1 opacity-20">Photography Portfolio</span></div>
                        ${cats.map(c => `<div onclick="handlePhotoNav('${c.id}', this)" class="photo-nav-item glass p-5 cursor-pointer hover:bg-white/10 transition-all border-l-2 border-transparent">
                            <span class="zh text-lg">${c.zh}</span><span class="en text-[9px]">${c.en}</span>
                        </div>`).join('')}
                    </div>
                    <div class="flex-1 glass p-4 overflow-y-auto max-h-[85vh] no-scrollbar">
                        <div id="photo-content-area" class="w-full h-full"></div>
                    </div>
                </div>`;
            handlePhotoNav('商业摄影', document.querySelector('.photo-nav-item'));
        }

        function renderCoach() {
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">运动教学</span><span class="en text-sm mt-2 opacity-30">Sports Coaching</span></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4">
                    <div class="glass p-12 text-center hover:bg-white/5 transition">
                        <span class="zh text-2xl">增肌减脂</span><span class="en text-[10px]">Body Transformation</span>
                    </div>
                    <div class="glass p-12 text-center hover:bg-white/5 transition">
                        <span class="zh text-2xl">力量训练</span><span class="en text-[10px]">Strength Training</span>
                    </div>
                    <div class="glass p-12 text-center hover:bg-white/5 transition">
                        <span class="zh text-2xl">动作优化</span><span class="en text-[10px]">Form Optimization</span>
                    </div>
                </div>`;
        }

        // ...其余逻辑（switchPage, handlePhotoNav, initVideoObserver等）保持不变...
        
        function handlePhotoNav(id, el) {
            document.querySelectorAll('.photo-nav-item').forEach(item => item.classList.remove('nav-active'));
            el.classList.add('nav-active');
            const container = document.getElementById('photo-content-area');
            const config = photoConfig[id];
            container.innerHTML = ''; 

            if (config.type === 'video-list') {
                const count = config.links.length;
                let cols = "grid-cols-1";
                if(count >= 8) cols = "md:grid-cols-4";
                else if(count >= 6) cols = "md:grid-cols-3";
                else if(count >= 4) cols = "md:grid-cols-2";

                container.className = `grid ${cols} gap-4`;
                container.innerHTML = config.links.map(url => `
                    <div class="video-card-mini glass p-1">
                        <video loop muted playsinline class="w-full h-full object-cover rounded-xl observer-video">
                            <source src="${url}" type="video/mp4">
                        </video>
                    </div>
                `).join('');
                initVideoObserver();
            } else {
                container.className = "tight-photo-grid";
                let i = 1;
                function loadImages() {
                    if(i > config.max) return;
                    const item = document.createElement('div');
                    item.className = 'photo-item';
                    item.innerHTML = `<img src="${config.prefix}${i}.jpg" loading="lazy" class="w-full h-auto" onerror="this.parentElement.remove()">`;
                    container.appendChild(item);
                    i++; setTimeout(loadImages, 30);
                }
                loadImages();
            }
        }

        function initVideoObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) video.play().catch(()=>{});
                    else video.pause();
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.observer-video').forEach(v => observer.observe(v));
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'photo') renderPhoto();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'coach') renderCoach();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 300);
        }

        function closeAd() { document.getElementById('ad-pop').style.display = 'none'; }
        function toggleMusic(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); updateMusicIcon(); }
        function updateMusicIcon() {
            document.getElementById('icon-playing').classList.toggle('hidden', audio.paused);
            document.getElementById('icon-paused').classList.toggle('hidden', !audio.paused);
        }

        window.addEventListener('load', () => { renderHome(); app.style.opacity = '1'; });
    </script>
</body>
</html>
