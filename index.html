<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.5; letter-spacing: 0.05em; text-transform: uppercase; }
        
        .nav-active { border-left: 2px solid rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 电影人生专用样式 */
        .movie-poster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        @media (min-width: 768px) { .movie-poster-grid { grid-template-columns: repeat(5, 1fr); } }
        
        /* 堆叠与网格 */
        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }
        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui">
        <div id="back-btn" class="fixed top-8 left-8 z-[500] cursor-pointer opacity-50 hover:opacity-100 transition hidden" onclick="switchPage('home')">
            <span class="zh">返回</span><span class="en text-[10px]">Return</span>
        </div>
        <div id="music-toggle" class="fixed top-8 right-8 z-[500] cursor-pointer opacity-40 hover:opacity-100 transition p-3 glass" onclick="toggleMusic()">
            <div id="music-on" class="w-4 h-4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            <div id="music-off" class="w-4 h-4 hidden"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></div>
        </div>
    </div>

    <div id="app-content" class="pt-12 p-6 md:p-16 opacity-0 transition-opacity duration-500"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        // 音乐自动播放逻辑
        let hasInteracted = false;
        const startAudio = () => { if(!hasInteracted) { audio.play(); hasInteracted = true; updateMusicIcon(); } };
        ['click', 'touchstart', 'scroll'].forEach(e => window.addEventListener(e, startAudio, {once:true}));

        function toggleMusic() { audio.paused ? audio.play() : audio.pause(); updateMusicIcon(); }
        function updateMusicIcon() {
            document.getElementById('music-on').classList.toggle('hidden', audio.paused);
            document.getElementById('music-off').classList.toggle('hidden', !audio.paused);
        }

        // --- 核心渲染 ---
        function renderHome() {
            app.innerHTML = `
                <div class="h-[25vh] flex flex-col justify-end pb-8 px-4">
                    <div class="flex items-baseline gap-4">
                        <span class="zh text-[10vw] md:text-[6vw] font-light">毛天艺</span>
                        <span class="en text-[3vw] md:text-[1.5vw] opacity-20 tracking-tighter">Tianyi Mao</span>
                    </div>
                    <div class="mt-2">
                        <span class="zh text-sm md:text-base opacity-80">一个只想使过程精彩的人是无法被剥夺的</span>
                        <span class="en text-[9px] md:text-[10px] opacity-40 tracking-wider mt-1">Those who seek brilliance in the process cannot be deprived.</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-4">
                    <div class="glass p-10 relative overflow-hidden group min-h-[200px] md:col-span-2">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0">
                            <span class="zh text-3xl mb-2">核心业务</span><span class="en text-[10px]">Business Sectors</span>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">平面设计</span><span class="en text-[9px]">Design</span></div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">摄影作品</span><span class="en text-[9px]">Photo</span></div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition"><span class="zh text-xl">运动教学</span><span class="en text-[9px]">Coach</span></div>
                        </div>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-10 cursor-pointer hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2">电影人生</span><span class="en text-[10px]">Cinema Life</span></div>
                    <div class="glass p-10 opacity-30"><span class="zh text-2xl mb-2">更多内容</span><span class="en text-[10px]">Coming Soon</span></div>
                </div>`;
        }

        function renderCinema() {
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="zh text-6xl font-light">电影人生</span><span class="en text-sm mt-2 opacity-30">Cinema Archive</span></div>
                <div class="flex flex-col md:flex-row gap-8 px-4">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div onclick="handleCinemaNav('search', this)" class="cinema-nav-item glass p-5 cursor-pointer nav-active"><span class="zh">观影库</span><span class="en text-[9px]">Watchlist</span></div>
                        <div onclick="handleCinemaNav('top10', this)" class="cinema-nav-item glass p-5 cursor-pointer border-transparent"><span class="zh">个人十佳</span><span class="en text-[9px]">Personal Top 10</span></div>
                        <div onclick="handleCinemaNav('favs', this)" class="cinema-nav-item glass p-5 cursor-pointer border-transparent"><span class="zh">演员导演</span><span class="en text-[9px]">Fav Actors & Directors</span></div>
                    </div>
                    <div id="cinema-content" class="flex-1 glass p-8 min-h-[60vh]"></div>
                </div>`;
            handleCinemaNav('search', document.querySelector('.cinema-nav-item'));
        }

        function handleCinemaNav(type, el) {
            document.querySelectorAll('.cinema-nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            const container = document.getElementById('cinema-content');
            
            if(type === 'search') {
                container.innerHTML = `
                    <div class="mb-6"><input type="text" id="movieSearch" class="bg-white/5 border border-white/10 text-white rounded-xl p-4 w-full outline-none" placeholder="搜搜看..." oninput="liveSearch()"></div>
                    <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 max-h-[50vh] overflow-y-auto no-scrollbar"></div>`;
                updateMovieGrid(movieData);
            } else if(type === 'top10') {
                container.innerHTML = `<div class="movie-poster-grid">${Array.from({length:10}).map((_,i)=>`<div class="aspect-[2/3] bg-white/5 rounded-lg overflow-hidden group"><img src="电影个人十佳海报/${i+1}.jpg" class="w-full h-full object-cover group-hover:scale-110 transition duration-700" onerror="this.src='https://via.placeholder.com/200x300?text=Poster'"></div>`).join('')}</div>`;
            } else {
                container.innerHTML = `<div class="grid grid-cols-2 gap-8">
                    <div><span class="zh text-xl mb-4 opacity-40">导演 / Directors</span><div class="flex flex-col gap-2 mt-4"><img src="电影 演员导演/1.jpg" class="rounded-xl opacity-80 hover:opacity-100 transition"></div></div>
                    <div><span class="zh text-xl mb-4 opacity-40">演员 / Actors</span><div class="flex flex-col gap-2 mt-4"><img src="电影 演员导演/2.jpg" class="rounded-xl opacity-80 hover:opacity-100 transition"></div></div>
                </div>`;
            }
        }

        // 电影搜索逻辑
        function updateMovieGrid(list) {
            const grid = document.getElementById('movie-grid');
            if(grid) grid.innerHTML = list.map(m => `<div class="opacity-40 hover:opacity-100 border-l border-white/10 pl-2 py-1"><span class="zh text-[11px]">${m.title.split(' / ')[0]}</span></div>`).join('');
        }
        function liveSearch() {
            const val = document.getElementById('movieSearch').value.toLowerCase();
            updateMovieGrid(movieData.filter(m => m.title.toLowerCase().includes(val)));
        }

        // 平面设计渲染
        function renderWorks() {
            const projs = [{z:'离不了',e:'Inseparable',p:'平面设计/离不了',c:4},{z:'新保龄',e:'Bowling',p:'平面设计/新保龄运动',c:6},{z:'血液涅槃',e:'Blood',p:'平面设计/血液涅槃',c:4}];
            app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">平面设计</span><span class="en text-sm mt-2 opacity-30">Graphic Design</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                    ${projs.map(p => `<div class="glass p-6 group"><div class="design-stack">${Array.from({length: p.c}).map((_, i) => `<div class="stack-layer shadow-2xl" style="left:${i*12}%; z-index:${p.c-i}; background:#111;"><img src="${p.p}${i+1}.png" class="w-full h-full object-cover rounded-lg"></div>`).join('')}</div><div class="mt-4"><span class="zh text-xl">${p.z}</span><span class="en text-[10px]">${p.e}</span></div></div>`).join('')}
                </div>`;
        }

        // 摄影渲染 (略, 保持之前版本)
        function renderPhoto() {
             app.innerHTML = `<div class="mb-12 px-4"><span class="zh text-6xl font-light">摄影</span><span class="en text-sm mt-2 opacity-30">Photography</span></div><div class="px-4 opacity-40">摄影板块内容载入中...</div>`;
             setTimeout(() => switchPage('home'), 1000); // 示例
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                backBtn.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'photo') renderPhoto();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        window.onload = () => { renderHome(); app.style.opacity = '1'; };
    </script>
</body>
</html>
