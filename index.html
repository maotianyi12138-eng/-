<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&family=Noto+Sans+SC:wght@100;300;400&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 1s ease;
        }

        /* 响应式壁纸 */
        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        /* 文字样式：中文大，英文小 */
        .zh { display: block; font-size: 1.5rem; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-size: 0.85rem; font-weight: 100; opacity: 0.6; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }
        
        /* 龙鳞装核心 */
        .dragon-stack { position: relative; width: 100%; transition: all 0.8s ease; cursor: pointer; }
        .leaf { 
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .leaf:nth-child(1) { z-index: 10; }
        .leaf:nth-child(2) { z-index: 9; transform: translateX(20px) scale(0.98); opacity: 0.8; }
        .leaf:nth-child(3) { z-index: 8; transform: translateX(40px) scale(0.96); opacity: 0.6; }

        .expanded { height: auto !important; }
        .expanded .leaf { position: relative; transform: none !important; opacity: 1 !important; margin-bottom: 10px; height: auto; box-shadow: none; }

        /* 西班牙亲吻墙风格 (Kiss Wall) */
        .kiss-wall { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 2px; 
            width: 100%;
        }
        @media (max-width: 767px) { .kiss-wall { grid-template-columns: repeat(4, 1fr); } }

        .kiss-item { 
            width: 100%; aspect-ratio: 2/3; object-fit: cover; 
            filter: grayscale(100%); 
            opacity: 0.4; transition: all 0.6s ease;
            cursor: crosshair;
        }
        .kiss-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.05); z-index: 10; }

        #app-content { transition: opacity 0.6s ease; min-height: 100vh; }
        .fade-hide { opacity: 0; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="fixed top-0 w-full p-8 z-[100] flex justify-between items-start pointer-events-none">
        <div onclick="switchPage('home')" class="pointer-events-auto cursor-pointer">
            <span class="zh text-2xl">毛天艺</span><span class="en text-sm">Tianyi Mao</span>
        </div>
        <div id="status" class="opacity-30 text-[10px] tracking-[0.3em]">AUDIO WAITING</div>
    </nav>

    <div id="app-content" class="pt-40 p-8 md:p-20"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');

        function playMusic() {
            if (audio.paused) {
                audio.play().catch(() => {});
                document.getElementById('status').innerText = "AUDIO PLAYING";
                document.getElementById('status').classList.replace('opacity-30', 'opacity-100');
            }
        }

        function switchPage(page) {
            app.classList.add('fade-hide');
            setTimeout(() => {
                if(page === 'home') renderHome();
                else if(page === 'works') renderWorks();
                else if(page === 'cinema') renderCinema();
                else renderSoon();
                app.classList.remove('fade-hide');
                window.scrollTo(0,0);
            }, 600);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[60vh] flex flex-col justify-end pb-20">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[12vw] leading-none">毛天艺</span>
                        <span class="en text-[6vw] md:text-[3vw] opacity-30 mt-4">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-8 border-t border-white/10 pt-12">
                    <div onclick="switchPage('works')" class="group cursor-pointer py-8"><span class="zh text-2xl group-hover:pl-2 transition-all">视觉作品集</span><span class="en">Visual Works</span></div>
                    <div onclick="switchPage('cinema')" class="group cursor-pointer py-8"><span class="zh text-2xl group-hover:pl-2 transition-all">电影人生</span><span class="en">Cinema Life</span></div>
                    <div onclick="switchPage('music')" class="group cursor-pointer py-8 opacity-20"><span class="zh text-2xl">音乐人生</span><span class="en">Music Life / Soon</span></div>
                    <div onclick="switchPage('read')" class="group cursor-pointer py-8 opacity-20"><span class="zh text-2xl">阅读人生</span><span class="en">Reading Life / Soon</span></div>
                </div>
            `;
        }

        function renderWorks() {
            const projects = [
                {zh:'健身系列', en:'Fitness Series', imgs:['健身1.png','健身2.png','健身3.png','健身4.png','健身5.png']},
                {zh:'血液研究', en:'Blood Study', imgs:['血液1.png','血液2.png','血液3.png','血液4.png']},
                {zh:'批判思维', en:'Critical Thinking', imgs:['批判1','批判2','批判3','批判4']},
                {zh:'保龄档案', en:'Bowling Archive', imgs:['保龄1','保龄2','保龄3','保龄4','保龄5','保龄6']}
            ];
            app.innerHTML = `
                <div class="mb-20"><span class="zh text-6xl">视觉作品集</span><span class="en text-xl">Visual Archive</span></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-12">
                    ${projects.map(p => `
                        <div>
                            <div class="dragon-stack h-[280px] md:h-[380px]" onclick="this.classList.toggle('expanded')">
                                ${p.imgs.map(src => `<img src="${src}" class="leaf" onerror="this.remove()">`).join('')}
                            </div>
                            <div class="mt-8"><span class="zh text-xl">${p.zh}</span><span class="en">${p.en}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCinema() {
            // 定义你的真实十佳电影名单（根据你的照片确认）
            const topNames = ["杀死比尔 2", "新世界", "爱在黎明破晓前", "勇士", "七宗罪", "无间道", "被解救的姜戈", "星际穿越", "胭脂扣", "美国丽人"];
            
            // 从 movieData 中寻找对应的海报
            const top10 = topNames.map((name, i) => {
                const found = movieData.find(m => m.title.includes(name));
                return {
                    zh: `${i+1 < 10 ? '0'+(i+1) : (i+1)} ${name}`,
                    en: found ? found.title.split('/')[1] || "" : "",
                    img: found ? found.poster : ""
                };
            });

            app.innerHTML = `
                <div class="mb-20"><span class="zh text-6xl">电影人生</span><span class="en text-xl">Cinema & Memories Archive</span></div>
                <div class="flex flex-col md:flex-row gap-16">
                    <div class="w-full md:w-5/12">
                        <div class="dragon-stack h-[480px] expanded mb-16">
                            <img src="${top10[0].img}" class="w-full shadow-2xl border border-white/10">
                        </div>
                        <div class="grid grid-cols-2 gap-x-10 gap-y-12 border-t border-white/10 pt-12">
                            ${top10.map(m => `
                                <div><span class="zh text-xl font-light">${m.zh}</span><span class="en text-[10px] leading-tight">${m.en}</span></div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="w-full md:w-7/12">
                        <div class="mb-6 border-b border-white/10 pb-4 flex justify-between items-end">
                            <span class="zh text-xl">全海报墙 / ${movieData.length}P</span>
                        </div>
                        <div id="kiss-container" class="kiss-wall"></div>
                    </div>
                </div>
            `;

            const wall = document.getElementById('kiss-container');
            movieData.forEach(m => {
                const img = document.createElement('img');
                img.src = m.poster;
                img.className = 'kiss-item';
                img.loading = "lazy";
                img.onerror = () => img.remove();
                wall.appendChild(img);
            });
        }

        function renderSoon() {
            app.innerHTML = `<div class="py-60 text-center opacity-20"><span class="zh text-4xl">筹备中</span><span class="en">Coming Soon</span></div>`;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
