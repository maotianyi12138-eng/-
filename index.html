<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        /* Apple 极致磨砂：更透、更润、圆角更大 */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }

        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.5; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 返回按钮 */
        .back-btn {
            position: fixed; top: 1.5rem; left: 1.5rem;
            padding: 0.8rem 1.5rem;
            z-index: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-btn:hover { transform: translateX(-5px); opacity: 0.7; }

        /* 龙鳞装：横向铺满 */
        .dragon-row {
            display: flex; overflow-x: auto; padding: 20px 0 60px 0; scrollbar-width: none;
        }
        .dragon-item {
            flex: 0 0 160px; margin-right: -80px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative;
        }
        .dragon-item:hover { margin-right: 20px; transform: translateY(-15px); z-index: 100 !important; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; }

        /* 5:5 布局核心 */
        .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        @media (max-width: 1024px) { .split-grid { grid-template-columns: 1fr; } }

        /* 亲吻墙：极致无缝 */
        .kiss-wall { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; width: 100%; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.9; transition: 0.5s; cursor: pointer; }
        .kiss-item:hover { opacity: 1; transform: scale(1.05); z-index: 10; }

        /* 音频控制 */
        .audio-btn {
            position: fixed; top: 1.5rem; right: 1.5rem;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); cursor: pointer; z-index: 500;
            display: flex; justify-content: center; align-items: center;
        }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 12px; border-color: transparent transparent transparent #fff; margin-left: 3px; }
        .pause-icon { width: 12px; height: 14px; border-left: 4px solid #fff; border-right: 4px solid #fff; }

        .search-input {
            background: rgba(255,255,255,0.05); border: none; color: white;
            padding: 1rem 1.5rem; width: 100%; border-radius: 1.5rem; outline: none;
        }

        #app-content { transition: opacity 0.5s ease; }
        ::-webkit-scrollbar { width: 0px; height: 0px; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui" class="hidden">
        <div class="back-btn glass" onclick="switchPage('home')">
            <span class="en text-xs">← BACK</span>
        </div>
    </div>
    
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)">
        <div class="play-icon" id="icon"></div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const navUI = document.getElementById('nav-ui');
        const icon = document.getElementById('icon');

        function playMusic() {
            if (audio.paused) {
                audio.play().then(() => updateAudioUI(true)).catch(e => console.log(e));
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();
            if (audio.paused) { audio.play(); updateAudioUI(true); }
            else { audio.pause(); updateAudioUI(false); }
        }

        function updateAudioUI(isPlaying) {
            icon.className = isPlaying ? 'pause-icon' : 'play-icon';
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                navUI.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else renderSoon(page);
                app.style.opacity = '1';
                window.scrollTo(0,0);
            }, 500);
        }

        function renderHome() {
            const menus = [
                {id:'works', zh:'视觉作品集', en:'Visual Works'},
                {id:'cinema', zh:'电影人生', en:'Cinema Life'},
                {id:'music', zh:'音乐人生', en:'Music Life'},
                {id:'read', zh:'阅读人生', en:'Reading Life'}
            ];
            app.innerHTML = `
                <div class="h-[50vh] flex flex-col justify-end pb-12 px-4">
                    <h1 class="tracking-tighter">
                        <span class="zh text-[16vw] md:text-[10vw] font-light leading-none">毛天艺</span>
                        <span class="en text-[5vw] md:text-[2vw] opacity-20 mt-2 tracking-widest uppercase">Tianyi Mao</span>
                    </h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    ${menus.map(m => `
                        <div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all duration-700">
                            <span class="zh text-2xl mb-2 group-hover:tracking-widest transition-all">${m.zh}</span>
                            <span class="en text-[10px]">${m.en}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderWorks() {
            const projects = [
                {zh:'健身系列', en:'Fitness Series', imgs:['健身1.png','健身2.png','健身3.png','健身4.png','健身5.png']},
                {zh:'血液研究', en:'Blood Study', imgs:['血液1.png','血液2.png','血液3.png','血液4.png']},
                {zh:'批判思维', en:'Critical Thinking', imgs:['批判1.png','批判2.png','批判3.png','批判4.png']},
                {zh:'保龄档案', en:'Bowling Archive', imgs:['保龄1.png','保龄2.png','保龄3.png','保龄4.png','保龄5.png','保龄6.png']}
            ];
            app.innerHTML = `
                <div class="mb-16 px-4"><span class="zh text-6xl font-light">视觉作品集</span><span class="en text-lg">Visual Archive</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 px-4">
                    ${projects.map(p => `
                        <div>
                            <div class="dragon-row !gap-0" style="height:350px;">
                                ${p.imgs.map((src, i) => `<div class="dragon-item" style="z-index:${10-i}"><img src="${src}" onerror="this.parentElement.remove()"></div>`).join('')}
                            </div>
                            <div class="mt-8 border-t border-white/10 pt-4"><span class="zh text-xl">${p.zh}</span><span class="en text-xs">${p.en}</span></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCinema() {
            const top10Names = ["杀死比尔 2", "新世界", "爱在黎明破晓前", "勇士", "七宗罪", "无间道", "被解救的姜戈", "星际穿越", "胭脂扣", "美国丽人"];
            const top10 = top10Names.map(name => movieData.find(m => m.title.includes(name))).filter(Boolean);
            const sortedMovies = [...movieData].sort((a, b) => a.title.localeCompare(b.title, 'zh'));

            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light">电影人生</span><span class="en text-lg">Cinema / Top 10</span></div>
                
                <div class="mb-24 px-4">
                    <div class="dragon-row">
                        ${top10.map((m, i) => `
                            <div class="dragon-item" style="z-index: ${20-i}" onclick="window.open('https://www.douban.com/search?cat=1002&q=${m.title.split('/')[0]}', '_blank')">
                                <img src="${m.poster}">
                                <div class="mt-4"><span class="zh text-sm opacity-60">${m.title.split('/')[0]}</span></div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="split-grid px-4">
                    <div class="glass p-10 md:p-14">
                        <div class="mb-10"><input type="text" id="movieSearch" class="search-input" placeholder="SEARCH FILMS..." oninput="filterMovies()"></div>
                        <div id="movie-list-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-1"></div>
                    </div>

                    <div>
                        <div class="mb-6 border-b border-white/10 pb-2"><span class="en text-[10px] opacity-30">POSTER ARCHIVE / ${movieData.length}P</span></div>
                        <div id="cinema-wall" class="kiss-wall"></div>
                    </div>
                </div>
            `;
            displayMovies(sortedMovies);
        }

        function displayMovies(movies) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;

            if (movies.length === 0) {
                listGrid.innerHTML = `<div class="col-span-full py-20 opacity-20 zh text-xl text-center">毛天艺还没看过此片</div>`;
                wall.innerHTML = '';
                return;
            }

            listGrid.innerHTML = movies.map(m => `
                <div class="py-2 cursor-pointer opacity-50 hover:opacity-100 transition-all" onclick="window.open('https://www.douban.com/search?cat=1002&q=${m.title.split('/')[0]}', '_blank')">
                    <div class="zh text-lg">${m.title.split('/')[0]}</div>
                    <div class="en text-[8px] truncate">${m.title.split('/')[1] || ''}</div>
                </div>
            `).join('');

            wall.innerHTML = movies.map(m => `
                <img src="${m.poster}" class="kiss-item" onclick="window.open('https://www.douban.com/search?cat=1002&q=${m.title.split('/')[0]}', '_blank')" onerror="this.remove()">
            `).join('');
        }

        function filterMovies() {
            const term = document.getElementById('movieSearch').value.toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(filtered);
        }

        function renderSoon(p) {
            app.innerHTML = `<div class="py-60 text-center glass mx-4"><span class="zh opacity-20 text-4xl">${p.toUpperCase()} 筹备中</span></div>`;
        }

        window.onload = () => switchPage('home');
    </script>
</body>
</html>
