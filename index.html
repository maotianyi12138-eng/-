<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        .back-arrow { position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500; font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s; }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 龙鳞布局 */
        .dragon-container { width: 100vw; overflow: hidden; margin-left: -1.5rem; }
        .dragon-row { display: flex; width: 100%; padding: 40px 5% 80px; justify-content: space-between; align-items: flex-end; }
        .dragon-item { flex: 1; margin-right: -4.5vw; max-width: 170px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; }
        .dragon-item:hover { margin-right: 2.5vw; transform: translateY(-20px) scale(1.05); z-index: 100 !important; }
        .v-zh { writing-mode: vertical-rl; font-size: 11px; margin-bottom: 25px; letter-spacing: 0.5em; height: 150px; text-align: right; color: rgba(255,255,255,0.9); font-weight: 500; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 0.5px solid rgba(255,255,255,0.2); border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        /* 海报墙修复 */
        .kiss-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 2px; width: 100%; height: 850px; overflow-y: auto; padding: 10px; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: 0.5s; background: #111; border-radius: 2px; }
        .kiss-item.loaded { opacity: 0.35; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.1); z-index: 10; }

        /* 搜索框 */
        .search-input { background: rgba(255,255,255,0.05); border: none; color: white; padding: 1rem 1.8rem; width: 100%; border-radius: 1.5rem; outline: none; font-size: 0.9rem; }
        
        /* 统计与云图 */
        .stat-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .stat-fill { height: 100%; background: rgba(255,255,255,0.4); transition: 1s; }
        .cloud-tag { font-size: 12px; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s; padding: 2px 0; }
        .cloud-tag:hover { color: #fff; }

        /* 作品集竖向龙鳞 */
        .work-dragon-v { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 40px 0; }
        .stack-img-v { width: 100%; aspect-ratio: 2/1; object-fit: cover; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.1); margin-top: -10vh; transition: 0.5s; }
        .stack-img-v:first-child { margin-top: 0; }
        .work-card:hover .stack-img-v { margin-top: 10px; transform: scale(1.02); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>

    <div id="ad-overlay" class="fixed inset-0 bg-black/95 z-[2000] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="glass p-20 text-center"><span class="zh text-4xl mb-4 font-bold">他真没看过！</span><div class="mt-10 px-10 py-4 bg-white text-black rounded-full cursor-pointer font-bold" onclick="closeAd()">已经推荐给他了 I'VE TOLD HIM</div></div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20 transition-opacity duration-300"></div>

    <script src="movies.js"></script>
    <script>
        const app = document.getElementById('app-content');
        const audio = document.getElementById('main-audio');
        let searchTimer;

        function playMusic() { if (audio.paused) audio.play(); }
        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('nav-ui').classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [{id:'works', zh:'视觉作品集', en:'Visual Works'}, {id:'cinema', zh:'电影人生', en:'Cinema Archive'}];
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-4"><h1><span class="zh text-[16vw] md:text-[9vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5"><span class="zh text-2xl mb-2">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>
            `;
        }

        function renderCinema() {
            // 数据统计：流派云图 & 地区热力
            const tagStats = {};
            movieData.forEach(m => m.genres.forEach(g => tagStats[g] = (tagStats[g] || 0) + 1));
            
            // 地区热力统计（筛选出常见的地区）
            const regions = ["美国", "中国大陆", "日本", "韩国", "法国", "中国香港", "英国", "意大利"].map(r => ({name: r, count: tagStats[r] || 0}));
            const maxCount = Math.max(...regions.map(r => r.count));

            // 影人流派云图（排除地区，取高频关键词）
            const cloudTags = Object.entries(tagStats)
                .filter(([name]) => !["美国", "中国大陆", "日本", "韩国", "法国", "中国香港", "英国", "意大利", "剧情", "电影"].includes(name))
                .sort((a,b) => b[1] - a[1]).slice(0, 30);

            const top10 = [
                {name:'新世界', db:'10756762'}, {name:'杀死比尔 2', db:'1291585'}, {name:'无间道', db:'1307914'}, {name:'被解救的姜戈', db:'6307447'}, {name:'星际穿越', db:'1889243'}, 
                {name:'胭脂扣', db:'1300325'}, {name:'爱在黎明破晓前', db:'1296339'}, {name:'勇士', db:'3141107'}, {name:'七宗罪', db:'1292223'}, {name:'美国丽人', db:'1292062'}
            ];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span></div>
                <div class="dragon-container"><div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}" onclick="window.open('https://movie.douban.com/subject/${m.db}/')"><div class="v-zh">${m.name}</div><img src="${m.name}.png"></div>`).join('')}</div></div>
                
                <div class="flex flex-col lg:flex-row gap-0 px-4">
                    <div class="glass p-10 flex-[1.2] rounded-r-none border-r-0">
                        <input type="text" id="movieSearch" class="search-input mb-10" placeholder="搜一部你认为毛天艺没看过的电影" oninput="debounceSearch()">
                        
                        <div class="grid grid-cols-2 gap-10 mb-10">
                            <div>
                                <div class="filter-title">地区热力统计</div>
                                ${regions.map(r => `
                                    <div class="mb-3">
                                        <div class="flex justify-between text-[10px] opacity-40 uppercase"><span>${r.name}</span><span>${r.count}</span></div>
                                        <div class="stat-bar"><div class="stat-fill" style="width: ${(r.count/maxCount)*100}%"></div></div>
                                    </div>
                                `).join('')}
                            </div>
                            <div>
                                <div class="filter-title">影人 / 流派云图</div>
                                <div class="flex flex-wrap gap-x-4 gap-y-1">
                                    ${cloudTags.map(t => `<span class="cloud-tag" onclick="filterByTag('${t[0]}')">${t[0]}</span>`).join('')}
                                </div>
                            </div>
                        </div>

                        <div id="movie-list-grid" class="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto pr-2 scrollbar-hide border-t border-white/5 pt-6"></div>
                    </div>
                    <div class="flex-1"><div id="cinema-wall" class="kiss-wall glass rounded-l-none scrollbar-hide"></div></div>
                </div>
            `;
            updateDisplay(movieData, true);
        }

        function renderWorks() {
            const projects = [{zh:'1.离不了', en:'UNSEPARABLE', prefix:'批判', count:4}, {zh:'2.新保龄运动', en:'NEW BOWLING MOVEMENT', prefix:'保龄', count:6}, {zh:'3.血液涅槃', en:'BLOOD NIRVANA', prefix:'血液', count:4}, {zh:'4.健身工厂', en:'FITNESS FACTORY', prefix:'健身', count:5}];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light tracking-tighter">视觉作品集</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 px-4">
                    ${projects.map(p => `
                        <div class="bg-black p-8 work-card overflow-hidden rounded-2xl border border-white/10 transition-all">
                            <div class="mb-6 flex justify-between items-end border-b border-white/10 pb-4"><span class="zh text-2xl font-light">${p.zh}</span><span class="en text-[10px] opacity-30">${p.en}</span></div>
                            <div class="work-dragon-v">${Array.from({length: p.count}).map((_, i) => `<img src="${p.prefix}${i+1}.png" class="stack-img-v" style="z-index:${20-i}">`).join('')}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function filterByTag(tag) {
            const filtered = movieData.filter(m => m.genres.includes(tag));
            updateDisplay(filtered);
        }

        function updateDisplay(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid) return;
            
            listGrid.innerHTML = movies.map(m => `
                <div class="opacity-30 hover:opacity-100 cursor-pointer transition-all text-[12px] truncate" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title}'))">
                    ${m.title.split('/')[0]}
                </div>`).join('');

            if(initWall && wall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.style.display='none'">`).join('');
                initLazy();
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            searchTimer = setTimeout(() => {
                const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
                updateDisplay(term === '' ? movieData : filtered);
                if(term !== '' && filtered.length === 0) {
                    document.getElementById('ad-overlay').style.opacity = '1';
                    document.getElementById('ad-overlay').style.pointerEvents = 'auto';
                }
            }, 800);
        }

        function initLazy() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if(e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); }});
            }, { rootMargin: "800px" });
            document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
        }

        function closeAd() { document.getElementById('ad-overlay').style.opacity = '0'; document.getElementById('ad-overlay').style.pointerEvents = 'none'; }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
