<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { body { background-image: url('mobile_bg.jpg'); } }

        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 0.5px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .zh { display: block; font-weight: 400; line-height: 1.2; }
        .en { display: block; font-weight: 100; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

        /* 返回导航 */
        .back-arrow { position: fixed; top: 2.5rem; left: 2.5rem; z-index: 500; font-size: 1.8rem; color: #fff; cursor: pointer; transition: 0.3s; }
        .back-arrow:hover { transform: translateX(-5px); opacity: 0.6; }

        /* 电影十佳：横向龙鳞 */
        .dragon-container { width: 100vw; overflow: hidden; margin-left: -1.5rem; }
        .dragon-row { display: flex; width: 100%; padding: 40px 5% 80px; justify-content: space-between; align-items: flex-end; }
        .dragon-item { flex: 1; margin-right: -4.5vw; max-width: 170px; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; display: flex; flex-direction: column; align-items: center; }
        .dragon-item:last-child { margin-right: 0; }
        .dragon-item:hover { margin-right: 2.5vw; transform: translateY(-20px) scale(1.05); z-index: 100 !important; }
        .v-zh { writing-mode: vertical-rl; font-size: 11px; margin-bottom: 25px; letter-spacing: 0.5em; height: 150px; text-align: right; color: rgba(255,255,255,0.9); font-weight: 500; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 0.5px solid rgba(255,255,255,0.2); border-radius: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }

        /* 视觉作品集：竖版龙鳞 */
        .work-dragon-v { display: flex; flex-direction: column; align-items: center; width: 100%; padding: 40px 0; }
        .stack-img-v { 
            width: 100%; aspect-ratio: 2/1; object-fit: cover; border-radius: 4px; 
            border: 0.5px solid rgba(255,255,255,0.1); margin-top: -10vh; 
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6); 
        }
        .stack-img-v:first-child { margin-top: 0; }
        .work-card:hover .stack-img-v { margin-top: 10px; transform: scale(1.02); }

        /* 亲吻墙 */
        .kiss-wall { display: grid; grid-template-columns: repeat(8, 1fr); gap: 1px; width: 100%; height: 750px; overflow-y: auto; }
        .kiss-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0; transition: opacity 1s; background: #111; }
        .kiss-item.loaded { opacity: 0.35; }
        .kiss-item:hover { opacity: 1 !important; transform: scale(1.15); z-index: 50; }

        /* 苹果风搜索框 */
        .search-input { 
            background: rgba(255,255,255,0.05); border: none; color: white; padding: 1rem 1.8rem; 
            width: 100%; border-radius: 1.5rem; outline: none; transition: 0.3s; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); font-size: 0.9rem;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }

        /* --- 新：豆瓣风格标签系统 --- */
        .filter-section { margin-bottom: 2rem; }
        .filter-title { font-size: 10px; opacity: 0.2; letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; font-weight: bold; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-btn { 
            padding: 6px 12px; font-size: 13px; border-radius: 6px; 
            background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .tag-btn .count { opacity: 0.3; font-size: 11px; font-weight: 300; }
        .tag-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .tag-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #fff; }
        .tag-btn.active .count { opacity: 0.6; }

        /* 音乐按钮 */
        .audio-btn { position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1); }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
        .pause-icon { width: 10px; height: 12px; border-left: 3px solid #fff; border-right: 3px solid #fff; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="main-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <div id="nav-ui" class="hidden"><div class="back-arrow" onclick="switchPage('home')">←</div></div>
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)"><div class="play-icon" id="icon"></div></div>

    <div id="ad-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-3xl z-[2000] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="glass p-20 text-center">
            <span class="zh text-4xl mb-4 font-bold">他没看过！</span>
            <div class="mt-10 px-10 py-4 bg-white text-black rounded-full cursor-pointer" onclick="closeAd()">已经告诉他了 I'VE TOLD HIM ALREADY</div>
        </div>
    </div>

    <div id="app-content" class="pt-32 p-6 md:p-20 transition-opacity duration-300"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const app = document.getElementById('app-content');
        const icon = document.getElementById('icon');
        let searchTimer;

        // 全局筛选器状态
        window.currentFilters = { type: '全部', tag: '全部' };

        function playMusic() { if (audio.paused) audio.play().then(() => updateAudioUI(true)).catch(()=>{}); }
        function toggleAudio(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); updateAudioUI(!audio.paused); }
        function updateAudioUI(isPlaying) { icon.className = isPlaying ? 'pause-icon' : 'play-icon'; }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('nav-ui').classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function renderHome() {
            const menus = [{id:'works', zh:'视觉作品集', en:'Visual Works'}, {id:'cinema', zh:'电影人生', en:'Cinema Life'}, {id:'music', zh:'音乐人生', en:'Music Life'}, {id:'read', zh:'阅读人生', en:'Reading Life'}];
            app.innerHTML = `
                <div class="h-[45vh] flex flex-col justify-end pb-12 px-4"><h1 class="tracking-tighter"><span class="zh text-[16vw] md:text-[9vw] font-light">毛天艺</span></h1></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 px-4">
                    ${menus.map(m => `<div onclick="switchPage('${m.id}')" class="glass p-10 cursor-pointer group hover:bg-white/5 transition-all"><span class="zh text-2xl mb-2">${m.zh}</span><span class="en text-[10px]">${m.en}</span></div>`).join('')}
                </div>
            `;
        }

        function renderCinema() {
            // 自动化标签提取（根据你的图片需求精准匹配）
            const typeOpts = ["全部", "电影", "电视"];
            // 下面这些标签会自动统计 movieData 里的数据
            const tagOpts = ["全部", "美国", "剧情", "动作", "喜剧", "冒险", "犯罪", "科幻", "英国", "惊悚", "中国大陆", "爱情", "90年代", "奇幻", "动画", "悬疑", "中国香港", "法国", "日本", "韩国"];

            const getCount = (val, isType) => {
                if(val === '全部') return movieData.length;
                return movieData.filter(m => {
                    const dataStr = JSON.stringify(m);
                    return isType ? (m.type && m.type.includes(val)) : dataStr.includes(val);
                }).length;
            };

            const top10 = [
                {name:'新世界', db:'10756762'}, {name:'杀死比尔 2', db:'1291585'}, {name:'无间道', db:'1307914'}, 
                {name:'被解救的姜戈', db:'6307447'}, {name:'星际穿越', db:'1889243'}, {name:'胭脂扣', db:'1300325'}, 
                {name:'爱在黎明破晓前', db:'1296339'}, {name:'勇士', db:'3141107'}, {name:'七宗罪', db:'1292223'}, {name:'美国丽人', db:'1292062'}
            ];

            app.innerHTML = `
                <div class="mb-10 px-4"><span class="zh text-6xl font-light tracking-tighter">电影人生</span></div>
                <div class="dragon-container"><div class="dragon-row">${top10.map((m, i) => `<div class="dragon-item" style="z-index:${20-i}" onclick="window.open('https://movie.douban.com/subject/${m.db}/')"><div class="v-zh">${m.name}</div><img src="${m.name}.png"></div>`).join('')}</div></div>
                
                <div class="flex flex-col lg:flex-row gap-0 px-4">
                    <div class="glass p-8 md:p-12 flex-[1.4] rounded-r-none border-r-0">
                        <input type="text" id="movieSearch" class="search-input mb-12" placeholder="搜索一部你觉得毛天艺没有看过的电影" oninput="debounceSearch()">
                        
                        <div class="filter-section">
                            <div class="filter-title">形式</div>
                            <div class="tag-group">
                                ${typeOpts.map(t => `
                                    <button class="tag-btn ${t==='全部'?'active':''}" onclick="applyDoubanFilter('type', '${t}', this)">
                                        ${t} <span class="count">${getCount(t, true)}</span>
                                    </button>`).join('')}
                            </div>
                        </div>

                        <div class="filter-section">
                            <div class="filter-title">标签</div>
                            <div class="tag-group">
                                ${tagOpts.map(t => `
                                    <button class="tag-btn ${t==='全部'?'active':''}" onclick="applyDoubanFilter('tag', '${t}', this)">
                                        ${t} <span class="count">${getCount(t, false)}</span>
                                    </button>`).join('')}
                            </div>
                        </div>

                        <div id="movie-list-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-6 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide border-t border-white/5 pt-8"></div>
                    </div>
                    <div class="flex-1 h-fit"><div id="cinema-wall" class="kiss-wall glass rounded-l-none scrollbar-hide"></div></div>
                </div>
            `;
            displayMovies(movieData, true);
        }

        function applyDoubanFilter(key, val, el) {
            // UI 更新
            el.parentElement.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');

            // 逻辑更新
            window.currentFilters[key] = val;
            
            const filtered = movieData.filter(m => {
                const typeMatch = window.currentFilters.type === '全部' || (m.type && m.type.includes(window.currentFilters.type));
                const tagMatch = window.currentFilters.tag === '全部' || JSON.stringify(m).includes(window.currentFilters.tag);
                return typeMatch && tagMatch;
            });

            displayMovies(filtered);
        }

        function displayMovies(movies, initWall = false) {
            const listGrid = document.getElementById('movie-list-grid');
            const wall = document.getElementById('cinema-wall');
            if(!listGrid || !wall) return;
            
            listGrid.innerHTML = movies.map(m => `
                <div class="cursor-pointer group" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title.split('/')[0]}'))">
                    <div class="zh text-[12px] opacity-40 group-hover:opacity-100 truncate transition-all">${m.title.split('/')[0]}</div>
                    <div class="en text-[7px] opacity-10 truncate">${m.title.split('/')[1] || ''}</div>
                </div>`).join('');

            if(initWall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                initLazyLoading();
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.trim().toLowerCase();
            const filtered = movieData.filter(m => m.title.toLowerCase().includes(term));
            displayMovies(term === '' ? movieData : filtered);
            searchTimer = setTimeout(() => { 
                if (term !== '' && filtered.length === 0) { 
                    document.getElementById('ad-overlay').style.opacity = '1'; 
                    document.getElementById('ad-overlay').style.pointerEvents = 'auto'; 
                } 
            }, 1200);
        }

        function renderWorks() {
            const projects = [
                {zh:'1.离不了', en:'UNSEPARABLE', prefix:'批判', count:4},
                {zh:'2.新保龄运动', en:'NEW BOWLING MOVEMENT', prefix:'保龄', count:6},
                {zh:'3.血液涅槃', en:'BLOOD NIRVANA', prefix:'血液', count:4},
                {zh:'4.健身工厂', en:'FITNESS FACTORY', prefix:'健身', count:5}
            ];
            app.innerHTML = `
                <div class="mb-12 px-4"><span class="zh text-6xl font-light tracking-tighter">视觉作品集</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 px-4">
                    ${projects.map(p => `
                        <div class="bg-black p-8 work-card overflow-hidden rounded-2xl border border-white/10 transition-all duration-500">
                            <div class="mb-6 flex justify-between items-end border-b border-white/10 pb-4">
                                <span class="zh text-2xl font-light">${p.zh}</span>
                                <span class="en text-[10px] opacity-30">${p.en}</span>
                            </div>
                            <div class="work-dragon-v">
                                ${Array.from({length: p.count}).map((_, i) => `<img src="${p.prefix}${i+1}.png" class="stack-img-v" style="z-index:${20-i}">`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function initLazyLoading() {
            const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if(e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); } }); }, { rootMargin: "0px 0px 1000px 0px" });
            document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
        }

        function closeAd() { document.getElementById('ad-overlay').style.opacity = '0'; document.getElementById('ad-overlay').style.pointerEvents = 'none'; displayMovies(movieData); }
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
