<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { 
            background-color: #000; color: #fff; margin: 0;
            font-family: 'Times New Roman', 'Noto Sans SC', serif;
            background-size: cover; background-position: center; 
            background-attachment: fixed; /* 电脑端保持固定 */
            overflow-x: hidden;
            transition: background-image 0.8s ease-in-out;
        }
        
        /* 移除全局所有加粗 */
        * { font-weight: 300 !important; }

        @media (min-width: 768px) { body { background-image: url('horse.jpg'); } }
        @media (max-width: 767px) { 
            body { 
                background-image: url('mobile_bg.jpg'); 
                background-attachment: scroll; /* 手机端禁止缩放关键：改为跟随滚动 */
            } 
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
        }

        .en-main { display: block; letter-spacing: 0.05em; text-transform: uppercase; }
        .zh-sub { display: block; opacity: 0.4; font-size: 0.75rem; line-height: 1.2; }
        
        .nav-active { border-left: 2px solid rgba(255,255,255,0.8) !important; background: rgba(255,255,255,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tight-photo-grid { columns: 3; gap: 4px; }
        @media (min-width: 768px) { .tight-photo-grid { columns: 5; } }
        .photo-item { break-inside: avoid; margin-bottom: 4px; background: #111; border-radius: 8px; overflow: hidden; }

        .video-card-mini { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 1rem; transition: transform 0.3s ease; }
        .video-card-mini:hover { transform: scale(1.02); }

        .design-stack { position: relative; height: 260px; width: 100%; overflow: hidden; }
        .stack-layer { position: absolute; width: 60%; height: 90%; transition: 0.5s; border-radius: 8px; cursor: pointer; }
        .stack-layer:hover { transform: translateX(15px) scale(1.02); z-index: 60 !important; }

        .dragon-row { display: flex; overflow-x: auto; padding: 0; scrollbar-width: none; height: 100%; }
        .dragon-item { flex: 0 0 160px; margin-right: -100px; transition: 0.6s ease; cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 20px; z-index: 100 !important; transform: scale(1.05); }
        .dragon-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

        .artist-scroll { display: flex; gap: 4px; height: 100%; overflow: hidden; }
        .artist-strip { flex: 1; position: relative; transition: 0.5s ease; border-radius: 4px; overflow: hidden; }
        .artist-strip:hover { flex: 4; }
        .artist-strip img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: 0.5s; }
        .artist-strip:hover img { opacity: 1; }

        .movie-list-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        @media (max-width: 767px) { .movie-list-4col { grid-template-columns: repeat(2, 1fr); } }

        .apple-search {
            background: rgba(255, 255, 255, 0.05); border: 0.5px solid rgba(255, 255, 255, 0.1);
            color: #fff; border-radius: 12px; padding: 14px 20px; width: 100%; outline: none;
        }

        #viewer, #ad-pop { display: none; position: fixed; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #viewer { background: rgba(0,0,0,0.98); }

        .thought-card { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.1); padding: 2rem; border-radius: 1.5rem; transition: 0.3s; }
        .thought-card:hover { background: rgba(255,255,255,0.06); }
        .thought-images { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 1rem; }
        .thought-image-item { width: 100%; border: 0; padding: 0; background: transparent; border-radius: 10px; overflow: hidden; cursor: zoom-in; }
        .thought-image-item img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; display: block; transition: transform 0.25s ease; }
        .thought-image-item:hover img { transform: scale(1.03); }
        @media (max-width: 767px) {
            .thought-card { padding: 1.25rem; border-radius: 1rem; }
        }
        @media (min-width: 1024px) {
            .thought-images { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }

        .calligraphy-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; opacity: 0.6; transition: 0.5s; }
        .group:hover .calligraphy-preview { opacity: 1; }
        .works-project-cover { aspect-ratio: 4 / 3; object-fit: cover; width: 100%; }
        .works-detail-main { max-height: 72vh; width: 100%; object-fit: contain; background: #000; }
        .works-thumb { width: 68px; height: 68px; object-fit: cover; border-radius: 8px; opacity: 0.45; border: 1px solid rgba(255,255,255,0.1); transition: opacity 0.2s ease; }
        .works-thumb:hover, .works-thumb.active { opacity: 1; }
    </style>
</head>
<body>
    <audio id="main-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="nav-ui">

                <img id="viewer-img" src="" alt="Preview image" class="max-h-[85vh] max-w-[85vw] object-contain rounded shadow-2xl transition-all">

            <button class="text-5xl opacity-20 hover:opacity-100 hidden md:block" onclick="nextImg()">›</button>

            <span class="zh-sub">他还没看过，快推荐给他吧</span>
            <div class="flex flex-col gap-4 mt-8">

                <button class="py-3 rounded-xl bg-white/10 text-[10px] uppercase opacity-40" onclick="closeAd()">Already Shared</button>
            </div>

    </div>

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        const viewerArea = document.getElementById('viewer-touch-area');
        
        viewerArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });

            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextImg();
            if (touchEndX > touchStartX + 50) prevImg();
        }

        if (typeof myThoughts === 'undefined') {

        }

        const getImdbUrl = (q) => `https://www.imdb.com/find?q=${encodeURIComponent(q)}`;
        const worksCategories = [
            { id: '工作实践', en: 'Work Practice', path: '平面设计/工作实践' },
            { id: '批判设计', en: 'Critical Design', path: '平面设计/批判设计' },
            { id: '个人创意', en: 'Personal Creation', path: '平面设计/个人创意' }
        ];
        const worksFallbackManifest = {
            '工作实践': [
                '平面设计/工作实践/56851639451479_.pic.jpg',
                '平面设计/工作实践/56951639451522_.pic.jpg',
                '平面设计/工作实践/57031639451560_.pic.jpg',
                '平面设计/工作实践/57051639451575_.pic.jpg'
            ],
            '批判设计': [
                '平面设计/批判设计/健身工厂1.png',
                '平面设计/批判设计/健身工厂2.png',
                '平面设计/批判设计/健身工厂3.png',
                '平面设计/批判设计/健身工厂4.png',
                '平面设计/批判设计/健身工厂5.png',
                '平面设计/批判设计/离不了1.png',
                '平面设计/批判设计/离不了2.png',
                '平面设计/批判设计/离不了3.png',
                '平面设计/批判设计/离不了4.png',
                '平面设计/批判设计/新保龄运动1.png',
                '平面设计/批判设计/新保龄运动2.png',
                '平面设计/批判设计/新保龄运动3.png',
                '平面设计/批判设计/新保龄运动4.png',
                '平面设计/批判设计/新保龄运动5.png',
                '平面设计/批判设计/新保龄运动6.png',
                '平面设计/批判设计/血液涅槃1.png',
                '平面设计/批判设计/血液涅槃2.png',
                '平面设计/批判设计/血液涅槃3.png',
                '平面设计/批判设计/血液涅槃4.png'
            ],
            '个人创意': [
                '平面设计/个人创意/mobile_bg.jpg'
            ]
        };
        const worksProjectMeta = {
            '工作实践': {},
            '批判设计': {},
            '个人创意': {}
        };
        const worksState = {
            filesByCategory: {},
            projectsByCategory: {},
            currentCategory: '工作实践',
            currentProjectName: '',
            currentImageIndex: 0
        };
        const xunjiTrainApi = Object.freeze({
            baseUrl: 'https://trains.xunjiapp.cn',
            path: '/api_trains_for_llm',
            apiKey: 'xjllm_e172093b32ee9b30426167d4fbf12898191e4f60aee8061e'
        });
        const xunjiTrainCachePrefix = 'xunji-trains-cache-v1';
        const coachGoalProfile = Object.freeze({
            primary: '肌肥大',
            secondary: '偏心肺功能',
            outcomes: [
                '强化腰腹能力',
                '优化头肩腰比例',
                '提升握力与手指控制',
                '提升性功能相关体能（骨盆控制/血流/耐力）'
            ]
        });
        const trainApiState = {
            latestResult: null,
            inFlightByDate: new Map()
        };

        function escapeHtml(str = '') {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function getWorksCategoryById(id) {
            return worksCategories.find(c => c.id === id);
        }

        function parseWorksProjectFromFile(filePath) {
            const rawName = decodeURIComponent((filePath.split('/').pop() || '').trim());
            const extLess = rawName.replace(/\.[^.]+$/, '');
            const cleanBase = extLess.replace(/[.。](pic|heic|jpeg|jpg|png|webp|gif)$/i, '');
            const match = cleanBase.match(/^(.*?)(?:[\s_-]*(\d+))$/);
            const projectName = (match?.[1] || cleanBase || '未命名项目').trim();
            const order = match?.[2] ? parseInt(match[2], 10) : Number.MAX_SAFE_INTEGER;
            return { projectName, order };
        }

        function groupWorksProjects(files = []) {
            const projectMap = new Map();
            const sorted = [...files].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' }));
            sorted.forEach(path => {
                const { projectName, order } = parseWorksProjectFromFile(path);
                if (!projectMap.has(projectName)) projectMap.set(projectName, []);
                projectMap.get(projectName).push({ path, order });
            });

            return [...projectMap.entries()]
                .map(([name, images]) => ({
                    name,
                    images: images
                        .sort((a, b) => a.order - b.order || a.path.localeCompare(b.path, 'zh-Hans-CN', { numeric: true }))
                        .map(item => item.path)
                }))
                .sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN', { numeric: true }));
        }

        async function fetchWorksFilesFromDirectory(dirPath) {
            try {
                const res = await fetch(encodeURI(`${dirPath}/`), { cache: 'no-store' });
                if (!res.ok) return [];
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const hrefs = [...doc.querySelectorAll('a[href]')].map(a => a.getAttribute('href') || '');
                const files = hrefs
                    .filter(href => href && !href.startsWith('?') && !href.startsWith('#') && !href.endsWith('/'))
                    .map(href => decodeURIComponent(href.split('/').pop() || '').trim())
                    .filter(name => /\.(png|jpe?g|webp|gif)$/i.test(name))
                    .map(name => `${dirPath}/${name}`);
                return [...new Set(files)];
            } catch (_) {
                return [];
            }
        }

        async function getWorksFilesByCategory(categoryId) {
            if (worksState.filesByCategory[categoryId]) return worksState.filesByCategory[categoryId];
            const category = getWorksCategoryById(categoryId);
            if (!category) return [];

            const autoFiles = await fetchWorksFilesFromDirectory(category.path);
            const files = autoFiles.length > 0 ? autoFiles : (worksFallbackManifest[categoryId] || []);
            worksState.filesByCategory[categoryId] = files;
            return files;
        }

        function getWorksProjectMeta(categoryId, projectName) {
            const meta = worksProjectMeta?.[categoryId]?.[projectName] || {};
            return {
                time: meta.time || '时间待补充',
                intro: meta.intro || '项目介绍待补充（可在 worksProjectMeta 中按项目名填写）。'
            };
        }

        let hasInteracted = false;
        const startAudio = () => {
            if(!hasInteracted) {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
                hasInteracted = true;
                updateMusicIcon();
            }
        };
        ['click', 'touchstart', 'scroll', 'wheel'].forEach(e => window.addEventListener(e, startAudio, {once:true}));

        function toggleMusic() {
            if (audio.paused) {
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
            } else {
                audio.pause();
            }
            updateMusicIcon();
        }
        function updateMusicIcon() {
            document.getElementById('music-on').classList.toggle('hidden', audio.paused);
            document.getElementById('music-off').classList.toggle('hidden', !audio.paused);
        }

        function renderHome() {
            app.innerHTML = `
                <div class="h-[35vh] md:h-[45vh] flex flex-col justify-end pb-8 px-4">
                    <div class="flex flex-col md:flex-row items-baseline gap-2">
                        <span class="zh-sub opacity-100 order-2 md:order-1" style="font-size: 10vw;">毛天艺</span>
                        <span class="en-main text-[4vw] md:text-[2.5vw] order-1 md:order-2">Tianyi Mao</span>
                    </div>
                    <div class="mt-2">
                        <span class="en-main text-xs md:text-sm tracking-wider">Those who seek brilliance in the process cannot be deprived.</span>
                        <span class="zh-sub mt-1">一个只想使过程精彩的人是无法被剥夺的</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 px-4 mt-12 md:mt-24">
                    <div class="glass p-6 relative overflow-hidden group h-[140px]">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0 flex items-center h-full">
                            <div>
                                <span class="en-main text-2xl mb-1">What Can I Do</span><span class="zh-sub">核心业务</span>
                            </div>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('works')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-lg">Design</span><span class="zh-sub">平面设计</span></div>
                            <div onclick="switchPage('photo')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-lg">Photo</span><span class="zh-sub">摄影作品</span></div>
                            <div onclick="switchPage('coach')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-lg">Coach</span><span class="zh-sub">运动教学</span></div>
                        </div>
                    </div>
                    <div class="glass p-6 relative overflow-hidden group h-[140px]">
                        <div class="relative z-10 transition-opacity duration-500 group-hover:opacity-0 flex items-center h-full">
                            <div>
                                <span class="en-main text-2xl mb-1">More of Me</span><span class="zh-sub">个人兴趣</span>
                            </div>
                        </div>
                        <div class="absolute inset-0 glass border-none rounded-none flex items-center justify-around z-20 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
                            <div onclick="switchPage('cinema')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-base">Cinema</span><span class="zh-sub">电影</span></div>
                            <div onclick="switchPage('reading')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-base">Media</span><span class="zh-sub">视听</span></div>
                            <div onclick="switchPage('thoughts')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-base">Reflect</span><span class="zh-sub">感悟</span></div>
                            <div onclick="switchPage('calligraphy')" class="cursor-pointer text-center hover:scale-110 transition"><span class="en-main text-base">Ink</span><span class="zh-sub">书法</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderWorks() {
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="en-main text-5xl">Portfolio</span><span class="zh-sub text-xs mt-1">视觉作品集</span></div>
                        ${worksCategories.map((c, idx) => `
                            <div onclick="handleWorksNav('${c.id}', this)" class="works-nav-item glass p-5 cursor-pointer hover:bg-white/10 transition-all border-transparent">
                                <span class="en-main text-lg">${idx + 1}. ${c.en}</span>
                                <span class="zh-sub text-[9px]">${c.id}</span>
                            </div>`).join('')}
                    </div>
                    <div class="flex-1 glass p-4 overflow-y-auto max-h-[85vh] no-scrollbar">
                        <div id="works-content-area" class="min-h-[300px]"></div>
                    </div>
                </div>`;
            handleWorksNav('工作实践', document.querySelector('.works-nav-item'));
        }

        async function handleWorksNav(categoryId, el) {
            document.querySelectorAll('.works-nav-item').forEach(i => i.classList.remove('nav-active'));
            el?.classList.add('nav-active');

            worksState.currentCategory = categoryId;
            worksState.currentProjectName = '';
            worksState.currentImageIndex = 0;

            const area = document.getElementById('works-content-area');
            area.innerHTML = `<div class="h-48 flex items-center justify-center"><span class="en-main text-xs opacity-40">LOADING PROJECTS...</span></div>`;

            const files = await getWorksFilesByCategory(categoryId);
            worksState.projectsByCategory[categoryId] = groupWorksProjects(files);
            renderWorksProjectList(categoryId);
        }

        function renderWorksProjectList(categoryId) {
            const area = document.getElementById('works-content-area');
            const projects = worksState.projectsByCategory[categoryId] || [];

            if (!projects.length) {
                area.innerHTML = `<div class="h-48 flex items-center justify-center"><span class="zh-sub text-sm opacity-70">该分类暂无项目文件</span></div>`;
                return;
            }

            area.className = 'grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in duration-700';
            area.innerHTML = projects.map((project, idx) => `
                <button onclick="openWorksProject('${categoryId}', '${encodeURIComponent(project.name)}')" class="text-left glass p-3 md:p-4 hover:bg-white/10 transition-all">
                    <div class="overflow-hidden rounded-lg bg-black/40">
                        <img src="${project.images[0]}" loading="lazy" decoding="async" class="works-project-cover">
                    </div>
                    <div class="mt-3 flex items-center justify-between">
                        <div>
                            <span class="en-main text-sm">${idx + 1}. ${escapeHtml(project.name)}</span>
                            <span class="zh-sub text-[10px]">点击查看项目详情</span>
                        </div>
                        <span class="en-main text-[10px] opacity-30">${project.images.length}P</span>
                    </div>
                </button>`).join('');
        }

        function openWorksProject(categoryId, encodedProjectName) {
            const projectName = decodeURIComponent(encodedProjectName);
            const projects = worksState.projectsByCategory[categoryId] || [];
            const project = projects.find(item => item.name === projectName);
            if (!project) return;

            worksState.currentCategory = categoryId;
            worksState.currentProjectName = projectName;
            worksState.currentImageIndex = 0;
            renderWorksProjectDetail(categoryId, project);
        }

        function changeWorksImage(categoryId, encodedProjectName, delta) {
            const projectName = decodeURIComponent(encodedProjectName);
            const projects = worksState.projectsByCategory[categoryId] || [];
            const project = projects.find(item => item.name === projectName);
            if (!project || !project.images.length) return;

            const max = project.images.length;
            worksState.currentImageIndex = (worksState.currentImageIndex + delta + max) % max;
            renderWorksProjectDetail(categoryId, project);
        }

        function setWorksImage(categoryId, encodedProjectName, index) {

        function normalizeDateStr(rawDate) {
            const value = String(rawDate || '').trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) {
                throw new Error('datestr 必须是 YYYY-MM-DD 格式');
            }
            return value;
        }

        function getTrainCacheKey(datestr) {
            return `${xunjiTrainCachePrefix}:${datestr}`;
        }

        function readTrainCache(datestr) {
            try {
                const cachedRaw = localStorage.getItem(getTrainCacheKey(datestr));
                if (!cachedRaw) return null;
                const parsed = JSON.parse(cachedRaw);
                if (!Array.isArray(parsed?.res)) return null;
                return parsed;
            } catch (_) {
                return null;
            }
        }

        function saveTrainCache(datestr, payload) {
            try {
                localStorage.setItem(getTrainCacheKey(datestr), JSON.stringify(payload));
            } catch (_) {
                // localStorage 容量不足时静默失败，不影响页面使用
            }
        }

        function getCoachSelectedDate() {
            const input = document.getElementById('coach-train-date');
            return normalizeDateStr(input?.value || new Date().toISOString().split('T')[0]);
        }

        function setCoachStatus(message, isError = false) {
            const el = document.getElementById('coach-fetch-status');
            if (!el) return;
            el.textContent = message;
            el.className = `text-xs mt-3 ${isError ? 'text-red-300' : 'text-white/60'}`;
        }

        function parseTrainRecord(rawItem, idx) {
            const raw = String(rawItem || '').trim();
            const parts = raw.split(',').map(part => part.trim()).filter(Boolean);
            const idToken = parts.find(part => part.startsWith('id:')) || '';
            const trainTimeToken = parts.find(part => part.startsWith('train_time:')) || '';
            const title = parts.find((part, partIdx) => partIdx > 0 && !part.startsWith('id:') && !part.startsWith('train_time:')) || `训练记录 ${idx + 1}`;
            const timeValue = trainTimeToken.replace('train_time:', '');
            const [startRaw, endRaw] = timeValue.split('-');
            const start = Number(startRaw);
            const end = Number(endRaw);
            const durationMin = Number.isFinite(start) && Number.isFinite(end) && end > start
                ? Math.round((end - start) / 60000)
                : null;
            return { raw, parts, idToken, trainTimeToken, title, durationMin };
        }

        function includesAnyKeyword(text, keywords) {
            return keywords.some(keyword => text.includes(keyword));
        }

        function summarizeTrainRecords(records) {
            const keywordGroups = {
                cardio: ['跑', '骑', '划船', '心肺', '有氧', '跳绳', '冲刺', 'HIIT', 'hiit'],
                core: ['核心', '腹', '卷腹', '抗旋转', '平板', '死虫', 'Pallof', 'plank'],
                grip: ['握力', '手指', '悬垂', '农夫', '腕', '前臂', '抓握', 'pinch'],
                hypertrophy: ['卧推', '深蹲', '硬拉', '划船', '推举', '弯举', '腿举', '臀桥', '胸', '肩', '背', '腿']
            };
            const counts = { cardio: 0, core: 0, grip: 0, hypertrophy: 0 };
            let totalDurationMin = 0;
            let withDuration = 0;
            let hasIdToken = false;
            let hasTrainTimeToken = false;

            records.forEach(record => {
                const text = record.raw;
                if (record.idToken) hasIdToken = true;
                if (record.trainTimeToken) hasTrainTimeToken = true;
                if (typeof record.durationMin === 'number' && record.durationMin > 0) {
                    totalDurationMin += record.durationMin;
                    withDuration += 1;
                }
                if (includesAnyKeyword(text, keywordGroups.cardio)) counts.cardio += 1;
                if (includesAnyKeyword(text, keywordGroups.core)) counts.core += 1;
                if (includesAnyKeyword(text, keywordGroups.grip)) counts.grip += 1;
                if (includesAnyKeyword(text, keywordGroups.hypertrophy)) counts.hypertrophy += 1;
            });

            return {
                totalSessions: records.length,
                totalDurationMin,
                withDuration,
                avgDurationMin: withDuration ? Math.round(totalDurationMin / withDuration) : null,
                counts,
                hasIdToken,
                hasTrainTimeToken
            };
        }

                    <p class="text-[12px] text-white/80">Day5：全身代谢循环 + 短间歇（6-10 组）</p>
                    <p class="text-[12px] text-white/80">Day6：核心强化（腹横肌/下腹/侧链）+ 轻有氧</p>
                    <p class="text-[12px] text-white/80">Day7：完全休息或散步恢复</p>
                </div>
                <div class="border border-white/10 rounded-xl p-4 bg-white/5">
                    <p class="text-sm text-white/90 mb-2">数据写回注意</p>
                    ${tokenAdvice.map(item => `<p class="text-[11px] text-white/70">- ${escapeHtml(item)}</p>`).join('')}
                </div>
            `;
        }

        function bootstrapCoachFromCache(datestr) {
            const normalizedDate = normalizeDateStr(datestr);
            const cache = readTrainCache(normalizedDate);
            if (cache) {
                trainApiState.latestResult = { ...cache, source: 'cache' };
                setCoachStatus(`已加载本地缓存：${cache.res.length} 条`);
                renderCoachTrainData(trainApiState.latestResult);
                return;
            }
            trainApiState.latestResult = { datestr: normalizedDate, res: [], fetchedAt: 0, source: 'none' };
            renderCoachTrainData(trainApiState.latestResult);
            setCoachStatus('未命中本地缓存，请点击“读取训练数据”');
        }

        async function fetchTrainsForDate(datestr, { forceRefresh = false } = {}) {
            const normalizedDate = normalizeDateStr(datestr);
            const cached = !forceRefresh ? readTrainCache(normalizedDate) : null;
            if (cached) return { ...cached, source: 'cache' };
            if (trainApiState.inFlightByDate.has(normalizedDate)) {
                return trainApiState.inFlightByDate.get(normalizedDate);
            }

            const task = (async () => {
                const response = await fetch(`${xunjiTrainApi.baseUrl}${xunjiTrainApi.path}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${xunjiTrainApi.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ datestr: normalizedDate }),
                    cache: 'no-store'
                });
                const payload = await response.json().catch(() => null);
                const errMsg = payload?.msg || payload?.message || payload?.error || `request failed (${response.status})`;
                if (!response.ok || payload?.success === false) {
                    throw new Error(errMsg);
                }
                const result = {
                    datestr: normalizedDate,
                    res: Array.isArray(payload?.res) ? payload.res : [],
                    fetchedAt: Date.now()
                };
                saveTrainCache(normalizedDate, result);
                return { ...result, source: 'remote' };
            })();

            trainApiState.inFlightByDate.set(normalizedDate, task);
            try {
                return await task;
            } finally {
                trainApiState.inFlightByDate.delete(normalizedDate);
            }
        }

        async function handleCoachFetchTrain(forceRefresh = false) {
            try {
                const date = getCoachSelectedDate();
                setCoachStatus(`正在读取 ${date} 的训练数据...`);
                const result = await fetchTrainsForDate(date, { forceRefresh });
                trainApiState.latestResult = result;
                renderCoachTrainData(result);
                const sourceLabel = result.source === 'cache' ? '本地缓存' : '远程接口';
                setCoachStatus(`读取成功：${result.res.length} 条（来源：${sourceLabel}）`);
            } catch (error) {
                setCoachStatus(`读取失败：${error?.message || 'unknown error'}`, true);
            }
        }

        function handleCoachBuildPlan() {
            try {
                const date = getCoachSelectedDate();
                const cached = readTrainCache(date);
                if (cached) {
                    trainApiState.latestResult = { ...cached, source: 'cache' };
                    renderCoachTrainData(trainApiState.latestResult);
                    setCoachStatus(`已基于本地缓存重算计划：${cached.res.length} 条`);
                    return;
                }
                const fallback = trainApiState.latestResult?.datestr === date
                    ? trainApiState.latestResult
                    : { datestr: date, res: [], fetchedAt: 0, source: 'none' };
                renderCoachTrainData(fallback);
                setCoachStatus('未找到本地缓存，已按空数据给出基础计划');
            } catch (error) {
                setCoachStatus(`计划生成失败：${error?.message || 'unknown error'}`, true);
            }
        }

        function renderCalligraphy() {
            app.innerHTML = `
                <div class="mb-12 px-4 flex flex-col"><span class="en-main text-6xl">Daily Ink</span><span class="zh-sub text-sm mt-2">书法日常</span></div>
                <div class="px-4 max-w-5xl mx-auto">
                    <div class="glass p-4 md:p-12 text-center">
                        <div id="cal-container" class="flex flex-col items-center">
                            <span id="cal-date" class="en-main text-xs opacity-40 mb-8 tracking-[0.2em]">LOADING ARCHIVE...</span>
                            <div class="relative group cursor-zoom-in" onclick="openViewerSingle(document.getElementById('main-cal-img').src)">
                                <img id="main-cal-img" src="书法/latest.jpg" loading="lazy" decoding="async" class="max-h-[70vh] rounded shadow-2xl transition-all duration-700" onerror="handleCalligraphyError(this)">
                            </div>
                            <div class="mt-12 opacity-20 hover:opacity-100 transition">
                                <span class="en-main text-[10px]">Keep practicing. Every stroke matters.</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('cal-date').innerText = today;
        }

        function handleCalligraphyError(img) {
            img.src = "https://via.placeholder.com/800x1200/000000/FFFFFF?text=UPLOAD+TODAY+INK";
            document.getElementById('cal-date').innerText = "AWAITING NEW ENTRY";
        }

        function renderPhoto() {
            const cats = [{id:'商业摄影', en:'Commercial', zh:'商业摄影'}, {id:'模特', en:'Model', zh:'模特'}, {id:'情绪摄影', en:'Mood', zh:'情绪摄影'}, {id:'自媒体摄影', en:'Social', zh:'自媒体摄影'}, {id:'video', en:'Visuals', zh:'视听影像'}];
            app.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 px-4 min-h-[70vh]">
                    <div class="md:w-1/4 flex flex-col gap-3">
                        <div class="mb-4"><span class="en-main text-5xl">Photography</span><span class="zh-sub text-xs mt-1">摄影</span></div>
                        ${cats.map(c => `<div onclick="handlePhotoNav('${c.id}', this)" class="photo-nav-item glass p-5 cursor-pointer hover:bg-white/10 transition-all border-transparent">
                            <span class="en-main text-lg">${c.en}</span><span class="zh-sub text-[9px]">${c.zh}</span>
                        </div>`).join('')}
                    </div>
                    <div class="flex-1 glass p-4 overflow-y-auto max-h-[85vh] no-scrollbar"><div id="photo-content-area"></div></div>
                </div>`;
            handlePhotoNav('商业摄影', document.querySelector('.photo-nav-item'));
        }

        function handlePhotoNav(id, el) {
            document.querySelectorAll('.photo-nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            const area = document.getElementById('photo-content-area');
            
            const photoCfg = { 
                '商业摄影': { path: '摄影/商业摄影', ext: '.jpg' }, 
                '模特': { path: '模特/模特', ext: '.JPG' }, 
                '情绪摄影': { path: '摄影/情绪摄影', ext: '.jpg' }, 
                '自媒体摄影': { path: '摄影/自媒体摄影', ext: '.jpg' } 
            };
            
            if(id === 'video') {
                const links = ["https://sns-video-zl.xhscdn.com/stream/79/110/115/01e805fb570d7ef74f03700196576619b1_115.mp4", "https://sns-video-zl.xhscdn.com/stream/110/4/01e6cd6d950f58330103700391927eff1a_4.mp4", "https://www.chali.com/material/brand/ys/video1.mp4", "https://sns-video-zl.xhscdn.com/stream/1/110/115/01e92c5c4c1b1c6c010370019ad553c5f4_115.mp4"];
                area.className = "grid md:grid-cols-2 gap-4 animate-in fade-in duration-700";
                area.innerHTML = links.map(l => `<div class="video-card-mini glass p-1"><video loop muted playsinline autoplay preload="metadata" class="w-full h-full object-cover rounded-xl"><source src="${l}"></video></div>`).join('');
            } else {
                area.className = "tight-photo-grid animate-in fade-in duration-700";
                area.innerHTML = '';
                const cfg = photoCfg[id];
                for(let i=1; i<=50; i++) {
                    const div = document.createElement('div'); 
                    div.className = 'photo-item';
                    const img = document.createElement('img');
                    img.src = `${cfg.path}${i}${cfg.ext}`;
                    img.className = 'w-full h-auto cursor-zoom-in';
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.alt = `${id}-${i}`;
                    img.onclick = () => openViewerSingle(img.src);
                    img.onerror = function() { this.parentElement.remove(); };
                    div.appendChild(img);
                    area.appendChild(div);
                }
            }
        }

        function switchPage(page) {
            app.style.opacity = '0';
            setTimeout(() => {
                backBtn.classList.toggle('hidden', page === 'home');
                
                const isMobile = window.innerWidth < 768;
                if (page === 'thoughts' || page === 'calligraphy') {
                    document.body.style.backgroundImage = isMobile ? "url('反思竖屏.jpg')" : "url('反思横屏.jpg')";
                } else {
                    document.body.style.backgroundImage = isMobile ? "url('mobile_bg.jpg')" : "url('horse.jpg')";
                }

                if(page === 'home') renderHome();
                else if(page === 'photo') renderPhoto();
                else if(page === 'coach') renderCoach();
                else if(page === 'cinema') renderCinema();
                else if(page === 'works') renderWorks();
                else if(page === 'reading') renderReading();
                else if(page === 'thoughts') renderThoughts();
                else if(page === 'calligraphy') renderCalligraphy();
                
                app.style.opacity = '1'; window.scrollTo(0,0);
            }, 400);
        }

        function updateMovieGrid(list) {
            const container = document.getElementById('movie-names');
            if(container) {
                container.innerHTML = list.slice(0, 160).map(m => {
                    const titles = m.title.split(' / ');
                    const mainTitle = titles[0];
                    const altTitle = titles[1] || '';
                    return `<a href="${getImdbUrl(mainTitle)}" target="_blank" rel="noopener noreferrer" class="block border-l border-white/5 pl-2 transition-all hover:opacity-100 opacity-30">
                        <div class="en-main text-[9px] truncate">${altTitle || mainTitle}</div>
                        <div class="zh-sub text-[8px] truncate">${mainTitle}</div>
                    </a>`;
                }).join('');
            }
        }

        function liveSearch() {
            const val = document.getElementById('movieSearch').value.toLowerCase();
            updateMovieGrid(movieData.filter(m => m.title.toLowerCase().includes(val)));
        }
        
        function handleSearchEnter(e) {
            if (e.key === 'Enter') {
                const term = e.target.value.trim().toLowerCase();
                if (term !== '' && !movieData.some(m => m.title.toLowerCase().includes(term))) {
                    document.getElementById('ad-pop').style.display = 'flex';
                }
            }
        }

        function openViewerList(prefix, index, count) {
            currentImgList = Array.from({length: count}, (_, i) => `${prefix}${i+1}.png`);
            currentIndex = index - 1;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function openViewerSingle(src) {
            currentImgList = [src];
            currentIndex = 0;
            updateViewer();
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }
        function nextImg() { if(currentImgList.length <= 1) return; currentIndex = (currentIndex + 1) % currentImgList.length; updateViewer(); }
        function prevImg() { if(currentImgList.length <= 1) return; currentIndex = (currentIndex - 1 + currentImgList.length) % currentImgList.length; updateViewer(); }
        function updateViewer() { document.getElementById('viewer-img').src = currentImgList[currentIndex]; }
        function closeAd() { document.getElementById('ad-pop').style.display = 'none'; }

        window.onload = () => { renderHome(); app.style.opacity = '1'; };
    </script>
</body>
</html>
