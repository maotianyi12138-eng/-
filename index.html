<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAO TIANYI | ARCHIVE</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Noto+Sans+SC:wght@100;300;400;700&display=swap');
        
        body { background-color: #000; color: #fff; margin: 0; font-family: 'Inter', 'Noto Sans SC', sans-serif; overflow-x: hidden; transition: background 0.5s; }
        
        /* 壁纸适配 */
        @media (min-width: 768px) { body { background: url('horse.jpg') center/cover fixed; } }
        @media (max-width: 767px) { body { background: url('mobile_bg.jpg') center/cover fixed; } }
        
        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 0.5px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        
        /* 文字中英对照通用样式 */
        .text-group .zh { display: block; font-weight: 600; line-height: 1; }
        .text-group .en { display: block; font-weight: 200; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

        /* 音乐控制 */
        .audio-btn { position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.15); }
        .play-icon { width: 0; height: 0; border-style: solid; border-width: 6px 0 6px 10px; border-color: transparent transparent transparent #fff; }
        .pause-icon { width: 10px; height: 12px; border-left: 2px solid #fff; border-right: 2px solid #fff; }

        /* 龙鳞通用逻辑 */
        .dragon-row { display: flex; padding: 40px 0; align-items: flex-end; }
        .dragon-item { flex: 1; margin-right: -4vw; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; }
        .dragon-item:hover { margin-right: 2vw; transform: translateY(-15px); z-index: 100 !important; }
        .dragon-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 6px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* 首页特有布局 */
        .home-grid { display: grid; gap: 1.5rem; }
        @media (min-width: 768px) { .home-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .home-grid { grid-template-columns: repeat(2, 2fr); } }

        /* 返回键样式 */
        .back-nav { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 9000; cursor: pointer; }

        /* 四列电影名 */
        .movie-quad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; max-height: 500px; overflow-y: auto; }
        @media (min-width: 1200px) { .movie-quad-grid { grid-template-columns: repeat(4, 1fr); } }

        .movie-entry { opacity: 0.4; font-size: 11px; transition: 0.3s; padding: 4px 8px; border-radius: 4px; }
        .movie-entry:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .movie-entry .origin-title { font-size: 9px; opacity: 0.7; margin-left: 5px; }

        /* Obsidian 图谱放大 */
        .graph-container.expanded { position: fixed; top: 10vh; left: 10vw; width: 80vw !important; height: 80vh !important; z-index: 5000; }
        .close-btn { position: absolute; top: 1rem; right: 1.5rem; background: #fff; color: #000; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; display: none; }
        .expanded .close-btn { display: block; }

        /* 极致滚动条隐藏 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onmousemove="handleMusic()" onclick="handleMusic()" onscroll="handleMusic()">

    <audio id="global-audio" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>
    
    <div id="audio-control" class="audio-btn" onclick="toggleAudio(event)">
        <div class="play-icon" id="audio-icon"></div>
    </div>

    <div id="back-btn" class="back-nav hidden" onclick="switchPage('home')">
        <div class="glass px-6 py-2 text-group">
            <span class="zh text-xs">返回</span>
            <span class="en text-[8px]">Return</span>
        </div>
    </div>

    <div id="app-content" class="transition-opacity duration-500 pt-20 p-6 md:p-20"></div>

    <div id="map-tip" class="fixed pointer-events-none bg-white text-black px-2 py-1 rounded text-[10px] font-bold z-[9999] hidden"></div>

    <script src="movies.js"></script>
    <script>
        const audio = document.getElementById('global-audio');
        const audioIcon = document.getElementById('audio-icon');
        let musicLocked = false;

        // 核心：无缝音频逻辑
        function handleMusic() {
            if (!musicLocked && audio.paused) {
                audio.play().then(() => audioIcon.className = 'pause-icon').catch(()=>{});
            }
        }

        function toggleAudio(e) {
            e.stopPropagation();
            if (audio.paused) { audio.play(); audioIcon.className = 'pause-icon'; musicLocked = false; }
            else { audio.pause(); audioIcon.className = 'play-icon'; musicLocked = true; }
        }

        // SPA 页面切换：音乐不间断的关键
        function switchPage(page) {
            const container = document.getElementById('app-content');
            const backBtn = document.getElementById('back-btn');
            
            container.style.opacity = '0';
            setTimeout(() => {
                backBtn.classList.toggle('hidden', page === 'home');
                if(page === 'home') renderHome();
                else if(page === 'visual') renderVisual();
                else if(page === 'cinema') renderCinema();
                
                container.style.opacity = '1';
                window.scrollTo(0, 0);
            }, 400);
        }

        function renderHome() {
            document.getElementById('app-content').innerHTML = `
                <div class="h-[35vh] flex flex-col justify-end pb-12">
                    <div class="text-group">
                        <span class="zh text-[12vw] md:text-[8vw]">毛天艺</span>
                        <span class="en text-[4vw] md:text-[2vw]">Tianyi Mao</span>
                    </div>
                </div>
                <div class="home-grid">
                    <div onclick="switchPage('visual')" class="glass p-8 md:p-12 cursor-pointer hover:bg-white/5 transition-all text-group">
                        <span class="zh text-2xl">视觉作品集</span>
                        <span class="en text-xs">Visual Portfolio</span>
                    </div>
                    <div onclick="switchPage('cinema')" class="glass p-8 md:p-12 cursor-pointer hover:bg-white/5 transition-all text-group">
                        <span class="zh text-2xl">电影人生</span>
                        <span class="en text-xs">Cinema Archive</span>
                    </div>
                    <div class="glass p-8 md:p-12 opacity-30 text-group">
                        <span class="zh text-2xl">音乐人生</span>
                        <span class="en text-xs">Music Journey</span>
                    </div>
                    <div class="glass p-8 md:p-12 opacity-30 text-group">
                        <span class="zh text-2xl">阅读人生</span>
                        <span class="en text-xs">Reading Archive</span>
                    </div>
                </div>
            `;
        }

        function renderVisual() {
            const projects = [
                {z:'离不了',e:'Unseparable',p:'批判'},
                {z:'新保龄',e:'New Bowling',p:'运动'},
                {z:'某项目A',e:'Project Alpha',p:'设计'},
                {z:'某项目B',e:'Project Beta',p:'影像'}
            ];
            document.getElementById('app-content').innerHTML = `
                <div class="mb-12 text-group">
                    <span class="zh text-5xl">视觉作品集</span>
                    <span class="en text-lg">Visual Portfolio</span>
                </div>
                <div class="dragon-row flex-wrap md:flex-nowrap">
                    ${projects.map((p,i)=>`
                        <div class="dragon-item" style="z-index:${10-i}" onclick="alert('展开查看：'+'${p.z}')">
                            <div class="text-group mb-4">
                                <span class="zh text-sm">${p.z}</span>
                                <span class="en text-[9px]">${p.e}</span>
                            </div>
                            <img src="${p.p}.jpg" onerror="this.src='https://via.placeholder.com/400x600/111/fff?text=Project'">
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderCinema() {
            const top10 = [
                {n:'新世界',d:'10756762'},{n:'杀死比尔',d:'1291585'},{n:'无间道',d:'1307914'},
                {n:'被解救的姜戈',d:'6307447'},{n:'星际穿越',d:'1889243'},{n:'胭脂扣',d:'1300325'},
                {n:'爱在黎明',d:'1296339'},{n:'勇士',d:'3141107'},{n:'七宗罪',d:'1292223'},{n:'美国丽人',d:'1292062'}
            ];
            
            document.getElementById('app-content').innerHTML = `
                <div class="mb-8 text-group">
                    <span class="zh text-5xl">电影人生</span>
                    <span class="en text-lg">Cinema Archive</span>
                </div>

                <div class="dragon-row mb-12">
                    ${top10.map((m,i)=>`
                        <div class="dragon-item" style="z-index:${20-i}" onclick="window.open('https://movie.douban.com/subject/${m.d}/')">
                            <div class="writing-vertical-rl text-[10px] opacity-60 mb-4 h-32 text-right">${m.n}</div>
                            <img src="${m.n}.png" onerror="this.src='https://via.placeholder.com/200x300/222/555?text=${m.n}'">
                        </div>
                    `).join('')}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
                    <div class="glass graph-container p-8 relative h-[400px]" onclick="this.classList.toggle('expanded')">
                        <div class="close-btn">CLOSE</div>
                        <div class="text-group mb-4"><span class="zh text-xs">关系图谱</span><span class="en text-[8px]">Knowledge Graph</span></div>
                        <canvas id="graph-canvas"></canvas>
                    </div>
                    <div class="glass p-8 h-[400px]">
                        <div class="text-group mb-4"><span class="zh text-xs">全球足迹</span><span class="en text-[8px]">Global Footprint</span></div>
                        <div id="world-map-svg" class="h-full"></div>
                    </div>
                </div>

                <div class="flex flex-col xl:flex-row gap-6">
                    <div class="glass p-10 flex-[3]">
                        <input type="text" id="movieSearch" class="search-input mb-8" placeholder="搜一部你觉得毛天艺没看过的" oninput="debounceSearch()">
                        <div id="movie-quad-list" class="movie-quad-grid scrollbar-hide border-t border-white/10 pt-8"></div>
                    </div>
                    <div class="flex-[1] glass overflow-hidden"><div id="cinema-wall" class="kiss-wall scrollbar-hide"></div></div>
                </div>
            `;
            
            updateDisplay(movieData, true);
            initGraph();
            initRealMap();
        }

        function updateDisplay(movies, initWall = false) {
            const list = document.getElementById('movie-quad-list');
            const wall = document.getElementById('cinema-wall');
            if(!list) return;

            // 四列中英显示
            list.innerHTML = movies.map(m => {
                const titles = m.title.split(' / ');
                return `
                <div class="movie-entry" onclick="window.open('https://search.douban.com/movie/subject_search?search_text='+encodeURIComponent('${m.title}'))">
                    <span class="zh">${titles[0]}</span>
                    <span class="origin-title">${titles[1] || ''}</span>
                </div>`;
            }).join('');

            if(initWall && wall) {
                wall.innerHTML = movieData.map(m => `<img data-src="${m.poster}" class="kiss-item lazy-item" onerror="this.remove()">`).join('');
                const obs = new IntersectionObserver((es) => {
                    es.forEach(e => { if(e.isIntersecting) { e.target.src = e.target.dataset.src; e.target.onload = () => e.target.classList.add('loaded'); obs.unobserve(e.target); }});
                }, { rootMargin: "1000px" });
                document.querySelectorAll('.lazy-item').forEach(img => obs.observe(img));
            }
        }

        // Obsidian 图谱
        function initGraph() {
            const canvas = document.getElementById('graph-canvas');
            const ctx = canvas.getContext('2d');
            const box = canvas.parentElement;
            canvas.width = box.clientWidth; canvas.height = box.clientHeight - 80;
            
            const nodes = Array.from({length: 60}, (_, i) => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                c: i % 3 === 0 ? '#64b4ff' : (i % 5 === 0 ? '#c864ff' : '#fff')
            }));

            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                nodes.forEach(n => {
                    n.x += n.vx; n.y += n.vy;
                    if(n.x<0 || n.x>canvas.width) n.vx*=-1;
                    if(n.y<0 || n.y>canvas.height) n.vy*=-1;
                    ctx.fillStyle = n.c; ctx.globalAlpha = 0.5;
                    ctx.beginPath(); ctx.arc(n.x, n.y, 2, 0, Math.PI*2); ctx.fill();
                    nodes.forEach(n2 => {
                        const d = Math.hypot(n.x-n2.x, n.y-n2.y);
                        if(d < 60) {
                            ctx.strokeStyle = '#fff'; ctx.globalAlpha = 0.05;
                            ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
                        }
                    });
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // 真实世界地图轮廓
        function initRealMap() {
            const svg = `<svg viewBox="0 0 1000 500" class="w-full h-full opacity-20">
                <path d="M250,150 Q300,100 400,150 T600,150 T800,200 L850,400 L200,450 Z" fill="none" stroke="white" stroke-width="0.5" />
                <circle cx="750" cy="180" r="3" fill="white"><title>中国</title></circle>
                <circle cx="200" cy="200" r="3" fill="white"><title>美国</title></circle>
            </svg>`;
            document.getElementById('world-map-svg').innerHTML = svg;
        }

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            const term = document.getElementById('movieSearch').value.toLowerCase();
            searchTimer = setTimeout(() => {
                const res = movieData.filter(m => m.title.toLowerCase().includes(term));
                updateDisplay(term === '' ? movieData : res);
            }, 500);
        }

        // 初始加载
        window.onload = () => switchPage('home');
    </script>
</body>
</html>
