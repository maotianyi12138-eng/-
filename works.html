<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - 毛天艺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Libre+Baskerville:italic@400&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        .vogue-title { font-family: 'Noto Serif SC', serif; }
        .vogue-sub { font-family: 'Libre Baskerville', serif; }
        
        .filter-btn { transition: 0.3s; opacity: 0.3; cursor: pointer; border-bottom: 2px solid transparent; }
        .filter-btn.active { opacity: 1; border-bottom: 2px solid #3b82f6; }

        .project-group { transition: 0.5s; }
        .project-group.hidden { display: none; }

        .stack-container { 
            position: relative; 
            height: 300px; 
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: s-resize;
        }
        .stack-container.expanded { height: auto; cursor: default; }

        .stack-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -20px 30px rgba(0,0,0,0.5);
            background-color: #111;
        }

        /* 堆叠偏移逻辑 - 适配多张图 */
        .stack-img:nth-child(1) { transform: translateY(0px) scale(1); z-index: 6; }
        .stack-img:nth-child(2) { transform: translateY(30px) scale(0.98); z-index: 5; }
        .stack-img:nth-child(3) { transform: translateY(60px) scale(0.96); z-index: 4; }
        .stack-img:nth-child(4) { transform: translateY(90px) scale(0.94); z-index: 3; }
        .stack-img:nth-child(5) { transform: translateY(120px) scale(0.92); z-index: 2; }
        .stack-img:nth-child(6) { transform: translateY(150px) scale(0.90); z-index: 1; }

        .expanded .stack-img {
            position: relative;
            transform: translateY(0) scale(1) !important;
            margin-bottom: 1.5rem;
            z-index: 10 !important;
            cursor: zoom-in;
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center; align-items: center;
            cursor: zoom-out;
        }
    </style>
</head>
<body class="p-8 md:p-16">
    <nav class="mb-12"><a href="index.html" class="opacity-50 hover:opacity-100 transition">← BACK</a></nav>

    <div class="flex flex-wrap gap-8 border-b border-white/10 pb-6 mb-16">
        <div onclick="filterWorks('all')" class="filter-btn active" id="btn-all">ALL</div>
        <div onclick="filterWorks('critical')" class="filter-btn" id="btn-critical">CRITICAL / 批判设计</div>
        <div onclick="filterWorks('photo')" class="filter-btn" id="btn-photo">PHOTO / 风格摄影</div>
        <div onclick="filterWorks('practice')" class="filter-btn" id="btn-practice">PRACTICE / 美工实践</div>
        <div onclick="filterWorks('engineering')" class="filter-btn" id="btn-engineering">ENGINEERING / 工程案例</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24" id="grid">
        
        <div class="project-group" data-category="critical">
            <div class="stack-container" onclick="toggleExpand(this)">
                <img src="批判1" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判2" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判3" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判4" class="stack-img rounded" onclick="zoomImage(event, this)">
            </div>
            <div class="mt-8 border-l-2 border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black uppercase">Divorce in China</h3>
                <p class="vogue-sub text-xs opacity-40 italic mt-1 uppercase">4 Images / 16:9 Series</p>
                <p class="text-gray-500 text-sm mt-4 leading-relaxed">描述了中国社会结婚容易离婚难。</p>
            </div>
        </div>

        <div class="project-group" data-category="critical">
            <div class="stack-container" onclick="toggleExpand(this)">
                <img src="保龄1" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="保龄2" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="保龄3" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="保龄4" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="保龄5" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="保龄6" class="stack-img rounded" onclick="zoomImage(event, this)">
            </div>
            <div class="mt-8 border-l-2 border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black">项目标题 2</h3>
                <p class="vogue-sub text-xs opacity-40 italic mt-1 uppercase">6 Images / Series</p>
                <p class="text-gray-500 text-sm mt-4 leading-relaxed">描述内容 2 (包含 6 张作品)。</p>
            </div>
        </div>

        <div class="project-group" data-category="critical">
            <div class="stack-container" onclick="toggleExpand(this)">
                <img src="图3_1.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图3_2.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图3_3.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图3_4.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
            </div>
            <div class="mt-8 border-l-2 border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black">项目标题 3</h3>
                <p class="vogue-sub text-xs opacity-40 italic mt-1 uppercase">4 Images / Series</p>
                <p class="text-gray-500 text-sm mt-4 leading-relaxed">描述内容 3。</p>
            </div>
        </div>

        <div class="project-group" data-category="critical">
            <div class="stack-container" onclick="toggleExpand(this)">
                <img src="图4_1.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图4_2.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图4_3.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图4_4.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="图4_5.jpg" class="stack-img rounded" onclick="zoomImage(event, this)">
            </div>
            <div class="mt-8 border-l-2 border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black">项目标题 4</h3>
                <p class="vogue-sub text-xs opacity-40 italic mt-1 uppercase">5 Images / Series</p>
                <p class="text-gray-500 text-sm mt-4 leading-relaxed">描述内容 4 (包含 5 张作品)。</p>
            </div>
        </div>

    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" class="max-w-[90%] max-h-[90vh] object-contain shadow-2xl">
    </div>

    <script>
        function toggleExpand(container) {
            container.classList.toggle('expanded');
        }

        function zoomImage(event, img) {
            const container = img.parentElement;
            if (container.classList.contains('expanded')) {
                event.stopPropagation();
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.src = img.src;
                lightbox.style.display = 'flex';
            }
        }

        function filterWorks(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            document.querySelectorAll('.project-group').forEach(item => {
                if (cat === 'all' || item.getAttribute('data-category') === cat) {
                    item.classList.remove('hidden');
                } else { item.classList.add('hidden'); }
            });
        }
    </script>
</body>
</html>
