<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - 毛天艺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Libre+Baskerville:italic@400&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        .vogue-title { font-family: 'Noto Serif SC', serif; letter-spacing: -0.02em; }
        .vogue-sub { font-family: 'Libre Baskerville', serif; }
        .filter-btn { transition: 0.3s; opacity: 0.3; cursor: pointer; border-bottom: 2px solid transparent; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; }
        .filter-btn.active { opacity: 1; border-bottom: 2px solid #3b82f6; }
        .project-group { transition: 0.5s; }
        .project-group.hidden { display: none; }
        .music-bars { display: flex; gap: 3px; align-items: flex-end; height: 13px; width: 20px; }
        .bar { width: 2px; background: white; animation: play 0.8s infinite alternate; height: 3px; }
        .bar-paused { animation-play-state: paused !important; height: 2px !important; opacity: 0.3; }
        @keyframes play { 0% { height: 4px; } 100% { height: 13px; } }
        .stack-container { position: relative; height: 280px; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); cursor: s-resize; width: 100%; }
        .stack-container.expanded { height: auto; cursor: default; }
        .stack-img { position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16 / 9; object-fit: cover; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 35px rgba(0,0,0,0.6); background-color: #111; }
        .stack-img:nth-child(1) { transform: translateY(0px) scale(1); z-index: 6; }
        .stack-img:nth-child(2) { transform: translateY(25px) scale(0.97) rotate(-0.3deg); z-index: 5; opacity: 0.8; }
        .stack-img:nth-child(3) { transform: translateY(50px) scale(0.94) rotate(0.3deg); z-index: 4; opacity: 0.6; }
        .stack-img:nth-child(4) { transform: translateY(75px) scale(0.91); z-index: 3; opacity: 0.4; }
        .expanded .stack-img { position: relative; transform: translateY(0) scale(1) rotate(0deg) !important; margin-bottom: 1.5rem; z-index: 10 !important; opacity: 1 !important; cursor: zoom-in; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center; cursor: zoom-out; }
    </style>
</head>
<body class="p-8 md:p-20">
    <audio id="bgm" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="mb-16 flex justify-between items-center max-w-6xl mx-auto">
        <a href="index.html" onclick="saveAndGo(event, 'index.html')" class="opacity-40 hover:opacity-100 transition tracking-widest text-[10px]">← RETURN TO ARCHIVE</a>
        <div class="flex items-center gap-3 cursor-pointer group" onclick="toggleMusic(event)">
            <div class="music-bars" id="music-icon">
                <div class="bar bar-paused" style="animation-delay: 0.0s"></div>
                <div class="bar bar-paused" style="animation-delay: 0.2s"></div>
                <div class="bar bar-paused" style="animation-delay: 0.4s"></div>
            </div>
            <span class="text-[9px] tracking-[0.3em] uppercase opacity-40 group-hover:opacity-100 transition" id="music-status">Sound Off</span>
        </div>
    </nav>

    <div class="flex flex-wrap gap-8 border-b border-white/5 pb-6 mb-24 max-w-6xl mx-auto">
        <div onclick="filterWorks('all')" class="filter-btn active" id="btn-all">ALL</div>
        <div onclick="filterWorks('critical')" class="filter-btn" id="btn-critical">CRITICAL / 批判设计</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-32 max-w-6xl mx-auto" id="grid">
        <div class="project-group" data-category="critical">
            <div class="stack-container" onclick="toggleExpand(this)">
                <img src="批判1" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判2" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判3" class="stack-img rounded" onclick="zoomImage(event, this)">
                <img src="批判4" class="stack-img rounded" onclick="zoomImage(event, this)">
            </div>
            <div class="mt-8 border-l border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black uppercase">Divorce in China</h3>
                <p class="text-gray-500 text-xs mt-2">关于社会婚姻结构与个体困境的视觉探讨。</p>
            </div>
        </div>
        </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" class="max-w-[95%] max-h-[95vh] object-contain"></div>

    <script>
        const audio = document.getElementById('bgm');
        const iconBars = document.querySelectorAll('.bar');
        const statusText = document.getElementById('music-status');

        window.addEventListener('load', () => {
            audio.currentTime = 0; // 刷新页面始终重置
            const isPlaying = localStorage.getItem('musicPlaying') === 'true';
            if (isPlaying) { 
                audio.play().then(() => updateUI(true)).catch(() => {}); 
            }
        });

        // 滑动或点击触发
        const startMusic = () => {
            if (localStorage.getItem('musicPlaying') === 'true' && audio.paused) {
                audio.play().then(() => updateUI(true));
            }
        };
        document.addEventListener('click', startMusic);
        window.addEventListener('scroll', startMusic, { once: true });

        function saveAndGo(event, url) {
            event.preventDefault();
            localStorage.setItem('musicPlaying', audio.paused ? 'false' : 'true');
            setTimeout(() => { window.location.href = url; }, 150);
        }

        function toggleMusic(event) {
            if (audio.paused) { audio.play(); updateUI(true); localStorage.setItem('musicPlaying', 'true'); }
            else { audio.pause(); updateUI(false); localStorage.setItem('musicPlaying', 'false'); }
        }

        function updateUI(isPlaying) {
            statusText.innerText = isPlaying ? "Sound On" : "Sound Off";
            iconBars.forEach(bar => isPlaying ? bar.classList.remove('bar-paused') : bar.classList.add('bar-paused'));
        }

        function toggleExpand(container) { container.classList.toggle('expanded'); }
        function zoomImage(event, img) {
            if (img.parentElement.classList.contains('expanded')) {
                event.stopPropagation();
                document.getElementById('lightbox-img').src = img.src;
                document.getElementById('lightbox').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
