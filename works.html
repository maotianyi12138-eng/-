<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WORKS | MAO TIANYI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #app-content { transition: opacity 0.8s ease; opacity: 0; }
        .page-active { opacity: 1 !important; }
        
        .work-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1rem; }
        .work-item { grid-column: span 12; margin-bottom: 20vh; }
        .work-item.odd { grid-column: 2 / span 10; }
        .work-item.even { grid-column: 4 / span 8; }
        
        .work-img { width: 100%; filter: grayscale(1); transition: 1s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .work-item:hover .work-img { filter: grayscale(0); transform: scale(1.02); }
        
        .detail-label { font-size: 10px; opacity: 0.2; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 2rem; }
    </style>
</head>
<body class="p-10 md:p-24">
    <audio id="global-bgm" loop src="bgm.mp3"></audio>
    <div onclick="router('index.html')" class="fixed top-12 right-12 z-[200] text-[10px] opacity-30 hover:opacity-100 cursor-pointer tracking-widest uppercase">Index 00</div>

    <div id="app-content">
        <header class="mb-64">
            <h1 class="text-[12vw] font-light leading-none tracking-tighter">VISUAL<br><span class="opacity-10 italic ml-[10%]">INDEX</span></h1>
        </header>

        <div class="work-grid">
            <div class="work-item odd">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1600" class="work-img">
                <div class="flex justify-between items-start">
                    <p class="detail-label">Project 01 / Digital Fragments</p>
                    <h2 class="text-3xl font-light mt-6 tracking-widest">星尘重构</h2>
                </div>
            </div>

            <div class="work-item even">
                <img src="https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?auto=format&fit=crop&w=1600" class="work-img">
                <div class="flex justify-between items-start">
                    <p class="detail-label">Project 02 / Interface Lab</p>
                    <h2 class="text-3xl font-light mt-6 tracking-widest">流动界面</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('global-bgm');
        const app = document.getElementById('app-content');
        async function router(url) {
            app.style.opacity = "0";
            localStorage.setItem('bgmTime', audio.currentTime);
            localStorage.setItem('bgmPlaying', !audio.paused);
            setTimeout(() => { window.location.href = url; }, 800);
        }
        window.onload = () => {
            const savedTime = localStorage.getItem('bgmTime');
            if(savedTime) audio.currentTime = savedTime;
            if(localStorage.getItem('bgmPlaying') === 'true') audio.play().catch(() => {});
            setTimeout(() => app.classList.add('page-active'), 100);
        };
    </script>
</body>
</html>
