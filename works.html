<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO - 毛天艺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Libre+Baskerville:italic@400&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: sans-serif; }
        .vogue-title { font-family: 'Noto Serif SC', serif; }
        .vogue-sub { font-family: 'Libre Baskerville', serif; }
        .filter-btn { transition: 0.3s; opacity: 0.3; cursor: pointer; border-bottom: 2px solid transparent; }
        .filter-btn.active { opacity: 1; border-bottom: 2px solid #3b82f6; }
        .project-group { transition: 0.5s; }
        .project-group.hidden { display: none; }
        /* 强制图片 16:9 且美观 */
        .aspect-16-9 { aspect-ratio: 16 / 9; object-fit: cover; }
    </style>
</head>
<body class="p-8 md:p-16">
    <nav class="mb-12"><a href="index.html" class="opacity-50 hover:opacity-100 transition">← BACK</a></nav>

    <div class="flex flex-wrap gap-8 border-b border-white/10 pb-6 mb-16">
        <div onclick="filterWorks('all')" class="filter-btn active" id="btn-all">ALL</div>
        <div onclick="filterWorks('critical')" class="filter-btn" id="btn-critical">CRITICAL / 批判设计</div>
        <div onclick="filterWorks('photo')" class="filter-btn" id="btn-photo">PHOTO / 风格摄影</div>
        <div onclick="filterWorks('practice')" class="filter-btn" id="btn-practice">PRACTICE / 美工实践</div>
        <div onclick="filterWorks('engineering')" class="filter-btn" id="btn-engineering">ENGINEERING / 工程案例</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16" id="grid">
        
        <div class="project-group" data-category="critical">
            <div class="space-y-4">
                <img src="批判1" class="w-full aspect-16-9 rounded"> <img src="批判2" class="w-full aspect-16-9 rounded"> <img src="批判3" class="w-full aspect-16-9 rounded"> <img src="批判4" class="w-full aspect-16-9 rounded"> </div>
            
            <div class="mt-8 border-l-2 border-blue-500 pl-4">
                <h3 class="vogue-title text-2xl font-black">PROLONGED DIFFICULT PROGRESS OF DIVORCE IN CHINA</h3> <p class="vogue-sub text-xs opacity-40 italic uppercase mt-1">4 Images / 16:9 Series</p>
                <p class="text-gray-500 text-sm mt-4 leading-relaxed">描述了中国社会结婚容易离婚难已经女性在过程中的不平等地位。</p> </div>
        </div>
        </div>

    <script>
        function filterWorks(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            document.querySelectorAll('.project-group').forEach(item => {
                if (cat === 'all' || item.getAttribute('data-category') === cat) {
                    item.classList.remove('hidden');
                } else { item.classList.add('hidden'); }
            });
        }
    </script>
</body>
</html>
