<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | MAO TIANYI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .sub-label { font-size: 10px; letter-spacing: 0.5em; opacity: 0.3; text-transform: uppercase; }
        
        /* 作品堆叠动效 */
        .stack-c { position: relative; height: 180px; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); cursor: pointer; }
        .s-img { position: absolute; top: 0; width: 100%; aspect-ratio: 16/10; object-fit: cover; transition: 0.6s; border: 1px solid rgba(255,255,255,0.1); }
        .s-img:nth-child(2) { z-index: 2; transform: translateY(15px) scale(0.96); opacity: 0.7; }
        .s-img:nth-child(3) { z-index: 1; transform: translateY(30px) scale(0.92); opacity: 0.4; }
        
        .expanded { height: auto !important; margin-bottom: 3rem; }
        .expanded .s-img { position: relative; transform: none !important; opacity: 1 !important; margin-bottom: 10px; }
    </style>
</head>
<body class="p-10 md:p-24 pt-48 overflow-x-hidden">
    <nav class="fixed top-12 left-12 z-[200] pointer-events-auto">
        <a href="index.html" class="sub-label opacity-40 hover:opacity-100 transition-opacity">← Back / Index</a>
    </nav>

    <header class="mb-48 h-[60vh] flex flex-col justify-end">
        <h1 class="text-[12vw] font-light tracking-tighter leading-[0.8]">VISUAL<br><span class="opacity-10 italic ml-[10%]">INDEX</span></h1>
        <p class="sub-label mt-8">Selected works & Art Direction</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-12 gap-y-24 pb-48">
        <div class="group">
            <div class="stack-c" onclick="this.classList.toggle('expanded')">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=800" class="s-img">
                <img src="https://images.unsplash.com/photo-1550684847-75bdda21cc95?auto=format&fit=crop&w=800" class="s-img">
                <img src="https://images.unsplash.com/photo-1550684848-86a5d8727436?auto=format&fit=crop&w=800" class="s-img">
            </div>
            <div class="mt-6 border-l border-white/20 pl-4">
                <h3 class="text-xl font-light">DIGITAL ARTIFACTS</h3>
                <p class="sub-label mt-1">2026 / 视觉实验</p>
            </div>
        </div>
        </div>

    <footer class="text-center py-20 opacity-10 sub-label tracking-[1em]">End of Index / Mao Tianyi © 2026</footer>
</body>
</html>
