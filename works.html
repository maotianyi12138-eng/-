<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS - MAO TIANYI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap');
        body { background: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        .vogue-t { font-family: 'Noto Serif SC', serif; }
        .stack-container { position: relative; height: 140px; transition: 0.8s; cursor: s-resize; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { .stack-container { height: 180px; } }
        .stack-container.expanded { height: auto; cursor: default; margin-bottom: 4rem; }
        .stack-img { 
            position: absolute; top: 0; left: 0; width: 100%; aspect-ratio: 16/10; object-fit: cover; 
            transition: 0.8s cubic-bezier(0.19,1,0.22,1); border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 10px 30px #000;
        }
        .stack-img:nth-child(1) { transform: translateY(0) scale(1); z-index: 10; }
        .stack-img:nth-child(2) { transform: translateY(12px) scale(0.97); z-index: 9; opacity: 0.8; }
        .stack-img:nth-child(3) { transform: translateY(24px) scale(0.94); z-index: 8; opacity: 0.6; }
        .stack-img:nth-child(n+4) { transform: translateY(36px) scale(0.91); z-index: 1; opacity: 0; }
        .expanded .stack-img { position: relative; transform: translateY(0) scale(1)!important; margin-bottom: 1rem; opacity: 1!important; cursor: zoom-in; aspect-ratio: auto; }
        #lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center; cursor: zoom-out; }
    </style>
</head>
<body onclick="forcePlay()">
    <audio id="bgm" loop preload="auto"><source src="bgm.mp3" type="audio/mpeg"></audio>

    <nav class="p-6 md:p-16 flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" onclick="navTo(event, 'index.html')" class="opacity-40 hover:opacity-100 text-[9px] tracking-[0.2em]">← ARCHIVE / 返回首页</a>
        <div onclick="toggleMusic(event)" class="cursor-pointer text-[9px] opacity-40 uppercase tracking-widest" id="m-status">Off</div>
    </nav>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-x-5 md:gap-x-10 gap-y-20 max-w-7xl mx-auto px-6 pb-20">
        <div class="group">
            <div class="stack-container" onclick="this.classList.toggle('expanded')">
                <img src="批判1" class="stack-img" onclick="zoom(event,this)"><img src="批判2" class="stack-img" onclick="zoom(event,this)"><img src="批判3" class="stack-img" onclick="zoom(event,this)"><img src="批判4" class="stack-img" onclick="zoom(event,this)">
            </div>
            <div class="mt-4 border-l-2 border-blue-500 pl-3"><h3 class="vogue-t text-lg">DIVORCE IN CHINA</h3><p class="text-[9px] opacity-40">批判设计 / Social Study</p></div>
        </div>
        <div class="group">
            <div class="stack-container" onclick="this.classList.toggle('expanded')">
                <img src="保龄1" class="stack-img" onclick="zoom(event,this)"><img src="保龄2" class="stack-img" onclick="zoom(event,this)"><img src="保龄3" class="stack-img" onclick="zoom(event,this)"><img src="保龄4" class="stack-img" onclick="zoom(event,this)"><img src="保龄5" class="stack-img" onclick="zoom(event,this)"><img src="保龄6" class="stack-img" onclick="zoom(event,this)">
            </div>
            <div class="mt-4 border-l-2 border-red-500 pl-3"><h3 class="vogue-t text-lg">BOWLING CAMPAIGN</h3><p class="text-[9px] opacity-40">影像项目 / Commercial</p></div>
        </div>
        <div class="group">
            <div class="stack-container" onclick="this.classList.toggle('expanded')">
                <img src="血液1.png" class="stack-img" onclick="zoom(event,this)"><img src="血液2.png" class="stack-img" onclick="zoom(event,this)"><img src="血液3.png" class="stack-img" onclick="zoom(event,this)"><img src="血液4.png" class="stack-img" onclick="zoom(event,this)">
            </div>
            <div class="mt-4 border-l-2 border-red-900 pl-3"><h3 class="vogue-t text-lg">BLOOD NIRVANA</h3><p class="text-[9px] opacity-40">视觉实验 / Visual Lab</p></div>
        </div>
        <div class="group">
            <div class="stack-container" onclick="this.classList.toggle('expanded')">
                <img src="健身1.png" class="stack-img" onclick="zoom(event,this)"><img src="健身2.png" class="stack-img" onclick="zoom(event,this)"><img src="健身3.png" class="stack-img" onclick="zoom(event,this)"><img src="健身4.png" class="stack-img" onclick="zoom(event,this)"><img src="健身5.png" class="stack-img" onclick="zoom(event,this)">
            </div>
            <div class="mt-4 border-l-2 border-green-800 pl-3"><h3 class="vogue-t text-lg">MUSCLE FACTORY</h3><p class="text-[9px] opacity-40">运动影像 / Movement</p></div>
        </div>
    </div>

    <div id="lb" onclick="this.style.display='none'"><img id="lb-img" class="max-w-full max-h-full"></div>

    <script>
        const audio = document.getElementById('bgm');
        const statusText = document.getElementById('m-status');

        function upUI(p) { statusText.innerText = p ? "On" : "Off"; }

        // 逻辑与首页完全一致
        window.onload = () => {
            const savedTime = localStorage.getItem('mTime') || 0;
            const shouldPlay = localStorage.getItem('mPlay') === 'true';
            audio.currentTime = parseFloat(savedTime);
            if (shouldPlay) { audio.play().then(() => upUI(true)).catch(() => upUI(false)); }
            sessionStorage.removeItem('is_nav');
        };

        audio.ontimeupdate = () => localStorage.setItem('mTime', audio.currentTime);

        function forcePlay() {
            if (audio.paused && localStorage.getItem('mPlay') !== 'false') {
                audio.play().then(() => { upUI(true); localStorage.setItem('mPlay', 'true'); });
            }
        }

        function navTo(e, url) {
            e.preventDefault();
            sessionStorage.setItem('is_nav', 'true');
            localStorage.setItem('mPlay', !audio.paused);
            location.href = url;
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (audio.paused) { audio.play(); upUI(true); localStorage.setItem('mPlay', 'true'); }
            else { audio.pause(); upUI(false); localStorage.setItem('mPlay', 'false'); }
        }

        function zoom(e, img) { if (img.parentElement.classList.contains('expanded')) { e.stopPropagation(); document.getElementById('lb-img').src = img.src; document.getElementById('lb').style.display='flex'; } }
    </script>
</body>
</html>
