name: Sync WeRead showcase

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    paths:
      - ".github/workflows/sync-weread.yml"

permissions:
  contents: write

concurrency:
  group: sync-weread-showcase
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch public showcase data
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          gateway() {
            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${WEREAD_API_KEY}" \
              -H "Content-Type: application/json" \
              --data "$1" \
              "https://i.weread.qq.com/api/agent/gateway"
          }

          shelf="$(gateway '{"api_name":"/shelf/sync","skill_version":"1.0.4"}')"
          monthly="$(gateway '{"api_name":"/readdata/detail","skill_version":"1.0.4","mode":"monthly","baseTime":0}')"
          overall="$(gateway '{"api_name":"/readdata/detail","skill_version":"1.0.4","mode":"overall","baseTime":0}')"

          for payload in "$shelf" "$monthly" "$overall"; do
            jq -e '((.errcode // 0) == 0) and (has("upgrade_info") | not)' <<<"$payload" >/dev/null
          done

          mkdir -p data
          jq -n \
            --arg updatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson shelf "$shelf" \
            --argjson monthly "$monthly" \
            --argjson overall "$overall" \
            '{status:"ready",updatedAt:$updatedAt,shelf:$shelf,monthly:$monthly,overall:$overall}' \
            > data/weread.json

      - name: Publish refreshed data
        shell: bash
        run: |
          if git diff --quiet -- data/weread.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weread.json
          git commit -m "Update WeRead showcase data [skip ci]"
          git push
