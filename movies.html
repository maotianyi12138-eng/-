<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MOVIE - MAO TIANYI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white overflow-x-hidden">
    <div id="app-content">
        <style>
            .vogue-t { font-family: 'Noto Serif SC', serif; }
            .m-card { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.03); }
            .m-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
            .fade-up { animation: fUp 0.8s ease forwards; opacity: 0; }
            @keyframes fUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        </style>

        <nav class="p-6 md:p-16 flex justify-between items-center max-w-[1400px] mx-auto">
            <div onclick="router('index.html')" class="opacity-40 hover:opacity-100 text-[9px] tracking-[0.4em] cursor-pointer uppercase transition-all">← INDEX</div>
            <div class="text-[9px] opacity-40 uppercase tracking-widest" id="m-status">BGM: On</div>
        </nav>

        <header class="px-6 md:px-16 max-w-[1400px] mx-auto mb-20 fade-up">
            <h1 class="vogue-t text-4xl md:text-6xl font-black tracking-[0.3em]">电影选辑</h1>
            <p class="text-[10px] opacity-30 mt-6 uppercase tracking-[0.3em] italic">Selected Cinema Fragments</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 max-w-[1400px] mx-auto px-6 pb-40">
            
            <div class="fade-up" style="animation-delay: 0.1s">
                <div class="m-card">
                    <img src="https://img9.doubanio.com/view/photo/s_ratio_poster/public/p480747492.jpg" class="m-img">
                </div>
                <div class="mt-4 border-l border-white/10 pl-4">
                    <h4 class="text-[10px] font-bold tracking-widest uppercase">The Shawshank Redemption</h4>
                    <p class="text-[8px] opacity-20 mt-1 uppercase">肖申克的救赎</p>
                </div>
            </div>

            <div class="fade-up" style="animation-delay: 0.2s">
                <div class="m-card">
                    <img src="https://img1.doubanio.com/view/photo/s_ratio_poster/public/p2911205318.jpg" class="m-img">
                </div>
                <div class="mt-4 border-l border-white/10 pl-4">
                    <h4 class="text-[10px] font-bold tracking-widest uppercase">Farewell My Concubine</h4>
                    <p class="text-[8px] opacity-20 mt-1 uppercase">霸王别姬</p>
                </div>
            </div>

        </div>

        <script>
            (function() {
                // 仅同步 BGM 状态
                const statusIndicator = document.getElementById('m-status');
                const audio = document.getElementById('global-bgm');
                if(statusIndicator && audio) {
                    statusIndicator.innerText = audio.paused ? "BGM: Off" : "BGM: On";
                }
            })();
        </script>
    </div>
</body>
</html>
