        @font-face {
            font-family: 'ShanghaiModeng';
            src: url('ShanghaiModeng.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            background: #000; color: white; margin: 0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        /* 中文字体全局类 */
        .sh-modern { 
            font-family: 'ShanghaiModeng', serif; 
            font-weight: normal;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 1. 个人十佳：龙鳞装核心样式 */
        .dragon-scale-section {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; background: #000;
        }

        .dragon-scale-container {
            display: flex; padding-left: 8%; padding-right: 5%; align-items: center; height: 65vh;
            overflow-x: auto; overflow-y: hidden;
        }

        .dragon-card {
            flex: 0 0 220px; margin-right: -160px; /* 重叠度 */
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; cursor: crosshair;
        }

        .dragon-card:hover {
            margin-right: 40px; transform: translateY(-30px);
            z-index: 100 !important;
        }

        .dragon-card:hover ~ .dragon-card { transform: translateX(160px); }

        /* 排名数字背景 */
        .top-tag {
            position: absolute; top: -40px; left: 10px; font-size: 60px; font-weight: 100;
            color: rgba(255,255,255,0.05); pointer-events: none;
        }

        /* 2. 主布局：双列名单 + 海报墙 */
        .main-layout { display: flex; min-height: 100vh; border-top: 1px solid rgba(255,255,255,0.1); }
        .list-area { width: 42%; overflow-y: auto; background: #050505; border-right: 1px solid rgba(255,255,255,0.05); }
        .wall-area { width: 58%; overflow-y: auto; background: #000; }

        /* 标题样式：极细且间距拉开 */
        .vogue-header { letter-spacing: 0.5em; font-weight: 100; }

        .m-line { border-bottom: 1px solid rgba(255,255,255,0.02); padding: 8px 0; transition: 0.2s; }
        .m-line:hover { color: #ff3c3c; background: rgba(255,255,255,0.03); }
