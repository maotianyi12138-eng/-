<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA ARCHIVE | MAO TIANYI</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="movies.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .vogue-t { font-family: 'Noto Serif SC', serif; }
        
        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 左侧列表样式 */
        .movie-line { 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; cursor: crosshair;
        }
        .movie-line:hover { background: rgba(255,255,255,0.05); padding-left: 10px; border-color: #ff3c3c; }
        
        /* 右侧海报墙样式 */
        .poster-wall {
            perspective: 1000px;
        }
        .mini-poster {
            width: 80px; height: 110px; object-fit: cover;
            position: absolute; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(100%) brightness(0.7);
            opacity: 0.8;
        }
        .mini-poster:hover { 
            filter: grayscale(0%) brightness(1); 
            z-index: 100 !important; 
            transform: scale(2) rotate(0deg) !important;
            opacity: 1;
        }

        #app-content { transition: opacity 0.5s; opacity: 1; }
        .page-fade { opacity: 0 !important; }
        .fade-in { animation: fIn 1s ease forwards; opacity: 0; }
        @keyframes fIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="app-content" class="h-screen w-screen flex overflow-hidden">
        
        <nav class="fixed top-0 w-full p-8 z-[100] flex justify-between items-end pointer-events-none">
            <div onclick="router('index.html')" class="pointer-events-auto cursor-pointer opacity-30 hover:opacity-100 text-[9px] tracking-[0.4em] uppercase transition-all">← INDEX</div>
            <div id="m-count" class="text-[9px] opacity-20 tracking-widest italic uppercase">Archiving...</div>
        </nav>

        <div class="w-full md:w-1/2 h-full overflow-y-auto no-scrollbar pt-32 px-8 md:px-16 border-r border-white/5 bg-[#050505] relative z-10">
            <header class="mb-12">
                <h1 class="vogue-t text-5xl italic font-black mb-4">电影档案馆</h1>
                <p class="text-[9px] opacity-30 tracking-[0.3em] uppercase leading-loose">Visual fragments / 689 Recorded</p>
            </header>
            
            <div id="movie-list" class="space-y-0">
                </div>
        </div>

        <div class="hidden md:block w-1/2 h-full relative overflow-hidden bg-[#000] poster-wall" id="poster-wall">
            </div>

        <script>
            (function() {
                if (typeof movieData === 'undefined') return;

                const listContainer = document.getElementById('movie-list');
                const wallContainer = document.getElementById('poster-wall');
                const countDisplay = document.getElementById('m-count');

                countDisplay.innerText = `DATABASE: ${movieData.length} FILMS`;

                // 1. 生成左侧列表
                listContainer.innerHTML = movieData.map((movie, index) => {
                    const parts = movie.title.split(' / ');
                    const zh = parts[0];
                    const en = parts[parts.length - 1] || "";
                    return `
                        <div class="movie-line py-4 flex items-baseline justify-between gap-4 fade-in" style="animation-delay: ${index * 0.01}s">
                            <span class="vogue-t text-sm tracking-widest opacity-80">${zh}</span>
                            <span class="flex-1 border-b border-dotted border-white/10 mx-2 mb-1"></span>
                            <span class="text-[10px] uppercase font-bold tracking-tighter opacity-30 truncate text-right max-w-[200px]">${en}</span>
                        </div>
                    `;
                }).join('');

                // 2. 生成右侧随机海报墙
                // 仅抽取前 50 张（或随机抽取）防止性能爆炸
                const sampleMovies = [...movieData].sort(() => 0.5 - Math.random()).slice(0, 60);
                
                sampleMovies.forEach((movie, i) => {
                    const img = document.createElement('img');
                    img.src = movie.poster;
                    img.className = 'mini-poster fade-in';
                    
                    // 随机位置逻辑
                    const x = Math.random() * 80 + 5; // 5% - 85%
                    const y = Math.random() * 80 + 5; // 5% - 85%
                    const rot = (Math.random() - 0.5) * 45; // -22.5 to 22.5 deg
                    
                    img.style.left = `${x}%`;
                    img.style.top = `${y}%`;
                    img.style.transform = `rotate(${rot}deg)`;
                    img.style.zIndex = i;
                    img.style.animationDelay = `${Math.random() * 2}s`;
                    
                    wallContainer.appendChild(img);
                });

                // 同步主页音乐 UI (简易逻辑)
                const audio = document.getElementById('global-bgm');
                if(audio) {
                    console.log("Audio detected, status sync active.");
                }
            })();
        </script>
    </div>
</body>
</html>
