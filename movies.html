<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | MAO TIANYI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .sub-label { font-size: 10px; letter-spacing: 0.5em; opacity: 0.3; text-transform: uppercase; }
        
        /* 1. 个人十佳排版 */
        .top10-item { display: grid; grid-template-columns: repeat(12, 1fr); margin-bottom: 25vh; align-items: end; }
        .top10-img-box { grid-column: span 8; overflow: hidden; position: relative; }
        .top10-item:nth-child(even) .top10-img-box { grid-column: 5 / span 8; }
        .top10-text { grid-column: span 4; z-index: 10; padding-bottom: 2rem; }
        .top10-item:nth-child(even) .top10-text { grid-column: 1 / span 4; text-align: right; }
        
        .top10-img { width: 100%; filter: grayscale(1); transition: 1.2s cubic-bezier(0.23, 1, 0.32, 1); }
        .top10-item:hover .top10-img { filter: grayscale(0); transform: scale(1.03); }
        .big-num { font-size: 10vw; font-weight: 100; opacity: 0.1; margin-bottom: -1.5rem; line-height: 1; }

        /* 2. 海报墙矩阵样式 */
        .poster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1px; background: rgba(255,255,255,0.05); }
        .poster-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.3; transition: 0.5s; cursor: crosshair; }
        .poster-item:hover { opacity: 1; transform: scale(1.6); z-index: 50; outline: 1px solid #fff; box-shadow: 0 0 50px #000; }
    </style>
</head>
<body class="p-10 md:p-24 pt-48 overflow-x-hidden">
    <nav class="fixed top-12 left-12 z-[200] pointer-events-auto">
        <a href="index.html" class="sub-label opacity-40 hover:opacity-100 transition-opacity">← Back / Index</a>
    </nav>

    <header class="h-[70vh] flex flex-col justify-end mb-40">
        <h1 class="text-[12vw] font-light tracking-tighter leading-[0.8]">FILM<br><span class="opacity-10 italic">CURATION</span></h1>
        <p class="sub-label mt-12">Selected works & Full Database</p>
    </header>

    <section class="mb-64">
        <div class="top10-item group">
            <div class="top10-img-box">
                <img src="https://image.tmdb.org/t/p/original/27TeSl3S8pZ1v7BNvL97m9v987E.jpg" class="top10-img" onerror="this.src='https://via.placeholder.com/800x1200/000?text=Poster'">
            </div>
            <div class="top10-text">
                <div class="big-num">01</div>
                <h3 class="text-4xl font-light tracking-tight">杀死比尔 2</h3>
                <p class="sub-label mt-3">Kill Bill: Vol. 2</p>
            </div>
        </div>

        <div class="top10-item group">
            <div class="top10-img-box">
                <img src="https://image.tmdb.org/t/p/original/9vHofM6cZonF1Xb1Gcl5CjE3ZkI.jpg" class="top10-img">
            </div>
            <div class="top10-text">
                <div class="big-num">02</div>
                <h3 class="text-4xl font-light tracking-tight">新世界</h3>
                <p class="sub-label mt-3">New World</p>
            </div>
        </div>
        </section>

    <section class="mb-40">
        <h2 class="text-5xl font-light mb-16 tracking-tighter uppercase">Visual Wall</h2>
        <div id="poster-wall" class="poster-grid">
            </div>
    </section>

    <footer class="text-center py-20 opacity-10 sub-label tracking-[1em]">Mao Tianyi © 2026</footer>

    <script>
        // 🚨 终极修正：直接将你的数据写死在这里，不使用外部 .js 文件
        const myFullDatabase = [
            { poster: "https://image.tmdb.org/t/p/original/i9uQUv9EPia99SStpS68Z99986G.jpg" }, // 前
            { poster: "https://image.tmdb.org/t/p/original/pA0VscSByjM3H9R9Zf61X8k8V1B.jpg" }, // 勇
            { poster: "https://image.tmdb.org/t/p/original/69Sns8WoYnEJtG69yz6qvev5oM6.jpg" }, // 七
            { poster: "https://image.tmdb.org/t/p/original/9XshN8V96qF1eZ0I0P9S6Y8k8V1.jpg" }, // 无
            { poster: "https://image.tmdb.org/t/p/original/7oWY86pS9YfcP368oXvR707qqPk.jpg" }  // 姜
            // ...以此类推，把你的 689 张海报全放在这
        ];

        // 页面加载瞬间执行渲染，100% 不报错
        window.onload = () => {
            const wall = document.getElementById('poster-wall');
            if(wall && myFullDatabase) {
                myFullDatabase.forEach(m => {
                    const img = new Image();
                    img.src = m.poster;
                    img.className = 'poster-item';
                    img.loading = "lazy"; // 性能优化
                    img.onerror = () => img.remove(); // 容错：图片挂了就移除
                    wall.appendChild(img);
                });
            }
        };
    </script>
</body>
</html>
