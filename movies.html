<div id="app-content" class="h-screen w-screen flex overflow-hidden bg-black">
    <style>
        .list-area { width: 45%; height: 100vh; overflow-y: auto; background: #050505; }
        .list-area::-webkit-scrollbar { display: none; }
        .wall-area { width: 55%; height: 100vh; overflow-y: auto; background: #000; }
        .wall-area::-webkit-scrollbar { display: none; }
        
        .dense-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 20px; padding: 120px 40px; }
        .m-line { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 6px 0; transition: 0.2s; }
        .m-line:hover { color: #ff3c3c; transform: translateX(4px); }

        .mosaic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 1px; }
        .mosaic-item { width: 100%; aspect-ratio: 2/3; object-fit: cover; opacity: 0.9; transition: 0.3s; }
        .mosaic-item:hover { opacity: 1; transform: scale(1.8); z-index: 50; box-shadow: 0 0 30px rgba(0,0,0,1); }
    </style>

    <div class="list-area border-r border-white/5">
        <div class="p-12 mb-4">
            <h1 class="vogue-zh text-4xl italic font-black">电影档案馆</h1>
            <p class="text-[8px] opacity-30 tracking-[0.4em] mt-4">ARCHIVE / DUAL-COLUMN</p>
        </div>
        <div id="movie-list" class="dense-grid"></div>
    </div>

    <div class="wall-area">
        <div id="mosaic-grid" class="mosaic-grid"></div>
    </div>

    <script>
        (function() {
            if (typeof movieData === 'undefined') return;
            const list = document.getElementById('movie-list');
            const wall = document.getElementById('mosaic-grid');

            // 列表渲染
            list.innerHTML = movieData.map(m => {
                const zh = m.title.split(' / ')[0];
                const en = m.title.split(' / ').pop();
                return `
                    <div class="m-line">
                        <div class="vogue-zh text-[11px] truncate font-bold">${zh}</div>
                        <div class="text-[7px] opacity-20 uppercase truncate italic">${en}</div>
                    </div>
                `;
            }).join('');

            // 海报墙渲染 (带死链过滤)
            movieData.forEach(m => {
                if(!m.poster) return;
                const img = new Image();
                img.src = m.poster;
                img.className = 'mosaic-item';
                img.onload = () => wall.appendChild(img);
                img.onerror = () => img.remove();
            });
        })();
    </script>
</div>
