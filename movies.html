<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA ARCHIVE | MAO TIANYI</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="movies.js"></script>
    <style>
        body { background: #050505; color: white; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .vogue-t { font-family: 'Noto Serif SC', serif; }
        
        /* 1. 左侧：极高密度列表 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-line { 
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s; cursor: crosshair;
            display: flex; align-items: baseline; padding: 2px 0; /* 压缩行高 */
        }
        .movie-line:hover { background: rgba(255,255,255,0.1); border-color: #ff3c3c; color: #ff3c3c; } /* 悬停变红 */
        
        /* 2. 右侧：亲吻墙矩阵 (Mosaic Wall) */
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); /* 极小单元格 */
            grid-auto-rows: 65px;
            gap: 2px; /* 紧密缝隙 */
            padding: 2px;
            height: 100%;
            overflow-y: auto;
        }
        .mosaic-item {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.3s;
            /* 移除黑白滤镜，保留彩色 */
            opacity: 0.9;
        }
        .mosaic-item:hover { 
            opacity: 1; 
            transform: scale(1.5); 
            z-index: 50; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #app-content { transition: opacity 0.5s; opacity: 1; }
        .page-fade { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="app-content" class="h-screen w-screen flex overflow-hidden">
        
        <nav class="fixed top-0 w-full p-6 z-[100] flex justify-between items-center pointer-events-none">
            <div onclick="router('index.html')" class="pointer-events-auto cursor-pointer opacity-50 hover:opacity-100 text-[9px] tracking-[0.4em] uppercase transition-all bg-black/50 px-2 py-1">← BACK</div>
            <div id="m-count" class="text-[9px] text-[#ffb400] font-bold tracking-widest uppercase">Syncing...</div>
        </nav>

        <div class="w-full md:w-5/12 h-full overflow-y-auto no-scrollbar pt-24 px-6 md:px-12 border-r border-white/5 bg-[#050505] relative z-10">
            <header class="mb-8">
                <h1 class="vogue-t text-4xl italic font-black text-white">电影档案馆</h1>
                <p class="text-[8px] opacity-40 tracking-[0.4em] uppercase mt-2">High-Density Text Archive</p>
            </header>
            
            <div id="movie-list" class="pb-20">
                </div>
        </div>

        <div class="hidden md:block w-7/12 h-full bg-black no-scrollbar overflow-y-auto" id="mosaic-wall">
            <div class="mosaic-grid" id="mosaic-container">
                </div>
        </div>

        <script>
            (function() {
                if (typeof movieData === 'undefined') return;

                const listContainer = document.getElementById('movie-list');
                const mosaicContainer = document.getElementById('mosaic-container');
                const countDisplay = document.getElementById('m-count');

                countDisplay.innerText = `${movieData.length} FRAGMENTS`;

                // 1. 生成高密度列表
                listContainer.innerHTML = movieData.map((movie, index) => {
                    const parts = movie.title.split(' / ');
                    const zh = parts[0];
                    const en = parts[parts.length - 1] || "";
                    return `
                        <div class="movie-line">
                            <span class="text-[11px] font-bold tracking-tighter opacity-80 whitespace-nowrap">${zh}</span>
                            <span class="flex-1 mx-2 border-b border-white/5 opacity-20"></span>
                            <span class="text-[9px] uppercase font-medium opacity-20 truncate italic">${en}</span>
                        </div>
                    `;
                }).join('');

                // 2. 生成彩色矩阵并处理死链
                movieData.forEach((movie) => {
                    if (!movie.poster) return;
                    
                    const img = new Image();
                    img.src = movie.poster;
                    img.className = 'mosaic-item';
                    
                    // 核心：只有图片加载成功才放入墙中
                    img.onload = () => {
                        mosaicContainer.appendChild(img);
                    };
                    
                    // 如果图片报错，直接遗弃，不占位
                    img.onerror = () => {
                        img.remove();
                    };
                });

                // 同步背景音乐 UI (简易)
                const audio = document.getElementById('global-bgm');
                if(audio) { console.log("BGM Synced"); }
            })();
        </script>
    </div>
</body>
</html>
